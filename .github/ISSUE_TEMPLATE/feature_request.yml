name: Feature Request
description: Propose a new feature for KubeSynapse
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feature idea! Please check existing issues and discussions before submitting.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem would this feature solve? Describe the use case.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Be as specific as possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you tried?
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - API Gateway
        - Operator
        - CLI (agentctl)
        - Web UI
        - Helm Chart
        - Runtime
        - MCP Sidecars
        - Documentation
        - Other
  - type: checkboxes
    id: willing-to-contribute
    attributes:
      label: Contributing
      options:
        - label: I'm willing to submit a PR for this feature
