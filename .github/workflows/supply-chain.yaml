name: Supply Chain Integrity

on:
  push:
    branches: [main, preprod]
    paths:
      - "api-gateway/**"
      - "operator/**"
      - "opencode-runtime/**"
      - "web-ui/**"
      - "mcp-sidecars/**"
      - "collector-agent/**"
  pull_request:
    branches: [main, preprod]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write
  attestations: write
  artifact-metadata: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  OPENCODE_IMAGE_NAME: kubesynapse-opencode-rt

jobs:
  sbom:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - api-gateway
          - operator
          - opencode-runtime
          - web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM for ${{ matrix.component }}
        run: |
          mkdir -p dist/sbom
          syft dir:./${{ matrix.component }} \
            --output spdx-json=dist/sbom/${{ matrix.component }}.spdx.json \
            --output cyclonedx-json=dist/sbom/${{ matrix.component }}.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component }}
          path: dist/sbom/${{ matrix.component }}.*.json

  scan:
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  sign-images:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preprod')
    runs-on: ubuntu-latest
    needs: scan
    strategy:
      matrix:
        image:
          - kubesynapse-operator
          - kubesynapse-api-gateway
          - kubesynapse-web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate image tag
        id: tag
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          podman build --format docker \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }} \
            ./${{ matrix.image == 'kubesynapse-operator' && 'operator' || matrix.image == 'kubesynapse-api-gateway' && 'api-gateway' || 'web-ui' }}
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/supply-chain.yaml@${{ github.ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}

  opencode-runtime-integrity:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preprod')
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push OpenCode runtime
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./opencode-runtime
          file: ./opencode-runtime/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.OPENCODE_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          labels: |
            org.opencontainers.image.title=KubeSynapse OpenCode Runtime
            org.opencontainers.image.description=Hardened OpenCode runtime for KubeSynapse
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=opencode-runtime-supply-chain
          cache-to: type=gha,mode=max,scope=opencode-runtime-supply-chain

      - name: Scan OpenCode runtime image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign OpenCode runtime image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Verify OpenCode runtime signature
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/supply-chain.yaml@.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }} > /dev/null

      - name: Generate OpenCode runtime provenance attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.OPENCODE_IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate OpenCode runtime SBOM
        run: |
          mkdir -p dist/sbom
          syft registry:${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }} \
            --output spdx-json=dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.spdx.json \
            --output cyclonedx-json=dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.cdx.json

      - name: Generate OpenCode runtime SBOM attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.OPENCODE_IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.spdx.json
          push-to-registry: true

      - name: Upload OpenCode runtime SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-opencode-runtime-image
          path: dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.*
