name: Supply Chain Integrity

on:
  push:
    branches: [main, preprod]
    paths:
      - "api-gateway/**"
      - "operator/**"
      - "opencode-runtime/**"
      - "web-ui/**"
      - "mcp-sidecars/**"
      - "collector-agent/**"
  pull_request:
    branches: [main, preprod]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ── SBOM Generation ───────────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - api-gateway
          - operator
          - opencode-runtime
          - web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM for ${{ matrix.component }}
        run: |
          mkdir -p dist/sbom
          syft dir:./${{ matrix.component }} \
            --output spdx-json=dist/sbom/${{ matrix.component }}.spdx.json \
            --output cyclonedx-json=dist/sbom/${{ matrix.component }}.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component }}
          path: dist/sbom/${{ matrix.component }}.*.json

  # ── Vulnerability Scan ───────────────────────────────────────────
  scan:
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # ── Cosign Image Signing (on push to main/preprod) ───────────────
  sign-images:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preprod')
    runs-on: ubuntu-latest
    needs: scan
    strategy:
      matrix:
        image:
          - kubesynapse-operator
          - kubesynapse-api-gateway
          - kubesynapse-opencode-runtime
          - kubesynapse-web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate image tag
        id: tag
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          podman build --format docker \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }} \
            ./${{ matrix.image == 'kubesynapse-operator' && 'operator' || matrix.image == 'kubesynapse-api-gateway' && 'api-gateway' || matrix.image == 'kubesynapse-opencode-runtime' && 'opencode-runtime' || 'web-ui' }}

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/supply-chain.yaml@${{ github.ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}

  # ── Attestation ──────────────────────────────────────────────────
  attest:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preprod')
    runs-on: ubuntu-latest
    needs: sign-images
    steps:
      - uses: actions/checkout@v4
      - uses: actions/attest-build-provenance@v1
        with:
          subject-path: "${{ github.workspace }}/**"
