name: Security Scan

on:
  workflow_dispatch:
  push:
    branches: [main, preprod]
  pull_request:
    branches: [main, preprod]
  schedule:
    - cron: "0 0 * * 0"  # Weekly on Sundays

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ── Python SAST (Bandit) ──────────────────────────────────────────
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[sarif]
      - name: Run bandit scan (SARIF)
        run: |
          bandit -r api-gateway/ operator/ opencode-runtime/ cli/ benchmarks/ clients/ \
            -c .bandit.yaml \
            -f sarif \
            -o bandit-results.sarif || true
      - name: Upload bandit SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit
      - name: Block on HIGH/CRITICAL
        run: |
          bandit -r api-gateway/ operator/ opencode-runtime/ cli/ benchmarks/ clients/ \
            -c .bandit.yaml -ll
          echo "✅ Bandit: No HIGH or CRITICAL issues found"

  # ── Python Dependency Audit (pip-audit) ───────────────────────────
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit api-gateway dependencies
        run: pip-audit --requirement api-gateway/requirements.txt
      - name: Audit operator dependencies
        run: pip-audit --requirement operator/requirements.txt
      - name: Audit opencode-runtime dependencies
        run: pip-audit --requirement opencode-runtime/requirements.txt
      - name: Audit cli dependencies (if requirements.txt)
        run: |
          if [ -f cli/requirements.txt ]; then
            pip-audit --requirement cli/requirements.txt
          else
            echo "No cli/requirements.txt, skipping"
          fi

  # ── npm Audit ─────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm audit (web-ui)
        working-directory: web-ui
        run: npm audit --audit-level=high
      - name: npm audit (typescript sdk)
        working-directory: clients/typescript
        run: npm audit --audit-level=high || true

  # ── Trivy Container Image Scan ────────────────────────────────────
  trivy-containers:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - api-gateway
          - operator
          - opencode-runtime
          - web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build image (${{ matrix.image }})
        id: build-image
        run: |
          DOCKERFILE_DIR="${{ matrix.image }}"
          IMAGE_TAG="kubesynapse-${{ matrix.image }}:scan"
          IMAGE_TAR="${RUNNER_TEMP}/kubesynapse-${{ matrix.image }}.tar"
          podman build --format docker -t "$IMAGE_TAG" "./$DOCKERFILE_DIR"
          podman save --format docker-archive -o "$IMAGE_TAR" "$IMAGE_TAG"
          echo "image_tar=$IMAGE_TAR" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: ${{ steps.build-image.outputs.image_tar }}
          format: "sarif"
          output: "trivy-image-${{ matrix.image }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"  # Don't fail, we check in the next step
          ignore-unfixed: false

      - name: Upload Trivy image SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-image-${{ matrix.image }}.sarif"
          category: "trivy-image-${{ matrix.image }}"

      - name: Block on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: ${{ steps.build-image.outputs.image_tar }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-setup-trivy: true

  # ── Trivy Filesystem Scan ─────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy on repo filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
      - name: Upload Trivy FS SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: trivy-filesystem

  # ── kube-linter (Helm/K8s Best Practices) ─────────────────────────
  kube-linter:
    name: kube-linter Helm Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Install kube-linter
        run: |
          curl -sSfL https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz \
            | tar -xz -C "${RUNNER_TEMP}"
          sudo install "${RUNNER_TEMP}/kube-linter" /usr/local/bin/kube-linter

      - name: Render Helm chart to YAML
        run: |
          helm template kubesynapse ./charts/kubesynapse \
            --namespace kubesynapse \
            --set platformSecrets.native.litellmMasterKey=fake-key \
            --set platformSecrets.native.apiGatewaySharedToken=fake-token \
            --set platformSecrets.native.databasePassword=fake-db-pass \
            --set platformSecrets.native.jwtSecret=fake-jwt-secret \
            > /tmp/kubesynapse-manifests.yaml

      - name: Run kube-linter
        run: |
          kube-linter lint /tmp/kubesynapse-manifests.yaml \
            --include "privileged-container,privilege-escalation-container,no-read-only-root-fs,run-as-non-root,dangling-service,env-var-secret,read-secret-from-env-var,sensitive-host-mounts,no-anti-affinity,cluster-admin-role-binding,access-to-secrets" \
            --format sarif \
            --output kube-linter-results.sarif || true

      - name: Upload kube-linter SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: kube-linter-results.sarif
          category: kube-linter

  # ── checkov (IaC Security) ────────────────────────────────────────
  checkov:
    name: checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Install checkov
        run: pip install checkov

      - name: Render Helm chart to YAML
        run: |
          mkdir -p /tmp/kubesynapse-rendered
          helm template kubesynapse ./charts/kubesynapse \
            --namespace kubesynapse \
            --set platformSecrets.native.litellmMasterKey=fake-key \
            --set platformSecrets.native.apiGatewaySharedToken=fake-token \
            --set platformSecrets.native.databasePassword=fake-db-pass \
            --set platformSecrets.native.jwtSecret=fake-jwt-secret \
            > /tmp/kubesynapse-rendered/all.yaml

      - name: Run checkov (Helm chart)
        run: |
          checkov --directory charts/kubesynapse \
            --framework helm \
            --var-file deploy/values.kind.yaml \
            --output sarif \
            --output-file-path checkov-helm-results.sarif \
            --soft-fail || true

      - name: Run checkov (rendered manifests)
        run: |
          checkov --file /tmp/kubesynapse-rendered/all.yaml \
            --framework kubernetes \
            --output sarif \
            --output-file-path checkov-k8s-results.sarif \
            --soft-fail || true

      - name: Upload checkov Helm SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-helm-results.sarif
          category: checkov-helm

      - name: Upload checkov K8s SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-k8s-results.sarif
          category: checkov-k8s

  # ── Secret Detection (TruffleHog) ─────────────────────────────────
  secret-scan:
    name: TruffleHog Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets in current commit
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'push' && github.event.before || github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.event_name == 'push' && 'HEAD' || github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
          extra_args: --debug --only-verified
