name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAMESPACE_GHCR: ${{ github.repository_owner }}
  IMAGE_NAMESPACE_DOCKERHUB: kubesynapse

jobs:
  # ── Container Images ──────────────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${{ env.REGISTRY_GHCR }}" -u "${{ github.actor }}" --password-stdin

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login "${{ env.REGISTRY_DOCKERHUB }}" -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push Operator
        run: |
          # GHCR
          podman build --format docker -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-operator:${{ steps.version.outputs.version }} ./operator
          podman push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-operator:${{ steps.version.outputs.version }}
          # Docker Hub
          podman tag ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-operator:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/operator:${{ steps.version.outputs.version }}
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/operator:${{ steps.version.outputs.version }}
          # latest tag
          podman tag ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/operator:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/operator:latest
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/operator:latest

      - name: Build & Push API Gateway
        run: |
          podman build --format docker -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }} ./api-gateway
          podman push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/api-gateway:${{ steps.version.outputs.version }}
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/api-gateway:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/api-gateway:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/api-gateway:latest
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/api-gateway:latest

      - name: Build & Push OpenCode Runtime
        run: |
          podman build --format docker -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-opencode-runtime:${{ steps.version.outputs.version }} ./opencode-runtime
          podman push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-opencode-runtime:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-opencode-runtime:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/opencode-runtime:${{ steps.version.outputs.version }}
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/opencode-runtime:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/opencode-runtime:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/opencode-runtime:latest
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/opencode-runtime:latest

      - name: Build & Push Web UI
        run: |
          podman build --format docker -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-web-ui:${{ steps.version.outputs.version }} ./web-ui
          podman push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-web-ui:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-web-ui:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/web-ui:${{ steps.version.outputs.version }}
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/web-ui:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/web-ui:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/web-ui:latest
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/web-ui:latest

      - name: Generate SBOMs
        run: |
          mkdir -p dist/sbom
          for img in kubesynapse-operator kubesynapse-api-gateway kubesynapse-opencode-runtime kubesynapse-web-ui; do
            podman run --rm aquasec/trivy image \
              --format spdx-json \
              --output dist/sbom/${img}.spdx.json \
              ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${img}:${{ steps.version.outputs.version }}
          done

      - name: Sign GHCR images with cosign
        run: |
          for img in kubesynapse-operator kubesynapse-api-gateway kubesynapse-opencode-runtime kubesynapse-web-ui; do
            cosign sign --yes ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${img}:${{ steps.version.outputs.version }}
          done

      - name: Sign Docker Hub images with cosign
        run: |
          for img in operator api-gateway opencode-runtime web-ui; do
            cosign sign --yes ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/${img}:${{ steps.version.outputs.version }}
          done

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: dist/sbom/

  # ── Helm Chart → OCI ─────────────────────────────────────────────
  helm-oci:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY_GHCR }}" -u "${{ github.actor }}" --password-stdin

      - name: Package and push Helm chart to OCI (GHCR)
        run: |
          helm package ./charts/kubesynapse --version "${{ steps.version.outputs.version }}" --app-version "${{ steps.version.outputs.version }}" -d ./dist
          CHART_FILE=$(ls ./dist/kubesynapse-*.tgz)
          helm push "$CHART_FILE" "oci://${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/charts"

      - name: Log in to Docker Hub (Helm)
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY_DOCKERHUB }}" -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Helm chart to Docker Hub OCI
        run: |
          CHART_FILE=$(ls ./dist/kubesynapse-*.tgz)
          helm push "$CHART_FILE" "oci://${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/charts"

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/kubesynapse-*.tgz

  # ── GitHub Release ────────────────────────────────────────────────
  github-release:
    runs-on: ubuntu-latest
    needs: [build-images, helm-oci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "kubesynapse v${{ github.ref_name }}"
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
