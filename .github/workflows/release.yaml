name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAMESPACE_GHCR: ${{ github.repository_owner }}
  IMAGE_NAMESPACE_DOCKERHUB: kubesynapse
  OPENCODE_IMAGE_NAME: kubesynapse-opencode-rt

jobs:
  build-images:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${{ env.REGISTRY_GHCR }}" -u "${{ github.actor }}" --password-stdin

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login "${{ env.REGISTRY_DOCKERHUB }}" -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push Operator
        run: |
          podman build --format docker -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-operator:${{ steps.version.outputs.version }} ./operator
          podman push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-operator:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-operator:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-operator:${{ steps.version.outputs.version }}
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-operator:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-operator:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-operator:latest
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-operator:latest

      - name: Build & Push API Gateway
        run: |
          podman build --format docker -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }} ./api-gateway
          podman push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }}
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-api-gateway:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-api-gateway:latest
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-api-gateway:latest

      - name: Build & Push Web UI
        run: |
          podman build --format docker -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-web-ui:${{ steps.version.outputs.version }} ./web-ui
          podman push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-web-ui:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/kubesynapse-web-ui:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-web-ui:${{ steps.version.outputs.version }}
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-web-ui:${{ steps.version.outputs.version }}
          podman tag ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-web-ui:${{ steps.version.outputs.version }} ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-web-ui:latest
          podman push ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/kubesynapse-web-ui:latest

      - name: Generate SBOMs for non-OpenCode images
        run: |
          mkdir -p dist/sbom
          for img in kubesynapse-operator kubesynapse-api-gateway kubesynapse-web-ui; do
            podman run --rm aquasec/trivy image \
              --format spdx-json \
              --output dist/sbom/${img}.spdx.json \
              ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${img}:${{ steps.version.outputs.version }}
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign GHCR images with cosign
        run: |
          for img in kubesynapse-operator kubesynapse-api-gateway kubesynapse-web-ui; do
            cosign sign --yes ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${img}:${{ steps.version.outputs.version }}
          done

      - name: Sign Docker Hub images with cosign
        run: |
          for img in kubesynapse-operator kubesynapse-api-gateway kubesynapse-web-ui; do
            cosign sign --yes ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/${img}:${{ steps.version.outputs.version }}
          done

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms-core
          path: dist/sbom/

  build-opencode-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push OpenCode Runtime
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./opencode-runtime
          file: ./opencode-runtime/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${{ env.OPENCODE_IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/${{ env.OPENCODE_IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/${{ env.OPENCODE_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=KubeSynapse OpenCode Runtime
            org.opencontainers.image.description=Hardened OpenCode runtime for KubeSynapse
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=opencode-runtime-release
          cache-to: type=gha,mode=max,scope=opencode-runtime-release

      - name: Scan OpenCode runtime image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign OpenCode runtime images
        run: |
          cosign sign --yes ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          cosign sign --yes ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Verify OpenCode runtime signatures
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release.yaml@.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }} > /dev/null
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release.yaml@.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }} > /dev/null

      - name: Generate provenance attestation for OpenCode runtime (GHCR)
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${{ env.OPENCODE_IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate provenance attestation for OpenCode runtime (Docker Hub)
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/${{ env.OPENCODE_IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate OpenCode runtime SBOM
        run: |
          mkdir -p dist/sbom dist/image-metadata
          syft registry:${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${{ env.OPENCODE_IMAGE_NAME }}@${{ steps.build.outputs.digest }} \
            --output spdx-json=dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.spdx.json \
            --output cyclonedx-json=dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.cdx.json

      - name: Generate OpenCode runtime SBOM attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/${{ env.OPENCODE_IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.spdx.json
          push-to-registry: true

      - name: Write OpenCode runtime release metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          metadata = {
              "repository": "quay.io/yakdhane/kubesynapse",
              "tag": "${{ steps.version.outputs.version }}",
              "digest": "${{ steps.build.outputs.digest }}",
              "pullPolicy": "IfNotPresent",
          }
          Path("dist/image-metadata").mkdir(parents=True, exist_ok=True)
          Path("dist/image-metadata/opencode-runtime.json").write_text(json.dumps(metadata, indent=2))
          PY

      - name: Upload OpenCode runtime SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms-opencode-runtime
          path: dist/sbom/${{ env.OPENCODE_IMAGE_NAME }}.*

      - name: Upload OpenCode runtime metadata
        uses: actions/upload-artifact@v4
        with:
          name: opencode-runtime-image-metadata
          path: dist/image-metadata/opencode-runtime.json

  helm-oci:
    runs-on: ubuntu-latest
    needs: [build-images, build-opencode-runtime]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: v3.14.0
      - uses: actions/download-artifact@v4
        with:
          name: opencode-runtime-image-metadata
          path: dist/image-metadata

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Pin OpenCode runtime defaults for the release chart
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          values_path = Path("charts/kubesynapse/values.yaml")
          metadata = json.loads(Path("dist/image-metadata/opencode-runtime.json").read_text())
          lines = values_path.read_text().splitlines()

          in_runtime = False
          in_image = False
          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == "opencodeRuntime:":
                  in_runtime = True
                  in_image = False
                  continue
              if in_runtime and not line.startswith("  "):
                  in_runtime = False
                  in_image = False
              if in_runtime and stripped == "image:":
                  in_image = True
                  continue
              if in_image and not line.startswith("    "):
                  in_image = False
              if not (in_runtime and in_image):
                  continue
              if stripped.startswith("tag:"):
                  lines[index] = f"    tag: {metadata['tag']}"
              elif stripped.startswith("digest:"):
                  lines[index] = f"    digest: \"{metadata['digest']}\""
              elif stripped.startswith("pullPolicy:"):
                  lines[index] = f"    pullPolicy: {metadata['pullPolicy']}"

          values_path.write_text("\n".join(lines) + "\n")
          PY

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY_GHCR }}" -u "${{ github.actor }}" --password-stdin

      - name: Package and push Helm chart to OCI (GHCR)
        run: |
          helm package ./charts/kubesynapse --version "${{ steps.version.outputs.version }}" --app-version "${{ steps.version.outputs.version }}" -d ./dist
          CHART_FILE=$(ls ./dist/kubesynapse-*.tgz)
          helm push "$CHART_FILE" "oci://${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAMESPACE_GHCR }}/charts"

      - name: Log in to Docker Hub (Helm)
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY_DOCKERHUB }}" -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Helm chart to Docker Hub OCI
        run: |
          CHART_FILE=$(ls ./dist/kubesynapse-*.tgz)
          helm push "$CHART_FILE" "oci://${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAMESPACE_DOCKERHUB }}/charts"

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/kubesynapse-*.tgz

  github-release:
    runs-on: ubuntu-latest
    needs: [build-images, build-opencode-runtime, helm-oci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "kubesynapse v${{ github.ref_name }}"
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
