apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-litellm
  labels:
    app: litellm
spec:
  type: {{ .Values.litellm.service.type }}
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: litellm
