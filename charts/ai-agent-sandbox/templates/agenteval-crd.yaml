apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentevals.sandbox.enterprise.ai
spec:
  group: sandbox.enterprise.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                agentRef:
                  type: string
                  description: "Name of the AIAgent to evaluate"
                testSuite:
                  type: array
                  items:
                    type: object
                    properties:
                      input:
                        type: string
                        description: "Test prompt to send to the agent"
                      expectedOutput:
                        type: string
                        description: "Expected response (for exact/semantic match)"
                      metrics:
                        type: array
                        items:
                          type: string
                          enum: ["relevance", "faithfulness", "toxicity", "latency", "cost"]
                        description: "Metrics to evaluate on this test case"
                  description: "List of test cases to run against the agent"
                schedule:
                  type: string
                  description: "Cron schedule for recurring evaluations (e.g., '0 */6 * * *')"
                failureThreshold:
                  type: object
                  properties:
                    maxToxicity:
                      type: number
                      description: "Max allowed toxicity score (0-1)"
                    minRelevance:
                      type: number
                      description: "Minimum required relevance score (0-1)"
                    maxLatencyMs:
                      type: integer
                      description: "Maximum allowed response latency in ms"
              required:
                - agentRef
                - testSuite
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["pending", "queued", "running", "completed", "failed"]
                lastRun:
                  type: string
                  format: date-time
                passed:
                  type: boolean
                observedGeneration:
                  type: integer
                summary:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                artifactRef:
                  type: object
                  properties:
                    namespace:
                      type: string
                    pvcName:
                      type: string
                    path:
                      type: string
                    generation:
                      type: integer
                    updatedAt:
                      type: string
                workerJob:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agentRef
        - name: Passed
          type: boolean
          jsonPath: .status.passed
        - name: Last Run
          type: date
          jsonPath: .status.lastRun
  scope: Namespaced
  names:
    plural: agentevals
    singular: agenteval
    kind: AgentEval
    shortNames:
      - eval
