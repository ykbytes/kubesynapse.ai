{{- if .Values.webUi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-web-ui-nginx
  labels:
    app: web-ui
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        # Proxy API calls to the gateway so the UI works whether accessed via
        # port-forward or ingress, without needing VITE_API_BASE_URL set.
        location /api {
            proxy_pass http://{{ include "ai-agent-sandbox.fullname" . }}-api-gateway:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-web-ui
  labels:
    app: web-ui
spec:
  replicas: {{ .Values.webUi.replicaCount }}
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
{{- with (include "ai-agent-sandbox.imagePullSecrets" .) }}
{{ . | nindent 6 }}
{{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "ai-agent-sandbox.fullname" . }}-web-ui-nginx
      containers:
        - name: web-ui
          image: "{{ .Values.webUi.image.repository }}:{{ .Values.webUi.image.tag }}"
          imagePullPolicy: {{ .Values.webUi.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
{{ toYaml .Values.webUi.resources | indent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-web-ui
spec:
  type: {{ .Values.webUi.service.type }}
  selector:
    app: web-ui
  ports:
    - protocol: TCP
      port: {{ .Values.webUi.service.port }}
      targetPort: 80
      name: http
{{- end }}