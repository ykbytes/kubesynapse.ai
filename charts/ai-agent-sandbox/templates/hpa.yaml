# HPA for agent pods based on custom metrics
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-agent-sandbox.fullname" . }}-api-gateway
  minReplicas: {{ .Values.autoscaling.apiGateway.minReplicas | default 1 }}
  maxReplicas: {{ .Values.autoscaling.apiGateway.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# HPA for LiteLLM gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-litellm-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-agent-sandbox.fullname" . }}-litellm
  minReplicas: {{ .Values.autoscaling.litellm.minReplicas | default 1 }}
  maxReplicas: {{ .Values.autoscaling.litellm.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
{{- end }}
