{{- if .Values.skillsCatalog.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-skills-catalog
  labels:
    app.kubernetes.io/component: skills-catalog
    {{- include "ai-agent-sandbox.labels" . | nindent 4 }}
data:
  skills-catalog.json: |
    {{- .Values.skillsCatalog.catalogJson | nindent 4 }}
{{- end }}
