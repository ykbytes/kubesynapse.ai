{{- $secretStoreName := .Values.operator.clusterSecretStoreName | default (printf "%s-secret-store" (include "ai-agent-sandbox.fullname" .)) -}}
{{- $litellmMasterKey := .Values.platformSecrets.native.litellmMasterKey | default .Values.litellm.masterKey -}}
{{- if eq (.Values.platformSecrets.mode | default "native") "external-secrets" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-llm-keys
spec:
  refreshInterval: {{ .Values.platformSecrets.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ include "ai-agent-sandbox.fullname" . }}-llm-api-keys
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: ai-agent-sandbox/openai-api-key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: ai-agent-sandbox/openrouter-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ai-agent-sandbox/anthropic-api-key
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: ai-agent-sandbox/litellm-master-key
    - secretKey: API_GATEWAY_SHARED_TOKEN
      remoteRef:
        key: ai-agent-sandbox/api-gateway-shared-token
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: ai-agent-sandbox/database-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: ai-agent-sandbox/jwt-secret
    - secretKey: AUTH_BOOTSTRAP_ADMIN_PASSWORD
      remoteRef:
        key: ai-agent-sandbox/auth-bootstrap-admin-password
    - secretKey: LDAP_BIND_PASSWORD
      remoteRef:
        key: ai-agent-sandbox/ldap-bind-password
    - secretKey: OIDC_PROVIDERS_JSON
      remoteRef:
        key: ai-agent-sandbox/oidc-providers-json
    - secretKey: SAML_PROVIDERS_JSON
      remoteRef:
        key: ai-agent-sandbox/saml-providers-json
{{- if .Values.platformSecrets.externalSecrets.createClusterSecretStore }}
---
# ClusterSecretStore — configure to point at your Vault/Azure KV/AWS SM
# This is a template; users must populate backend details in values.yaml
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ $secretStoreName }}
spec:
  provider:
    # --- HashiCorp Vault Example ---
    # vault:
    #   server: "https://vault.example.com"
    #   path: "secret"
    #   version: "v2"
    #   auth:
    #     kubernetes:
    #       mountPath: "kubernetes"
    #       role: "ai-agent-sandbox"
    # --- Azure Key Vault Example ---
    # azurekv:
    #   authType: WorkloadIdentity
    #   vaultUrl: "https://my-keyvault.vault.azure.net"
    #   serviceAccountRef:
    #     name: {{ include "ai-agent-sandbox.fullname" . }}-operator-sa
    # --- AWS Secrets Manager Example ---
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: {{ include "ai-agent-sandbox.fullname" . }}-operator-sa
    fake:
      data:
        - key: "ai-agent-sandbox/openai-api-key"
          value: {{ .Values.platformSecrets.native.openaiApiKey | quote }}
        - key: "ai-agent-sandbox/openrouter-api-key"
          value: {{ .Values.platformSecrets.native.openrouterApiKey | quote }}
        - key: "ai-agent-sandbox/anthropic-api-key"
          value: {{ .Values.platformSecrets.native.anthropicApiKey | quote }}
        - key: "ai-agent-sandbox/litellm-master-key"
          value: {{ $litellmMasterKey | quote }}
        - key: "ai-agent-sandbox/api-gateway-shared-token"
          value: {{ .Values.platformSecrets.native.apiGatewaySharedToken | quote }}
        - key: "ai-agent-sandbox/database-password"
          value: {{ .Values.platformSecrets.native.databasePassword | quote }}
        - key: "ai-agent-sandbox/jwt-secret"
          value: {{ .Values.platformSecrets.native.jwtSecret | quote }}
        - key: "ai-agent-sandbox/auth-bootstrap-admin-password"
          value: {{ .Values.platformSecrets.native.authBootstrapAdminPassword | quote }}
        - key: "ai-agent-sandbox/ldap-bind-password"
          value: {{ .Values.platformSecrets.native.ldapBindPassword | quote }}
        - key: "ai-agent-sandbox/oidc-providers-json"
          value: {{ .Values.platformSecrets.native.oidcProvidersJson | quote }}
        - key: "ai-agent-sandbox/saml-providers-json"
          value: {{ .Values.platformSecrets.native.samlProvidersJson | quote }}
{{- end }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-llm-api-keys
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.platformSecrets.native.openaiApiKey | quote }}
  OPENROUTER_API_KEY: {{ .Values.platformSecrets.native.openrouterApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.platformSecrets.native.anthropicApiKey | quote }}
  LITELLM_MASTER_KEY: {{ $litellmMasterKey | quote }}
  API_GATEWAY_SHARED_TOKEN: {{ .Values.platformSecrets.native.apiGatewaySharedToken | quote }}
  DATABASE_PASSWORD: {{ .Values.platformSecrets.native.databasePassword | quote }}
  JWT_SECRET: {{ .Values.platformSecrets.native.jwtSecret | quote }}
  AUTH_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.platformSecrets.native.authBootstrapAdminPassword | quote }}
  LDAP_BIND_PASSWORD: {{ .Values.platformSecrets.native.ldapBindPassword | quote }}
  OIDC_PROVIDERS_JSON: {{ .Values.platformSecrets.native.oidcProvidersJson | quote }}
  SAML_PROVIDERS_JSON: {{ .Values.platformSecrets.native.samlProvidersJson | quote }}
{{- end }}
