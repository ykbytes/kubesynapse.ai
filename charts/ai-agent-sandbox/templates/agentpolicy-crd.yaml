apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentpolicies.sandbox.enterprise.ai
spec:
  group: sandbox.enterprise.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # --- Input Guardrails ---
                inputGuardrails:
                  type: object
                  properties:
                    blockPromptInjection:
                      type: boolean
                      description: "Block known prompt injection patterns"
                    blockedPatterns:
                      type: array
                      items:
                        type: string
                      description: "Regex patterns to block in user input"
                    maxInputTokens:
                      type: integer
                      description: "Maximum allowed input tokens per request"
                # --- Output Guardrails ---
                outputGuardrails:
                  type: object
                  properties:
                    maskPII:
                      type: boolean
                      description: "Automatically mask PII (SSN, credit cards, emails, phone numbers)"
                    blockedOutputPatterns:
                      type: array
                      items:
                        type: string
                      description: "Regex patterns to redact from LLM output"
                    maxOutputTokens:
                      type: integer
                      description: "Maximum allowed output tokens per response"
                # --- Budget & Rate Limiting ---
                budget:
                  type: object
                  properties:
                    maxTokensPerHour:
                      type: integer
                      description: "Hard cap on total tokens (input+output) per hour"
                    maxRequestsPerMinute:
                      type: integer
                      description: "Rate limit: max LLM requests per minute"
                    maxCostPerDayUSD:
                      type: string
                      description: "Maximum dollar spend per day (e.g., '10.00')"
                # --- Allowed Models ---
                allowedModels:
                  type: array
                  items:
                    type: string
                  description: "Whitelist of LLM models this policy permits (e.g., ['gpt-4', 'claude-3-sonnet'])"
                # --- MCP Server Access Control ---
                allowedMcpServers:
                  type: array
                  items:
                    type: string
                  description: |
                    Whitelist of MCP server names (mcp.sandbox.enterprise.ai/type label values)
                    this agent is permitted to call. If empty, no MCP calls are allowed.
                    The operator enforces this by generating per-agent NetworkPolicy egress
                    rules that restrict which mcp-server pods in the mcp-hub namespace are
                    reachable. Example: ['github']
                mcpRequireHitl:
                  type: boolean
                  default: true
                  description: |
                    When true (default), every MCP tool call is routed through hitl_gate()
                    before execution, requiring an AgentApproval CR to be created and approved.
                    Set to false only for fully-trusted, read-only MCP tools.
  scope: Namespaced
  names:
    plural: agentpolicies
    singular: agentpolicy
    kind: AgentPolicy
    shortNames:
      - policy
