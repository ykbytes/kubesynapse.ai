apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aiagents.sandbox.enterprise.ai
spec:
  group: sandbox.enterprise.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Runtime
          type: string
          jsonPath: .spec.runtime.kind
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                model:
                  type: string
                  description: "The LLM model to use, routed via LiteLLM (e.g., gpt-4)"
                systemPrompt:
                  type: string
                  description: "The system instructions for the agent"
                policyRef:
                  type: string
                  description: "Optional AgentPolicy name to enforce for this agent"
                a2a:
                  type: object
                  description: "Optional inbound A2A caller allow-list for direct agent-to-agent invocation"
                  properties:
                    allowedCallers:
                      type: array
                      description: "Explicit list of caller agents allowed to invoke this agent directly over the runtime API"
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: "Caller AIAgent name"
                          namespace:
                            type: string
                            description: "Caller AIAgent namespace"
                        required:
                          - name
                          - namespace
                skills:
                  type: object
                  description: "Optional file-backed skills used to steer the agent and declare runtime capability grants"
                  properties:
                    files:
                      type: object
                      description: |
                        Map of relative Markdown skill paths, typically .github/skills/<name>/SKILL.md,
                        to the file contents that should be materialized inside the runtime.
                        The skill file body steers the agent and optional frontmatter can declare
                        allowed sandbox tools, MCP servers, A2A targets, subagent usage, and Goose extensions.
                      additionalProperties:
                        type: string
                runtime:
                  type: object
                  description: "Selects which runtime implementation should execute this agent"
                  properties:
                    kind:
                      type: string
                      enum:
                        - langgraph
                        - goose
                        - codex
                      description: "Runtime implementation to provision for this agent"
                    goose:
                      type: object
                      description: "Goose-specific configuration used when runtime.kind=goose"
                      properties:
                        configFiles:
                          type: object
                          description: |
                            Optional map of relative Goose config-root paths to file contents,
                            for example config.yaml or prompts/review.md. Agent-specific entries
                            override chart-wide GOOSE_RUNTIME_CONFIG_FILES_JSON defaults by path.
                          additionalProperties:
                            x-kubernetes-preserve-unknown-fields: true
                    codex:
                      type: object
                      description: "Codex-specific configuration used when runtime.kind=codex"
                      properties:
                        configFiles:
                          type: object
                          description: |
                            Optional map of relative Codex config paths to file contents.
                            Agent-specific entries override chart-wide CODEX_RUNTIME_CONFIG_FILES_JSON defaults by path.
                          additionalProperties:
                            x-kubernetes-preserve-unknown-fields: true
                gitConfig:
                  type: object
                  description: "Git repository configuration for autonomous dev-loop workflows"
                  properties:
                    repoUrl:
                      type: string
                      description: "Git remote URL (HTTPS or SSH)"
                    defaultBranch:
                      type: string
                      description: "Base branch to create feature branches from (default: main)"
                    pushPolicy:
                      type: string
                      enum:
                        - after-each-commit
                        - end-of-session
                        - on-approval
                        - never
                      description: "When to push commits to the remote"
                    authMethod:
                      type: string
                      enum:
                        - token
                        - basic
                        - ssh
                      description: "Git authentication method"
                    credentialSecretRef:
                      type: string
                      description: "Name of the K8s Secret holding git credentials"
                  required:
                    - repoUrl
                    - authMethod
                    - credentialSecretRef
                mcpServers:
                  type: array
                  items:
                    type: string
                  description: "List of remote MCP server names to connect to (Legacy/Shared)"
                mcpSidecars:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      image:
                        type: string
                      port:
                        type: integer
                  description: "List of MCP servers to inject as local sidecars for zero-trust security"
                enableGVisor:
                  type: boolean
                  description: "If true, configures the Pod to use the gVisor runtime class (if available)"
                storage:
                  type: object
                  properties:
                    size:
                      type: string
                      description: "Persistent storage request for LangGraph checkpoints (for example '1Gi')"
                    storageClassName:
                      type: string
                      description: "Optional StorageClass name for checkpoint persistence"
              required:
                - model
  scope: Namespaced
  names:
    plural: aiagents
    singular: aiagent
    kind: AIAgent
    shortNames:
      - agent
