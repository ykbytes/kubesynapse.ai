apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-agent-sandbox.fullname" . }}-litellm-config
data:
  config.yaml: |
{{ .Values.litellm.config | toYaml | indent 4 }}
    litellm_settings:
      cache: true
      cache_params:
        type: "redis"
        host: "{{ include "ai-agent-sandbox.fullname" . }}-redis"
        port: 6379
