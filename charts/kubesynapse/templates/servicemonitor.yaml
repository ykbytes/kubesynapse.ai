{{- if .Values.telemetry.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator
  labels:
    {{- include "kubesynapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
    release: prometheus
  {{- with .Values.telemetry.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app: operator
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: readiness
      path: /metrics
      interval: {{ .Values.telemetry.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.telemetry.serviceMonitor.scrapeTimeout | default "10s" }}
      honorLabels: true
{{- end }}
