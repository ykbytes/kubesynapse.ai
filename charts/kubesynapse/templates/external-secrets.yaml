{{- $secretStoreName := .Values.operator.clusterSecretStoreName | default (printf "%s-secret-store" (include "kubesynapse.fullname" .)) -}}
{{- $secretName := printf "%s-llm-api-keys" (include "kubesynapse.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingSecretData := dict -}}
{{- if $existingSecret -}}
{{- $existingSecretData = (get $existingSecret "data") | default dict -}}
{{- end -}}
{{/* §security-P0: Required secrets — must be overridden or install fails. */}}
{{- $litellmMasterKey := .Values.platformSecrets.native.litellmMasterKey | default "" -}}
{{- $apiGatewaySharedToken := .Values.platformSecrets.native.apiGatewaySharedToken | default "" -}}
{{- $databasePassword := .Values.platformSecrets.native.databasePassword | default "" -}}
{{- $jwtSecret := .Values.platformSecrets.native.jwtSecret | default "" -}}
{{- $collectorToken := .Values.platformSecrets.native.collectorToken | default "" -}}
{{- $redisPassword := .Values.platformSecrets.native.redisPassword | default "" -}}
{{- $natsToken := .Values.platformSecrets.native.natsToken | default "" -}}
{{- $openaiApiKey := include "kubesynapse.secretValue" (dict "value" (.Values.platformSecrets.native.openaiApiKey | default "") "default" "" "secretData" $existingSecretData "key" "OPENAI_API_KEY") -}}
{{- $openrouterApiKey := include "kubesynapse.secretValue" (dict "value" (.Values.platformSecrets.native.openrouterApiKey | default "") "default" "" "secretData" $existingSecretData "key" "OPENROUTER_API_KEY") -}}
{{- $anthropicApiKey := include "kubesynapse.secretValue" (dict "value" (.Values.platformSecrets.native.anthropicApiKey | default "") "default" "" "secretData" $existingSecretData "key" "ANTHROPIC_API_KEY") -}}
{{- $mistralApiKey := include "kubesynapse.secretValue" (dict "value" (.Values.platformSecrets.native.mistralApiKey | default "") "default" "" "secretData" $existingSecretData "key" "MISTRAL_API_KEY") -}}
{{- $githubCopilotToken := include "kubesynapse.secretValue" (dict "value" "" "default" "" "secretData" $existingSecretData "key" "GITHUB_COPILOT_TOKEN") -}}
{{- $opencodeApiKey := include "kubesynapse.secretValue" (dict "value" (.Values.platformSecrets.native.opencodeApiKey | default "") "default" "" "secretData" $existingSecretData "key" "OPENCODE_API_KEY") -}}
{{- $opencodeGoApiKey := include "kubesynapse.secretValue" (dict "value" (.Values.platformSecrets.native.opencodeGoApiKey | default "") "default" "" "secretData" $existingSecretData "key" "OPENCODE_GO_API_KEY") -}}
{{/* Preserve existing secret values on upgrade; require overrides on fresh install. */}}
{{- if not $existingSecret -}}
{{-   $_ := required "platformSecrets.native.litellmMasterKey is required and must be a strong random value" (and $litellmMasterKey (ne $litellmMasterKey "")) -}}
{{-   $_ := required "platformSecrets.native.apiGatewaySharedToken is required and must be a strong random value" (and $apiGatewaySharedToken (ne $apiGatewaySharedToken "")) -}}
{{-   $_ := required "platformSecrets.native.databasePassword is required and must be a strong random value" (and $databasePassword (ne $databasePassword "")) -}}
{{-   $_ := required "platformSecrets.native.jwtSecret is required and must be a strong random value" (and $jwtSecret (ne $jwtSecret "")) -}}
{{- end -}}
{{/* Fall through to existing secret data on upgrade. */}}
{{- $litellmMasterKey = include "kubesynapse.secretValue" (dict "value" $litellmMasterKey "default" "" "secretData" $existingSecretData "key" "LITELLM_MASTER_KEY") -}}
{{- $apiGatewaySharedToken = include "kubesynapse.secretValue" (dict "value" $apiGatewaySharedToken "default" "" "secretData" $existingSecretData "key" "API_GATEWAY_SHARED_TOKEN") -}}
{{- $databasePassword = include "kubesynapse.secretValue" (dict "value" $databasePassword "default" "" "secretData" $existingSecretData "key" "DATABASE_PASSWORD") -}}
{{- $jwtSecret = include "kubesynapse.secretValue" (dict "value" $jwtSecret "default" "" "secretData" $existingSecretData "key" "JWT_SECRET") -}}
{{/* Auto-generate collector token, redis password, and NATS token if not set */}}
{{- $collectorToken = include "kubesynapse.secretValue" (dict "value" $collectorToken "default" (randAscii 48) "secretData" $existingSecretData "key" "COLLECTOR_TOKEN") -}}
{{- $redisPassword = include "kubesynapse.secretValue" (dict "value" $redisPassword "default" (randAscii 32) "secretData" $existingSecretData "key" "REDIS_PASSWORD") -}}
{{- $natsToken = include "kubesynapse.secretValue" (dict "value" $natsToken "default" (randAscii 32) "secretData" $existingSecretData "key" "NATS_TOKEN") -}}
{{- if eq (.Values.platformSecrets.mode | default "native") "external-secrets" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "kubesynapse.fullname" . }}-llm-keys
spec:
  refreshInterval: {{ .Values.platformSecrets.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: kubesynapse/openai-api-key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: kubesynapse/openrouter-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: kubesynapse/anthropic-api-key
    - secretKey: MISTRAL_API_KEY
      remoteRef:
        key: kubesynapse/mistral-api-key
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: kubesynapse/litellm-master-key
    - secretKey: API_GATEWAY_SHARED_TOKEN
      remoteRef:
        key: kubesynapse/api-gateway-shared-token
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: kubesynapse/database-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: kubesynapse/jwt-secret
    - secretKey: AUTH_BOOTSTRAP_ADMIN_PASSWORD
      remoteRef:
        key: kubesynapse/auth-bootstrap-admin-password
    - secretKey: LDAP_BIND_PASSWORD
      remoteRef:
        key: kubesynapse/ldap-bind-password
    - secretKey: OIDC_PROVIDERS_JSON
      remoteRef:
        key: kubesynapse/oidc-providers-json
    - secretKey: SAML_PROVIDERS_JSON
      remoteRef:
        key: kubesynapse/saml-providers-json
    - secretKey: GITHUB_COPILOT_TOKEN
      remoteRef:
        key: kubesynapse/github-copilot-token
    - secretKey: OPENCODE_API_KEY
      remoteRef:
        key: kubesynapse/opencode-api-key
    - secretKey: OPENCODE_GO_API_KEY
      remoteRef:
        key: kubesynapse/opencode-go-api-key
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: kubesynapse/redis-password
    - secretKey: NATS_TOKEN
      remoteRef:
        key: kubesynapse/nats-token
{{- if .Values.platformSecrets.externalSecrets.createClusterSecretStore }}
---
# ClusterSecretStore — configure to point at your Vault/Azure KV/AWS SM
# This is a template; users must populate backend details in values.yaml
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ $secretStoreName }}
spec:
  provider:
    # --- HashiCorp Vault Example ---
    # vault:
    #   server: "https://vault.example.com"
    #   path: "secret"
    #   version: "v2"
    #   auth:
    #     kubernetes:
    #       mountPath: "kubernetes"
    #       role: "kubesynapse"
    # --- Azure Key Vault Example ---
    # azurekv:
    #   authType: WorkloadIdentity
    #   vaultUrl: "https://my-keyvault.vault.azure.net"
    #   serviceAccountRef:
    #     name: {{ include "kubesynapse.fullname" . }}-operator-sa
    # --- AWS Secrets Manager Example ---
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: {{ include "kubesynapse.fullname" . }}-operator-sa
    fake:
      data:
        - key: "kubesynapse/openai-api-key"
          value: {{ .Values.platformSecrets.native.openaiApiKey | quote }}
        - key: "kubesynapse/openrouter-api-key"
          value: {{ .Values.platformSecrets.native.openrouterApiKey | quote }}
        - key: "kubesynapse/anthropic-api-key"
          value: {{ .Values.platformSecrets.native.anthropicApiKey | quote }}
        - key: "kubesynapse/mistral-api-key"
          value: {{ .Values.platformSecrets.native.mistralApiKey | quote }}
        - key: "kubesynapse/litellm-master-key"
          value: {{ $litellmMasterKey | quote }}
        - key: "kubesynapse/api-gateway-shared-token"
          value: {{ $apiGatewaySharedToken | quote }}
        - key: "kubesynapse/database-password"
          value: {{ $databasePassword | quote }}
        - key: "kubesynapse/jwt-secret"
          value: {{ $jwtSecret | quote }}
        - key: "kubesynapse/auth-bootstrap-admin-password"
          value: {{ .Values.platformSecrets.native.authBootstrapAdminPassword | quote }}
        - key: "kubesynapse/ldap-bind-password"
          value: {{ .Values.platformSecrets.native.ldapBindPassword | quote }}
        - key: "kubesynapse/oidc-providers-json"
          value: {{ .Values.platformSecrets.native.oidcProvidersJson | quote }}
        - key: "kubesynapse/saml-providers-json"
          value: {{ .Values.platformSecrets.native.samlProvidersJson | quote }}
        - key: "kubesynapse/redis-password"
          value: {{ .Values.redis.auth.password | default "" | quote }}
        - key: "kubesynapse/nats-token"
          value: {{ .Values.nats.auth.token | default "" | quote }}
{{- end }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ $openaiApiKey | quote }}
  OPENROUTER_API_KEY: {{ $openrouterApiKey | quote }}
  ANTHROPIC_API_KEY: {{ $anthropicApiKey | quote }}
  MISTRAL_API_KEY: {{ $mistralApiKey | quote }}
  LITELLM_MASTER_KEY: {{ $litellmMasterKey | quote }}
  API_GATEWAY_SHARED_TOKEN: {{ $apiGatewaySharedToken | quote }}
  DATABASE_PASSWORD: {{ $databasePassword | quote }}
{{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:%s/kubesynapse" .Values.postgresql.username $databasePassword (include "kubesynapse.fullname" .) (toString (.Values.postgresql.service.port | default 5432)) | quote }}
{{- end }}
  JWT_SECRET: {{ $jwtSecret | quote }}
  COLLECTOR_TOKEN: {{ $collectorToken | quote }}
  REDIS_PASSWORD: {{ $redisPassword | quote }}
  NATS_TOKEN: {{ $natsToken | quote }}
  AUTH_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.platformSecrets.native.authBootstrapAdminPassword | quote }}
  LDAP_BIND_PASSWORD: {{ .Values.platformSecrets.native.ldapBindPassword | quote }}
  OIDC_PROVIDERS_JSON: {{ .Values.platformSecrets.native.oidcProvidersJson | quote }}
  SAML_PROVIDERS_JSON: {{ .Values.platformSecrets.native.samlProvidersJson | quote }}
  GITHUB_COPILOT_TOKEN: {{ $githubCopilotToken | quote }}
  OPENCODE_API_KEY: {{ $opencodeApiKey | quote }}
  OPENCODE_GO_API_KEY: {{ $opencodeGoApiKey | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | default "" | quote }}
  NATS_TOKEN: {{ .Values.nats.auth.token | default "" | quote }}
{{- end }}
