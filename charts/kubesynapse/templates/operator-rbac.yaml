apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-role
rules:
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, patch, get]
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents, agenttenants, agentpolicies, agentapprovals, agentworkflows, agentevals]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents/status, agentapprovals/status, agentworkflows/status, agentevals/status, agenttenants/status]
    verbs: [get, patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets, observationpolicies, observationreports, connectorplugins]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets/status, observationpolicies/status, observationreports/status, connectorplugins/status]
    verbs: [get, patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [webhookreceivers, workflowtriggers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [webhookreceivers/status, workflowtriggers/status]
    verbs: [get, patch, update]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: [""]
    resources: [pods, services, persistentvolumeclaims, serviceaccounts, resourcequotas, limitranges, configmaps]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [nodes, endpoints, events]
    verbs: [create, get, list, watch, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: ["apps"]
    resources: [deployments, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [cronjobs]
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: ["external-secrets.io"]
    resources: [externalsecrets]
    verbs: [create, delete, get, list, watch, patch, update]
  # Operator creates per-agent NetworkPolicy egress rules that restrict which
  # mcp-server pods are reachable based on AgentPolicy.spec.allowedMcpServers.
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, watch, patch, update]
  # Operator reads the mcp-auth secret to pass the bearer token as an env var
  # into the agent StatefulSet, so agents can authenticate to MCP servers.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, delete, get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynapse.fullname" . }}-operator-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-operator-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-role
rules:
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents, agentworkflows, agentevals]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentapprovals]
    verbs: [get, list, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentapprovals/status]
    verbs: [patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentworkflows/status]
    verbs: [patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets, observationpolicies, observationreports, connectorplugins]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets/status, observationpolicies/status, observationreports/status, connectorplugins/status]
    verbs: [patch, update]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-api-gateway-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
# P0-2: Namespace-scoped Role for secret/configmap access in the operator
# namespace only (provider registry, credential store).  Replaces the
# former cluster-wide ClusterRole that allowed reading all secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-secrets
  namespace: {{ .Release.Namespace | default "default" }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, create, update, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, create, update]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-secrets-binding
  namespace: {{ .Release.Namespace | default "default" }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-api-gateway-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-runtime-role
rules:
  # Kubernetes MCP sidecar — read-only access to cluster resources
  - apiGroups: [""]
    resources: [pods, services, nodes, events, configmaps, endpoints, persistentvolumeclaims, namespaces, resourcequotas, limitranges]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, patch, update]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentpolicies, aiagents, agentworkflows]
    verbs: [get, list, watch]
  # Runtime agents must NOT mutate platform CRDs (least-privilege). The
  # agentapprovals resource is the only exception: runtimes need to create
  # approval requests and read their status.
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentapprovals]
    verbs: [create, get, list, watch]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.runtimeServiceAccount.name | quote }}
---
# ClusterRoleBinding removed per security audit P1-5.
# Runtimes receive namespace-scoped RoleBindings from the operator.
# Cluster-wide read access is granted only when explicitly enabled
# via .Values.agentRuntime.clusterReadAccess (see agent-network-policy.yaml).
{{- if .Values.agentRuntime.clusterReadAccess }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-runtime-readonly-role
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-runtime-readonly-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynapse.fullname" . }}-runtime-readonly-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.runtimeServiceAccount.name | quote }}
    namespace: {{ .Release.Namespace | default "default" }}
{{- end }}
