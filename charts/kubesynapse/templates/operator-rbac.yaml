apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-sa
---
# ---------------------------------------------------------------------------
# Operator ClusterRole — cluster-scoped read + namespace-scoped mutations
# §security-P0: Tightened from cluster-wide secrets/nodes/events mutation.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-role
rules:
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, patch, get]
  # --- KubeSynapse CRDs (cluster-scoped) ---
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents, agenttenants, agentpolicies, agentapprovals, agentworkflows]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents/status, agentapprovals/status, agentworkflows/status, agenttenants/status]
    verbs: [get, patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets, observationpolicies, observationreports, connectorplugins, mcpconnections]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets/status, observationpolicies/status, observationreports/status, connectorplugins/status, mcpconnections/status]
    verbs: [get, patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [webhookreceivers, workflowtriggers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [webhookreceivers/status, workflowtriggers/status]
    verbs: [get, patch, update]
  # --- API extensions (read-only) ---
  - apiGroups: ["apiextensions.k8s.io"]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  # --- Workloads (cluster-scoped to create across namespaces) ---
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [create, delete, get, list, watch, patch, update]
  # --- Core resources (namespace-scoped; ClusterRole needed for cross-namespace ops) ---
  - apiGroups: [""]
    resources: [pods, services, persistentvolumeclaims, serviceaccounts, configmaps]
    verbs: [create, delete, get, list, watch, patch, update]
  # ResourceQuota and LimitRange — read-only (mutated via tenant controller with explicit opt-in)
  - apiGroups: [""]
    resources: [resourcequotas, limitranges]
    verbs: [get, list, watch]
  # --- Namespace read ---
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
  # --- Nodes: read-only (was: create, patch) ---
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # --- Events: create-only (was: patch) ---
  - apiGroups: [""]
    resources: [events]
    verbs: [create, get, list, watch]
  # --- Endpoints: read-only ---
  - apiGroups: [""]
    resources: [endpoints]
    verbs: [get, list, watch]
  # --- Pod logs ---
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  # --- RBAC for tenant namespace setup ---
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings]
    verbs: [create, delete, get, list, watch, patch, update]
  # --- Read-only workload introspection ---
  - apiGroups: ["apps"]
    resources: [deployments, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [cronjobs]
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  # --- External secrets (cluster-scoped) ---
  - apiGroups: ["external-secrets.io"]
    resources: [externalsecrets]
    verbs: [create, delete, get, list, watch, patch, update]
  # --- NetworkPolicies (per-agent isolation rules) ---
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, watch, patch, update]
  # --- Secrets: cluster-wide read for cross-namespace secret lookups (e.g. MCP hub auth);
  #     create/patch/update is namespace-scoped via the Role below.
  #     §security-P0: was create, delete, get, patch, update cluster-wide; scoped down.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynapse.fullname" . }}-operator-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-operator-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
# ---------------------------------------------------------------------------
# Operator Namespace-Scoped Role — secrets full CRUD, configmaps
# §security-P0: secrets create/patch/update moved here from ClusterRole.
# Cross-namespace secret reads still go through the ClusterRole above.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-local
  namespace: {{ .Release.Namespace | default "default" }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, delete, get, list, patch, update]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-operator-local-binding
  namespace: {{ .Release.Namespace | default "default" }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubesynapse.fullname" . }}-operator-local
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-operator-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
# ---------------------------------------------------------------------------
# API Gateway ClusterRole
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-role
rules:
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents, agentworkflows]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agenttenants]
    verbs: [create, get, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentapprovals]
    verbs: [get, list, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentapprovals/status]
    verbs: [patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentworkflows/status]
    verbs: [patch, update]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets, observationpolicies, observationreports, connectorplugins]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [observationtargets/status, observationpolicies/status, observationreports/status, connectorplugins/status]
    verbs: [patch, update]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-api-gateway-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
# ---------------------------------------------------------------------------
# API Gateway Namespace-Scoped Role (operator namespace)
# §security-P0: pods/exec REMOVED — replaced by artifact-reader sidecar pattern.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-secrets
  namespace: {{ .Release.Namespace | default "default" }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, create, update]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, create, update]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  # §security-P0: pods/exec verb removed.
  # Artifact reads now use the dedicated artifact-reader sidecar HTTP endpoint.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-secrets-binding
  namespace: {{ .Release.Namespace | default "default" }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubesynapse.fullname" . }}-api-gateway-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-api-gateway-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-runtime-role
rules:
  # Kubernetes MCP sidecar — read-only access to cluster resources
  - apiGroups: [""]
    resources: [pods, services, nodes, events, configmaps, endpoints, persistentvolumeclaims, namespaces, resourcequotas, limitranges]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, patch, update]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentpolicies, aiagents, agentworkflows]
    verbs: [get, list, watch]
  # Runtime agents must NOT mutate platform CRDs (least-privilege). The
  # agentapprovals resource is the only exception: runtimes need to create
  # approval requests and read their status.
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentapprovals]
    verbs: [create, get, list, watch]
---
# ---------------------------------------------------------------------------
# §security-P0: Dedicated worker ServiceAccount with minimal permissions.
# Workers must NOT inherit the operator's broad cluster-wide RBAC.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynapse.fullname" . }}-worker-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-worker-role
rules:
  # Workers must read and patch the workflow resource itself to load spec,
  # manage pending-approval labels, and keep run state in sync.
  - apiGroups: ["kubesynapse.ai"]
    resources: [agentworkflows]
    verbs: [get, list, watch, patch]
  # Workers may need read-only agent access for workflow orchestration.
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents]
    verbs: [get, list, watch]
  # Workers need to update CRD status for workflows and agents
  - apiGroups: ["kubesynapse.ai"]
    resources: [aiagents/status, agentworkflows/status]
    verbs: [get, patch, update]
  # Workers use Kubernetes leases for workflow/job idempotency and recovery.
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [create, delete, get, update]
  # Workers inspect the prior worker Job before taking over an orphaned lease.
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [get]
  # Workers need to report logs back to the gateway
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  # Workers create configmaps for result reporting
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, create, update, patch]
  # Workers read artifacts from PVCs
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-worker-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynapse.fullname" . }}-worker-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynapse.fullname" . }}-worker-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.runtimeServiceAccount.name | quote }}
---
# ClusterRoleBinding removed per security audit P1-5.
# Runtimes receive namespace-scoped RoleBindings from the operator.
# Cluster-wide read access is granted only when explicitly enabled
# via .Values.agentRuntime.clusterReadAccess (see agent-network-policy.yaml).
{{- if .Values.agentRuntime.clusterReadAccess }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynapse.fullname" . }}-runtime-readonly-role
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynapse.fullname" . }}-runtime-readonly-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynapse.fullname" . }}-runtime-readonly-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.runtimeServiceAccount.name | quote }}
    namespace: {{ .Release.Namespace | default "default" }}
{{- end }}
