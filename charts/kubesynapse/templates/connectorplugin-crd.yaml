apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: connectorplugins.kubesynapse.ai
spec:
  group: kubesynapse.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Protocol
          type: string
          jsonPath: .spec.protocol
        - name: Ready
          type: string
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required:
                - image
                - protocol
                - capabilities
              properties:
                description:
                  type: string
                  description: "Human-readable explanation of what this connector talks to and how it collects data."
                image:
                  type: string
                  description: "Container image for the connector."
                protocol:
                  type: string
                  enum:
                    - grpc
                    - http
                  default: grpc
                port:
                  type: integer
                  default: 9090
                  minimum: 1024
                  maximum: 65535
                capabilities:
                  type: array
                  items:
                    type: string
                    enum:
                      - prometheus
                      - kubernetes-api
                      - snmp
                      - gnmi
                      - nats
                      - custom
                healthEndpoint:
                  type: string
                  default: "/healthz"
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "50m"
                        memory:
                          type: string
                          default: "64Mi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "200m"
                        memory:
                          type: string
                          default: "256Mi"
                secretRef:
                  type: string
                  description: "Optional Secret containing connector-specific credentials."
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                ready:
                  type: string
                  enum: ["True", "False", "Unknown"]
                version:
                  type: string
                lastHealthCheck:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
  scope: Namespaced
  names:
    plural: connectorplugins
    singular: connectorplugin
    kind: ConnectorPlugin
    shortNames:
      - cp
      - cplug
