{{- if .Values.nats.enabled }}
{{- $natsAuthToken := .Values.nats.auth.token | default "" -}}
{{- $natsAuthSecretName := .Values.nats.auth.existingSecret | default (printf "%s-nats-auth" (include "kubesynapse.fullname" .)) -}}
{{- $natsAuthSecretKey := .Values.nats.auth.existingSecretKey | default "NATS_TOKEN" -}}
{{- $natsAuthEnabled := or (ne $natsAuthToken "") (ne .Values.nats.auth.existingSecret "") -}}
# NATS deployment for Agent-to-Agent message bus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubesynapse.fullname" . }}-nats
  labels:
    {{- include "kubesynapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
    app: nats
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        {{- include "kubesynapse.labels" . | nindent 8 }}
        app.kubernetes.io/component: nats
        app: nats
    spec:
{{- with (include "kubesynapse.imagePullSecrets" .) }}
{{ . | nindent 6 }}
{{- end }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: {{ include "kubesynapse.imageRef" .Values.nats.image | quote }}
          imagePullPolicy: {{ .Values.nats.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          {{- if $natsAuthEnabled }}
          args: ["-js", "-m", "8222", "-c", "/etc/nats/nats.conf"]
          {{- else }}
          args: ["-js", "-m", "8222"]
          {{- end }}
          resources:
{{ toYaml .Values.nats.resources | indent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if $natsAuthEnabled }}
            - name: nats-config
              mountPath: /etc/nats
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if $natsAuthEnabled }}
        - name: nats-config
          secret:
            secretName: {{ $natsAuthSecretName }}
            items:
              - key: {{ $natsAuthSecretKey }}
                path: nats.conf
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubesynapse.fullname" . }}-nats
  labels:
    {{- include "kubesynapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
    app: nats
spec:
  selector:
    app: nats
  ports:
    - protocol: TCP
      port: 4222
      targetPort: 4222
      name: client
    - protocol: TCP
      port: 8222
      targetPort: 8222
      name: monitor
---
# §security-P0: NATS NetworkPolicy — restrict ingress to control-plane + workers.
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubesynapse.fullname" . }}-nats-isolation
  labels:
    {{- include "kubesynapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
    app: nats
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: operator
        - podSelector:
            matchLabels:
              app: operator-worker
      ports:
        - protocol: TCP
          port: 4222
    # Monitor port — internal only
    - from:
        - podSelector:
            matchLabels:
              app: operator
      ports:
        - protocol: TCP
          port: 8222
  egress:
    # DNS egress — allow resolution via kube-dns in any namespace
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- if and $natsAuthEnabled (eq .Values.nats.auth.existingSecret "") }}
{{- $natsSecretName := printf "%s-nats-auth" (include "kubesynapse.fullname" .) }}
{{- $existingNatsSecret := lookup "v1" "Secret" .Release.Namespace $natsSecretName -}}
{{- $existingNatsSecretData := dict -}}
{{- if $existingNatsSecret -}}
{{- $existingNatsSecretData = (get $existingNatsSecret "data") | default dict -}}
{{- end -}}
{{- $natsTokenValue := include "kubesynapse.secretValue" (dict "value" $natsAuthToken "default" "" "secretData" $existingNatsSecretData "key" "nats.conf") -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $natsSecretName }}
  labels:
    {{- include "kubesynapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
type: Opaque
stringData:
  nats.conf: |
    authorization: { token: "{{ $natsTokenValue }}" }
{{- end }}
{{- end }}
