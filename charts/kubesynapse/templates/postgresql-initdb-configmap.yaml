{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubesynapse.fullname" . }}-postgresql-initdb
data:
  create-litellm-db.sql: |
    SELECT 'CREATE DATABASE litellm OWNER {{ .Values.postgresql.username }}'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'litellm')\gexec
{{- end }}
