# ---------------------------------------------------------------------------
# MCP Hub: Dedicated ServiceAccount (no K8s API access for MCP servers)
# ---------------------------------------------------------------------------
{{- if .Values.mcpHub.enabled }}
{{- $fullname := include "kubesynapse.fullname" . }}
{{- $mcpNamespace := .Values.mcpHub.namespace | default "mcp-hub" }}
{{- $mcpAuthSecretName := .Values.mcpHub.auth.secretName | default (printf "%s-mcp-auth" $fullname) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-mcp-sa
  namespace: {{ $mcpNamespace }}
  labels:
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: kubesynapse
  annotations:
    kubesynapse.ai/role: "mcp-server"
automountServiceAccountToken: false
# ---------------------------------------------------------------------------
# MCP Shared Auth Secret – bearer token agents present on every MCP call.
# Rotate this via external-secrets / Vault in production.
# ---------------------------------------------------------------------------
{{- if not .Values.mcpHub.auth.secretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $mcpAuthSecretName }}
  namespace: {{ $mcpNamespace }}
  labels:
    app.kubernetes.io/component: mcp-server
type: Opaque
stringData:
  # Override with a strong random value via values.yaml or external-secrets
  bearer-token: {{ .Values.mcpHub.auth.bearerToken | default "REPLACE-WITH-STRONG-SECRET" | quote }}
{{- end }}
{{- range $serverType, $server := .Values.mcpHub.servers }}
{{- if $server.enabled }}
---
# ---------------------------------------------------------------------------
# Shared MCP Server Deployment
# All enabled MCP servers MUST follow this template:
#   - Non-root UID 1000
#   - readOnlyRootFilesystem + emptyDir /tmp
#   - Drop ALL Linux capabilities
#   - seccompProfile: RuntimeDefault
#   - Resource limits enforced
#   - Bearer token auth via mounted secret
#   - Liveness + Readiness probes required
#   - Deployed into mcp-hub namespace (NOT the sandbox namespace)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-mcp-{{ $serverType }}
  namespace: {{ $mcpNamespace }}
  labels:
    app: mcp-{{ $serverType }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/name: mcp-{{ $serverType }}
    app.kubernetes.io/part-of: kubesynapse
    mcp.kubesynapse.ai/type: {{ $serverType }}
spec:
  replicas: {{ $server.replicas | default 1 }}
  selector:
    matchLabels:
      app: mcp-{{ $serverType }}
  template:
    metadata:
      labels:
        app: mcp-{{ $serverType }}
        app.kubernetes.io/component: mcp-server
        mcp.kubesynapse.ai/type: {{ $serverType }}
      annotations:
        # Force pod rotation when auth secret changes
        checksum/mcp-auth: {{ printf "%s:%s" $mcpAuthSecretName ($.Values.mcpHub.auth.bearerToken | default "") | sha256sum }}
    spec:
{{- with (include "kubesynapse.imagePullSecrets" $) }}
{{ . | nindent 6 }}
{{- end }}
      serviceAccountName: {{ $fullname }}-mcp-sa
      automountServiceAccountToken: false
      # Pod-level security: enforce non-root, seccomp baseline
{{- if $server.podSecurityContext }}
      securityContext:
{{ toYaml $server.podSecurityContext | indent 8 }}
{{- else }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
{{- end }}
      containers:
        - name: mcp-server
          image: {{ $server.image | quote }}
          imagePullPolicy: {{ $server.imagePullPolicy | default "IfNotPresent" }}
{{- with $server.command }}
          command:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with $server.args }}
          args:
{{ toYaml . | indent 12 }}
{{- end }}
          ports:
            - containerPort: {{ $server.port | default 8000 }}
              name: http
              protocol: TCP
          # Container-level security: read-only FS, drop ALL caps, no setuid
{{- if $server.containerSecurityContext }}
          securityContext:
{{ toYaml $server.containerSecurityContext | indent 12 }}
{{- else }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
{{- end }}
          resources:
{{ toYaml $server.resources | indent 12 }}
          env:
            # Bearer token the server uses to validate inbound requests from agents
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $mcpAuthSecretName }}
                  key: bearer-token
            - name: MCP_SERVER_TYPE
              value: {{ $serverType | quote }}
            - name: MCP_LISTEN_ADDR
              value: {{ printf "0.0.0.0:%v" ($server.port | default 8000) | quote }}
{{- with $server.env }}
{{ toYaml . | indent 12 }}
{{- end }}
{{- $defaultLiveness := dict "httpGet" (dict "path" "/healthz" "port" ($server.port | default 8000)) "initialDelaySeconds" 10 "periodSeconds" 15 "timeoutSeconds" 5 "failureThreshold" 3 }}
{{- $defaultReadiness := dict "httpGet" (dict "path" "/healthz" "port" ($server.port | default 8000)) "initialDelaySeconds" 5 "periodSeconds" 10 "timeoutSeconds" 5 "failureThreshold" 3 }}
          livenessProbe:
{{ ( $server.livenessProbe | default $defaultLiveness ) | toYaml | indent 12 }}
          readinessProbe:
{{ ( $server.readinessProbe | default $defaultReadiness ) | toYaml | indent 12 }}
          volumeMounts:
            # /tmp is the only writable surface; root FS is read-only
            - name: tmp
              mountPath: /tmp
{{- with $server.volumeMounts }}
{{ toYaml . | indent 12 }}
{{- end }}
{{- with $server.extraContainers }}
{{ toYaml . | indent 8 }}
{{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- with $server.volumes }}
{{ toYaml . | indent 8 }}
{{- end }}
      # Spread replicas across nodes for HA; tolerate nothing special
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: mcp-{{ $serverType }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-mcp-{{ $serverType }}
  namespace: {{ $mcpNamespace }}
  labels:
    app.kubernetes.io/component: mcp-server
    mcp.kubesynapse.ai/type: {{ $serverType }}
spec:
  selector:
    app: mcp-{{ $serverType }}
  ports:
    - protocol: TCP
      port: {{ $server.servicePort | default 8000 }}
      targetPort: {{ $server.port | default 8000 }}
      name: http
  # ClusterIP only – never LoadBalancer; agents reach this via internal DNS
  type: ClusterIP
{{- end }}
{{- end }}
{{- end }}
