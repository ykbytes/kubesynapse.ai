apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aiagents.kubesynapse.ai
spec:
  group: kubesynapse.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Runtime
          type: string
          jsonPath: .spec.runtime.kind
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                model:
                  type: string
                  description: "The LLM model to use, routed via LiteLLM (e.g., gpt-4)"
                systemPrompt:
                  type: string
                  description: "The system instructions for the agent"
                policyRef:
                  type: string
                  description: "Optional AgentPolicy reference to enforce for this agent. Supports 'name' or 'namespace/name'."
                allowedNamespaces:
                  type: object
                  description: "Controls which namespaces this agent may reference for cross-namespace A2A targets declared by policy"
                  properties:
                    from:
                      type: string
                      enum:
                        - Same
                        - All
                        - Selector
                      default: Same
                      description: "Whether cross-namespace references are limited to the same namespace, all namespaces, or those matched by selector"
                    selector:
                      type: object
                      description: "Namespace selector used when from=Selector"
                      x-kubernetes-preserve-unknown-fields: true
                a2a:
                  type: object
                  description: "Optional inbound A2A caller allow-list for direct agent-to-agent invocation"
                  properties:
                    allowedCallers:
                      type: array
                      description: "Explicit list of caller agents allowed to invoke this agent directly over the runtime API"
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: "Caller AIAgent name"
                          namespace:
                            type: string
                            description: "Caller AIAgent namespace"
                        required:
                          - name
                          - namespace
                skills:
                  type: object
                  description: "Optional file-backed skills used to steer the agent and declare runtime capability grants"
                  properties:
                    files:
                      type: object
                      description: |
                        Map of relative Markdown skill paths, typically skills/<name>/SKILL.md,
                        to the file contents that should be materialized inside the runtime.
                        The skill file body steers the agent and optional frontmatter can declare
                        allowed sandbox tools, MCP servers, A2A targets, and subagent usage.
                      additionalProperties:
                        type: string
                    configMapRef:
                      type: string
                      description: "Name of a ConfigMap in the same namespace containing skill files"
                runtime:
                  type: object
                  description: "Selects the runtime implementation that should execute this agent"
                  properties:
                    kind:
                      type: string
                      enum:
                        - opencode
                        - pi
                        - mistral-vibe
                      description: "Runtime implementation to provision for this agent"
                    opencode:
                      type: object
                      description: "OpenCode-specific configuration used when runtime.kind=opencode"
                      properties:
                        configFiles:
                          type: object
                          description: |
                            Optional map of relative OpenCode config-root paths to file contents,
                            for example agents/reviewer.md, skills/foo/SKILL.md, or opencode.json.
                            User-provided plugin paths and platform-controlled opencode.json keys
                            such as permission, plugin, mcp, provider, share, and skills are ignored
                            by the runtime security floor. Use AgentPolicy, MCPConnection resources,
                            or admin OPENCODE_* overrides for those controls.
                          additionalProperties:
                            x-kubernetes-preserve-unknown-fields: true
                    pi:
                      type: object
                      description: "Pi-specific configuration used when runtime.kind=pi"
                      properties:
                        provider:
                          type: string
                          description: "LLM provider (anthropic, openai, google, etc.). Defaults to PI_DEFAULT_PROVIDER env or auto-detection."
                        model:
                          type: string
                          description: "Model ID in provider/id format (e.g., anthropic/claude-sonnet-4-20250514). Overrides spec.model when set."
                        thinkingLevel:
                          type: string
                          enum:
                            - "off"
                            - minimal
                            - low
                            - medium
                            - high
                            - xhigh
                          description: "Reasoning/thinking level. Default: medium"
                        noTools:
                          type: boolean
                          description: "Disable all built-in tools (read-only mode)"
                        tools:
                          type: array
                          description: "Explicit tool allowlist (e.g., [read, bash, edit, write, grep, find, ls])"
                          items:
                            type: string
                        noSession:
                          type: boolean
                          description: "Ephemeral mode — don't persist sessions"
                        permissionLevel:
                          type: string
                          enum:
                            - permissive
                            - moderate
                            - strict
                          description: "Security permission level. strict=read-only, moderate=block-dangerous, permissive=allow-all. Default: permissive"
                    mistralVibe:
                      type: object
                      description: "Mistral Vibe-specific configuration used when runtime.kind=mistral-vibe"
                      properties:
                        model:
                          type: string
                          description: "Mistral Vibe model alias. Overrides spec.model when set."
                        noSession:
                          type: boolean
                          description: "Ephemeral mode for the Vibe runtime bridge"
                  required:
                    - kind
                gitConfig:
                  type: object
                  description: "Git repository configuration for autonomous dev-loop workflows"
                  properties:
                    repoUrl:
                      type: string
                      description: "Git remote URL (HTTPS or SSH)"
                    defaultBranch:
                      type: string
                      description: "Base branch to create feature branches from (default: main)"
                    branch:
                      type: string
                      description: "Per-agent working branch (e.g. agent/backend). If set, the git sidecar checks out this branch at startup."
                    pushPolicy:
                      type: string
                      enum:
                        - after-each-commit
                        - end-of-session
                        - on-approval
                        - never
                      description: "When to push commits to the remote"
                    authMethod:
                      type: string
                      enum:
                        - token
                        - basic
                        - ssh
                      description: "Git authentication method"
                    credentialSecretRef:
                      type: string
                      description: "Name of the K8s Secret holding git credentials"
                  required:
                    - repoUrl
                    - authMethod
                    - credentialSecretRef
                githubConfig:
                  type: object
                  description: "Per-agent secret reference used by the shared GitHub MCP adapter"
                  properties:
                    credentialSecretRef:
                      type: string
                      description: "Name of the K8s Secret holding the GitHub personal access token"
                  required:
                    - credentialSecretRef
                mcpConnections:
                  type: array
                  description: "Structured MCP connection snapshots resolved by the gateway, including transport-specific runtime metadata."
                  items:
                    type: object
                    properties:
                      connectionId:
                        type: string
                        nullable: true
                      name:
                        type: string
                      slug:
                        type: string
                      serverId:
                        type: string
                      transport:
                        type: string
                      source:
                        type: string
                    x-kubernetes-preserve-unknown-fields: true
                mcpServers:
                  type: array
                  items:
                    type: string
                  description: "List of remote MCP server names to connect to (Legacy/Shared)"
                mcpSidecars:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      image:
                        type: string
                      port:
                        type: integer
                      env:
                        type: array
                        description: "Environment variables for the sidecar container"
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      resources:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        description: "Resource requests and limits for the sidecar container"
                      networkEgress:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        description: "Network egress allowlist for the sidecar"
                  description: "List of MCP servers to inject as local sidecars for zero-trust security"
                opa:
                  type: object
                  description: "Optional OPA/Rego policy sidecar configuration"
                  properties:
                    enabled:
                      type: boolean
                      description: "If true, inject an OPA sidecar for policy evaluation"
                    policies:
                      type: array
                      description: "Inline Rego policies"
                      items:
                        type: string
                    configMapRef:
                      type: string
                      description: "Name of a ConfigMap in the same namespace containing Rego policies"
                enableGVisor:
                  type: boolean
                  description: "If true, configures the Pod to use the gVisor runtime class (if available)"
                resources:
                  type: object
                  description: "Optional per-agent CPU and memory overrides for the runtime container"
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          description: "Requested CPU quantity for the agent runtime container"
                        memory:
                          type: string
                          description: "Requested memory quantity for the agent runtime container"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          description: "CPU limit for the agent runtime container"
                        memory:
                          type: string
                          description: "Memory limit for the agent runtime container"
                storage:
                  type: object
                  properties:
                    size:
                      type: string
                      description: "Persistent storage request for the runtime workspace (for example '1Gi')"
                    storageClassName:
                      type: string
                      description: "Optional StorageClass name for workspace persistence"
              required:
                - model
                - runtime
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Provisioning, Running, Failed, Terminating]
                  description: "Current lifecycle phase of the agent"
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                observedGeneration:
                  type: integer
                  minimum: 0
                  description: "Latest generation observed by the operator"
  scope: Namespaced
  names:
    plural: aiagents
    singular: aiagent
    kind: AIAgent
    shortNames:
      - agent
