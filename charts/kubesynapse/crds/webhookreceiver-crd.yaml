apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: webhookreceivers.kubesynapse.ai
spec:
  group: kubesynapse.ai
  names:
    kind: WebhookReceiver
    listKind: WebhookReceiverList
    plural: webhookreceivers
    singular: webhookreceiver
    shortNames:
      - whr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: RateLimit
          type: integer
          jsonPath: .spec.rateLimit
        - name: Invocations
          type: integer
          jsonPath: .status.invocationCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [secretRef]
              properties:
                secretRef:
                  type: string
                  description: "K8s Secret reference (namespace/name#key)"
                ipAllowlist:
                  type: array
                  items:
                    type: string
                  description: "CIDR allowlist"
                rateLimit:
                  type: integer
                  default: 60
                  minimum: 1
                  description: "Maximum invocations per minute"
                maxPayloadBytes:
                  type: integer
                  default: 1048576
                  minimum: 1
                  description: "Maximum payload size in bytes"
                enabled:
                  type: boolean
                  default: true
                  description: "Whether this receiver accepts invocations"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Degraded, Failed]
                lastEvaluated:
                  type: string
                  format: date-time
                invocationCount:
                  type: integer
                  minimum: 0
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
