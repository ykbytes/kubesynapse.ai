apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: observationtargets.kubesynapse.ai
spec:
  group: kubesynapse.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.targetType
        - name: Connector
          type: string
          jsonPath: .spec.connectorRef
        - name: Interval
          type: string
          jsonPath: .spec.scrapeInterval
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required:
                - targetType
                - connectorRef
              properties:
                description:
                  type: string
                  description: "Human-readable explanation of what this target watches and why it exists."
                targetType:
                  type: string
                  enum:
                    - prometheus
                    - kubernetes-api
                    - snmp
                    - gnmi
                    - nats
                    - custom
                  description: "The type of target to observe."
                connectorRef:
                  type: string
                  description: "Reference to a ConnectorPlugin CR that handles this target type."
                endpoint:
                  type: string
                  description: "Target endpoint URL or address."
                scrapeInterval:
                  type: string
                  default: "30s"
                  description: "How often to collect metrics from this target."
                policyRef:
                  type: string
                  description: "Reference to an ObservationPolicy CR."
                selector:
                  type: object
                  description: "Label selector to dynamically discover targets."
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchExpressions:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                            enum: [In, NotIn, Exists, DoesNotExist]
                          values:
                            type: array
                            items:
                              type: string
                credentials:
                  type: object
                  description: "Credential source for target access."
                  properties:
                    secretRef:
                      type: string
                    vaultPath:
                      type: string
                    spiffeEnabled:
                      type: boolean
                      default: false
                labels:
                  type: object
                  additionalProperties:
                    type: string
                  description: "Additional labels injected into all collected metrics."
                tlsConfig:
                  type: object
                  description: "TLS configuration for target connections."
                  properties:
                    insecureSkipVerify:
                      type: boolean
                      default: false
                    caSecretRef:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Degraded, Failed]
                lastScrapeTime:
                  type: string
                  format: date-time
                lastScrapeError:
                  type: string
                metricsCollected:
                  type: integer
                connectorHealth:
                  type: string
                  enum: [Healthy, Unhealthy, Unknown]
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
  scope: Namespaced
  names:
    plural: observationtargets
    singular: observationtarget
    kind: ObservationTarget
    shortNames:
      - ot
      - otarget
