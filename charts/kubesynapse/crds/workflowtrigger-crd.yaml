apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflowtriggers.kubesynapse.ai
spec:
  group: kubesynapse.ai
  names:
    kind: WorkflowTrigger
    listKind: WorkflowTriggerList
    plural: workflowtriggers
    singular: workflowtrigger
    shortNames:
      - wft
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: SourceKind
          type: string
          jsonPath: .spec.sourceKind
        - name: SourceRef
          type: string
          jsonPath: .spec.sourceRef
        - name: Target
          type: string
          jsonPath: .spec.workflowRef.name
        - name: TargetType
          type: string
          jsonPath: .spec.targetKind
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Executions
          type: integer
          jsonPath: .status.executionCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [sourceRef, sourceKind]
              oneOf:
                - required: ["workflowRef"]
                - required: ["agentRef"]
              properties:
                sourceRef:
                  type: string
                  description: "Name of the source resource (e.g. WebhookReceiver name)"
                sourceKind:
                  type: string
                  enum: [WebhookReceiver, AgentEvent]
                  description: "Kind of source resource"
                eventFilter:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: "JSON filter conditions applied to the event payload"
                workflowRef:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "Name of the AgentWorkflow to execute"
                    namespace:
                      type: string
                      description: "Namespace of the AgentWorkflow (defaults to trigger namespace)"
                agentRef:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "Name of the AIAgent to invoke directly"
                    namespace:
                      type: string
                      description: "Namespace of the AIAgent (defaults to trigger namespace)"
                payloadMapping:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: "Optional JSON payload mapping for workflow/agent input"
                maxRetries:
                  type: integer
                  default: 0
                  minimum: 0
                  description: "Maximum retry attempts for failed trigger executions"
                backoffSeconds:
                  type: integer
                  default: 60
                  minimum: 0
                  description: "Backoff between retries in seconds"
                notifications_on_success:
                  type: array
                  items:
                    type: string
                  description: "Notification channels on success"
                notifications_on_failure:
                  type: array
                  items:
                    type: string
                  description: "Notification channels on failure"
                enabled:
                  type: boolean
                  default: true
                  description: "Whether this trigger is active"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Degraded, Failed]
                lastEvaluated:
                  type: string
                  format: date-time
                executionCount:
                  type: integer
                  minimum: 0
                failureCount:
                  type: integer
                  minimum: 0
                lastExecution:
                  type: string
                  format: date-time
                lastFailure:
                  type: string
                  format: date-time
                deadLetterCount:
                  type: integer
                  minimum: 0
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
