{{- $secretStoreName := .Values.operator.clusterSecretStoreName | default (printf "%s-secret-store" (include "kubesynth.fullname" .)) -}}
{{- $secretName := printf "%s-llm-api-keys" (include "kubesynth.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingSecretData := dict -}}
{{- if $existingSecret -}}
{{- $existingSecretData = (get $existingSecret "data") | default dict -}}
{{- end -}}
{{- $litellmMasterKey := .Values.platformSecrets.native.litellmMasterKey | default .Values.litellm.masterKey -}}
{{- $litellmMasterKey = include "kubesynth.secretValue" (dict "value" $litellmMasterKey "default" "replace-me" "secretData" $existingSecretData "key" "LITELLM_MASTER_KEY") -}}
{{- $apiGatewaySharedToken := include "kubesynth.secretValue" (dict "value" .Values.platformSecrets.native.apiGatewaySharedToken "default" "replace-me-with-a-long-random-bearer-token" "secretData" $existingSecretData "key" "API_GATEWAY_SHARED_TOKEN") -}}
{{- $databasePassword := include "kubesynth.secretValue" (dict "value" .Values.platformSecrets.native.databasePassword "default" "replace-me-with-a-long-random-database-password" "secretData" $existingSecretData "key" "DATABASE_PASSWORD") -}}
{{- $jwtSecret := include "kubesynth.secretValue" (dict "value" .Values.platformSecrets.native.jwtSecret "default" "replace-me-with-a-long-random-jwt-secret" "secretData" $existingSecretData "key" "JWT_SECRET") -}}
{{- if eq (.Values.platformSecrets.mode | default "native") "external-secrets" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "kubesynth.fullname" . }}-llm-keys
spec:
  refreshInterval: {{ .Values.platformSecrets.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: kubesynth/openai-api-key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: kubesynth/openrouter-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: kubesynth/anthropic-api-key
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: kubesynth/litellm-master-key
    - secretKey: API_GATEWAY_SHARED_TOKEN
      remoteRef:
        key: kubesynth/api-gateway-shared-token
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: kubesynth/database-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: kubesynth/jwt-secret
    - secretKey: AUTH_BOOTSTRAP_ADMIN_PASSWORD
      remoteRef:
        key: kubesynth/auth-bootstrap-admin-password
    - secretKey: LDAP_BIND_PASSWORD
      remoteRef:
        key: kubesynth/ldap-bind-password
    - secretKey: OIDC_PROVIDERS_JSON
      remoteRef:
        key: kubesynth/oidc-providers-json
    - secretKey: SAML_PROVIDERS_JSON
      remoteRef:
        key: kubesynth/saml-providers-json
    - secretKey: GITHUB_COPILOT_TOKEN
      remoteRef:
        key: kubesynth/github-copilot-token
    - secretKey: OPENCODE_API_KEY
      remoteRef:
        key: kubesynth/opencode-api-key
    - secretKey: OPENCODE_GO_API_KEY
      remoteRef:
        key: kubesynth/opencode-go-api-key
{{- if .Values.platformSecrets.externalSecrets.createClusterSecretStore }}
---
# ClusterSecretStore — configure to point at your Vault/Azure KV/AWS SM
# This is a template; users must populate backend details in values.yaml
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ $secretStoreName }}
spec:
  provider:
    # --- HashiCorp Vault Example ---
    # vault:
    #   server: "https://vault.example.com"
    #   path: "secret"
    #   version: "v2"
    #   auth:
    #     kubernetes:
    #       mountPath: "kubernetes"
    #       role: "kubesynth"
    # --- Azure Key Vault Example ---
    # azurekv:
    #   authType: WorkloadIdentity
    #   vaultUrl: "https://my-keyvault.vault.azure.net"
    #   serviceAccountRef:
    #     name: {{ include "kubesynth.fullname" . }}-operator-sa
    # --- AWS Secrets Manager Example ---
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: {{ include "kubesynth.fullname" . }}-operator-sa
    fake:
      data:
        - key: "kubesynth/openai-api-key"
          value: {{ .Values.platformSecrets.native.openaiApiKey | quote }}
        - key: "kubesynth/openrouter-api-key"
          value: {{ .Values.platformSecrets.native.openrouterApiKey | quote }}
        - key: "kubesynth/anthropic-api-key"
          value: {{ .Values.platformSecrets.native.anthropicApiKey | quote }}
        - key: "kubesynth/litellm-master-key"
          value: {{ $litellmMasterKey | quote }}
        - key: "kubesynth/api-gateway-shared-token"
          value: {{ $apiGatewaySharedToken | quote }}
        - key: "kubesynth/database-password"
          value: {{ $databasePassword | quote }}
        - key: "kubesynth/jwt-secret"
          value: {{ $jwtSecret | quote }}
        - key: "kubesynth/auth-bootstrap-admin-password"
          value: {{ .Values.platformSecrets.native.authBootstrapAdminPassword | quote }}
        - key: "kubesynth/ldap-bind-password"
          value: {{ .Values.platformSecrets.native.ldapBindPassword | quote }}
        - key: "kubesynth/oidc-providers-json"
          value: {{ .Values.platformSecrets.native.oidcProvidersJson | quote }}
        - key: "kubesynth/saml-providers-json"
          value: {{ .Values.platformSecrets.native.samlProvidersJson | quote }}
{{- end }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.platformSecrets.native.openaiApiKey | quote }}
  OPENROUTER_API_KEY: {{ .Values.platformSecrets.native.openrouterApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.platformSecrets.native.anthropicApiKey | quote }}
  LITELLM_MASTER_KEY: {{ $litellmMasterKey | quote }}
  API_GATEWAY_SHARED_TOKEN: {{ $apiGatewaySharedToken | quote }}
  DATABASE_PASSWORD: {{ $databasePassword | quote }}
{{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:%s/litellm" .Values.postgresql.username $databasePassword (include "kubesynth.fullname" .) (toString (.Values.postgresql.service.port | default 5432)) | quote }}
{{- end }}
  JWT_SECRET: {{ $jwtSecret | quote }}
  AUTH_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.platformSecrets.native.authBootstrapAdminPassword | quote }}
  LDAP_BIND_PASSWORD: {{ .Values.platformSecrets.native.ldapBindPassword | quote }}
  OIDC_PROVIDERS_JSON: {{ .Values.platformSecrets.native.oidcProvidersJson | quote }}
  SAML_PROVIDERS_JSON: {{ .Values.platformSecrets.native.samlProvidersJson | quote }}
  GITHUB_COPILOT_TOKEN: ""
  OPENCODE_API_KEY: {{ .Values.platformSecrets.native.opencodeApiKey | quote }}
  OPENCODE_GO_API_KEY: {{ .Values.platformSecrets.native.opencodeGoApiKey | quote }}
{{- end }}
