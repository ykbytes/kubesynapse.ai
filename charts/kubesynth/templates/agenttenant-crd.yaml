apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenttenants.kubesynth.ai
spec:
  group: kubesynth.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                tenantName:
                  type: string
                  description: "Human-readable name of the tenant (e.g., 'data-science-team')"
                namespace:
                  type: string
                  description: "Kubernetes namespace to isolate this tenant into"
                resourceQuota:
                  type: object
                  properties:
                    maxCPU:
                      type: string
                      description: "Max CPU quota (e.g., '8')"
                    maxMemory:
                      type: string
                      description: "Max memory quota (e.g., '16Gi')"
                    maxPods:
                      type: integer
                      description: "Maximum number of agent pods"
                    maxGPU:
                      type: string
                      description: "Max GPU quota (e.g., '2')"
                    maxParallelSteps:
                      type: integer
                      minimum: 1
                      description: "Maximum parallel workflow steps per execution (default: 4)"
                allowedModels:
                  type: array
                  items:
                    type: string
                  description: "LLM models this tenant is allowed to use"
                adminUsers:
                  type: array
                  items:
                    type: string
                  description: "List of OIDC usernames/groups who can manage agents in this tenant"
              required:
                - tenantName
                - namespace
  scope: Cluster
  names:
    plural: agenttenants
    singular: agenttenant
    kind: AgentTenant
    shortNames:
      - tenant
