{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubesynth.fullname" . }}-litellm
  labels:
    {{- include "kubesynth.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
    app: litellm
spec:
  type: {{ .Values.litellm.service.type }}
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: litellm
{{- end }}
