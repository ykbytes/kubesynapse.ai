apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynth.fullname" . }}-operator-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynth.fullname" . }}-api-gateway-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynth.fullname" . }}-operator-role
rules:
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, patch, get]
  - apiGroups: ["kubesynth.ai"]
    resources: [aiagents, agenttenants, agentpolicies, agentapprovals, agentworkflows, agentevals]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynth.ai"]
    resources: [aiagents/status, agentapprovals/status, agentworkflows/status, agentevals/status, agenttenants/status]
    verbs: [get, patch, update]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: [""]
    resources: [pods, services, persistentvolumeclaims, serviceaccounts, namespaces, resourcequotas, limitranges, configmaps]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings]
    verbs: [create, delete, get, list, watch, patch, update]
  - apiGroups: ["external-secrets.io"]
    resources: [externalsecrets]
    verbs: [create, delete, get, list, watch, patch, update]
  # Operator creates per-agent NetworkPolicy egress rules that restrict which
  # mcp-server pods are reachable based on AgentPolicy.spec.allowedMcpServers.
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, watch, patch, update]
  # Operator reads the mcp-auth secret to pass the bearer token as an env var
  # into the agent StatefulSet, so agents can authenticate to MCP servers.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, delete, get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynth.fullname" . }}-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynth.fullname" . }}-operator-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynth.fullname" . }}-operator-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynth.fullname" . }}-api-gateway-role
rules:
  - apiGroups: ["kubesynth.ai"]
    resources: [aiagents, agentworkflows, agentevals]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["kubesynth.ai"]
    resources: [agentpolicies]
    verbs: [get, list, watch]
  - apiGroups: ["kubesynth.ai"]
    resources: [agentapprovals]
    verbs: [get, list, watch]
  - apiGroups: ["kubesynth.ai"]
    resources: [agentapprovals/status]
    verbs: [patch, update]
  - apiGroups: ["kubesynth.ai"]
    resources: [agentworkflows/status]
    verbs: [patch, update]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, update]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynth.fullname" . }}-api-gateway-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynth.fullname" . }}-api-gateway-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynth.fullname" . }}-api-gateway-sa
    namespace: {{ .Release.Namespace | default "default" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynth.fullname" . }}-runtime-role
rules:
  - apiGroups: ["kubesynth.ai"]
    resources: [agentpolicies]
    verbs: [get, list, watch]
  - apiGroups: ["kubesynth.ai"]
    resources: [agentapprovals]
    verbs: [create, get, list, watch]
