{{- if .Values.trustBundle.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ default (printf "%s-trust-bundle" (include "kubesynth.fullname" .)) .Values.trustBundle.configMapName }}
  labels:
    {{- include "kubesynth.labels" . | nindent 4 }}
data:
  ca-bundle.pem: |
{{ .Files.Get "files/ca-bundle.pem" | indent 4 }}
{{- end }}
