{{- if .Values.collector.enabled }}
# Intelligence Collector Agent — DaemonSet for gathering cluster intelligence
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kubesynth.fullname" . }}-collector
  labels:
    app: collector-agent
spec:
  selector:
    matchLabels:
      app: collector-agent
  template:
    metadata:
      labels:
        app: collector-agent
    spec:
{{- with (include "kubesynth.imagePullSecrets" .) }}
{{ . | nindent 6 }}
{{- end }}
      serviceAccountName: {{ include "kubesynth.fullname" . }}-collector-sa
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: collector
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.collector.port }}
              name: http
          env:
            - name: COLLECTOR_PORT
              value: "{{ .Values.collector.port }}"
            - name: COLLECTOR_TOKEN
              value: "{{ .Values.collector.token }}"
            - name: CLUSTER_NAME
              value: "{{ .Values.global.clusterName | default "local" }}"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubesynth.fullname" . }}-collector-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesynth.fullname" . }}-collector-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes", "namespaces", "configmaps", "endpoints", "persistentvolumes", "persistentvolumeclaims", "events", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesynth.fullname" . }}-collector-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesynth.fullname" . }}-collector-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesynth.fullname" . }}-collector-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubesynth.fullname" . }}-collector
  labels:
    app: collector-agent
spec:
  selector:
    app: collector-agent
  ports:
    - port: {{ .Values.collector.port }}
      targetPort: http
      protocol: TCP
      name: http
  clusterIP: None  # Headless for DaemonSet direct access
{{- end }}
