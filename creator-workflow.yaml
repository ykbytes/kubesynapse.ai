apiVersion: sandbox.enterprise.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: creator
  namespace: default
spec:
  description: "PDF creation workflow"
  input: "create the pdf"
  messageBus: in-memory
  steps:
  - name: chat
    agentRef: chat
    dependsOn: []
    execution: {}
    prompt: ""
    requireApproval: false
  - name: chatnew
    agentRef: chatnew
    dependsOn:
    - chat
    execution: {}
    prompt: "{{previous_output}}"
    requireApproval: false
