# kubesynapse — Local Docker Compose Stack
# 
# Usage:
#   docker compose -f docker-compose.yml up --build
#   docker compose -f docker-compose.yml down -v
#
# Services:
#   - postgres:    PostgreSQL 16 (state DB + trace DB)
#   - redis:       Redis 7 (caching + sessions)
#   - nats:        NATS 2 (message bus)
#   - qdrant:      Qdrant 1.7 (vector DB for semantic memory)
#   - api-gateway: FastAPI gateway (port 8080)
#   - operator:    Kopf Kubernetes operator
#   - web-ui:      React frontend (port 3000)
#   - opencode-rt: OpenCode agent runtime (port 8081)
#   - litellm:     LiteLLM proxy (port 4000)
#
# Notes:
#   - Operator needs a K8s cluster to function; for pure local dev it will crash-loop.
#     Set OPERATOR_MOCK_K8S=true to run in mock mode (no real K8s needed).
#   - api-gateway creates trace tables automatically on startup.
#   - All services share the same Docker network `kubesynapse`.

name: kubesynapse

services:
  # ------------------------------------------------------------------
  # Data stores
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kubesynapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kubesynapse
      POSTGRES_PASSWORD: kubesynapse-dev-password
      POSTGRES_DB: kubesynapse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubesynapse -d kubesynapse"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - kubesynapse

  redis:
    image: redis:7-alpine
    container_name: kubesynapse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - kubesynapse

  nats:
    image: nats:2-alpine
    container_name: kubesynapse-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    networks:
      - kubesynapse

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: kubesynapse-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - kubesynapse

  # ------------------------------------------------------------------
  # Core platform services
  # ------------------------------------------------------------------
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: kubesynapse-api-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_GATEWAY_SHARED_TOKEN: "dev-shared-token-change-in-production"
      API_GATEWAY_AUTH_MODE: "shared_token"
      DATABASE_URL: "postgresql+psycopg://kubesynapse:kubesynapse-dev-password@postgres:5432/kubesynapse"
      DATABASE_DRIVER: "postgresql"
      REDIS_URL: "redis://redis:6379/0"
      NATS_URL: "nats://nats:4222"
      QDRANT_URL: "http://qdrant:6333"
      TRACE_STORAGE_DIR: "/app/state/traces"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8080:8080"
    volumes:
      - gateway_traces:/app/state/traces
    networks:
      - kubesynapse
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  operator:
    build:
      context: ./operator
      dockerfile: Dockerfile
    container_name: kubesynapse-operator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    environment:
      OPERATOR_NAMESPACE: "default"
      DATABASE_URL: "postgresql+psycopg://kubesynapse:kubesynapse-dev-password@postgres:5432/kubesynapse"
      GATEWAY_URL: "http://api-gateway:8080"
      API_GATEWAY_SHARED_TOKEN: "dev-shared-token-change-in-production"
      WORKER_TRACE_ENABLED: "true"
      WORKER_TRACE_BATCH_SIZE: "50"
      WORKER_TRACE_FLUSH_INTERVAL_SEC: "5"
      STATE_DB_ENABLED: "true"
      OPERATOR_MOCK_K8S: "true"
      PYTHONDONTWRITEBYTECODE: "1"
    # For local dev without K8s, run mock entrypoint that keeps readiness server alive.
    command: ["python", "/app/mock_entrypoint.py"]
    networks:
      - kubesynapse

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: kubesynapse-web-ui
    restart: unless-stopped
    depends_on:
      - api-gateway
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/conf.d
    ports:
      - "3000:8080"
    networks:
      - kubesynapse

  opencode-rt:
    build:
      context: ./opencode-runtime
      dockerfile: Dockerfile
    container_name: kubesynapse-opencode-rt
    restart: unless-stopped
    depends_on:
      - redis
      - nats
      - qdrant
    environment:
      REDIS_URL: "redis://redis:6379/0"
      NATS_URL: "nats://nats:4222"
      QDRANT_URL: "http://qdrant:6333"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8081:8080"
    networks:
      - kubesynapse
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ------------------------------------------------------------------
  # Optional: LiteLLM proxy for model routing
  # ------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: kubesynapse-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: "sk-litellm-master-key-change-me"
      STORE_MODEL_IN_DB: "True"
    command: ["--port", "4000", "--config", "/app/config.yaml"]
    volumes:
      - ./deploy/litellm-config.yaml:/app/config.yaml:ro
    networks:
      - kubesynapse

# ------------------------------------------------------------------
# Networks
# ------------------------------------------------------------------
networks:
  kubesynapse:
    driver: bridge
    name: kubesynapse

# ------------------------------------------------------------------
# Volumes
# ------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  gateway_traces:
    driver: local
