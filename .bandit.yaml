# Bandit security scanner configuration for KubeSynth
# https://bandit.readthedocs.io/en/latest/config.html

skips:
  # B104: hardcoded_bind_all_interfaces — Intentional in containerized services
  # Uvicorn binds to 0.0.0.0 inside containers as required for K8s networking
  - B104

  # B108: hardcoded_tmp_directory — Default SQLite paths use /tmp as fallback
  # These are overridden by DATABASE_SQLITE_PATH env var in production
  # Worker jobs intentionally mount /tmp for transient artifacts
  - B108

# Severity levels to report
# LOW, MEDIUM, HIGH
level: LOW

# Confidence levels to report
# LOW, MEDIUM, HIGH
confidence: MEDIUM

# Files/patterns to exclude
exclude_dirs:
  - tests
  - .venv
  - venv
  - node_modules
  - web-ui
  - charts
  - scripts
  - docs
  - examples
  - deploy
  - .github

# Target Python version
python_version: "3.11"
