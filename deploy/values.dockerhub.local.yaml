global:
  imagePullSecrets:
    - dockerhub-regcred

agentRuntime:
  image:
    repository: docker.io/yakdhane/ai-agent-runtime
    tag: latest
    pullPolicy: Always

operator:
  replicaCount: 1
  image:
    repository: docker.io/yakdhane/ai-operator
    tag: latest
    pullPolicy: Always
  workerImage:
    repository: docker.io/yakdhane/ai-operator
    tag: latest
    pullPolicy: Always

gooseRuntime:
  image:
    repository: docker.io/yakdhane/ai-goose-runtime
    tag: latest
    pullPolicy: Always

codexRuntime:
  image:
    repository: docker.io/yakdhane/ai-codex-runtime
    tag: latest
    pullPolicy: Always

opencodeRuntime:
  image:
    repository: docker.io/yakdhane/ai-opencode-runtime
    tag: copilot-token-exchange
    pullPolicy: Always
  env:
    OPENCODE_SESSION_INIT_ON_CREATE: "false"
    OPENCODE_AUTONOMOUS_MAX_RETRIES: "2"
    OPENCODE_AUTONOMOUS_MAX_TURNS: "5"
    OPENCODE_AGENT_STEPS: "200"
    OPENCODE_COMPACTION_TOKEN_THRESHOLD: "0.75"
    OPENCODE_PLAN_THRESHOLD_CHARS: "99999"

apiGateway:
  image:
    repository: docker.io/yakdhane/ai-api-gateway
    tag: latest
    pullPolicy: Always
  auth:
    mode: hybrid
    localAuthEnabled: true
    registrationEnabled: true

webUi:
  enabled: true
  image:
    repository: docker.io/yakdhane/ai-agent-sandbox-web-ui
    tag: latest
    pullPolicy: Always

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: "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"
    anthropicApiKey: ""
    litellmMasterKey: "minikube-dev-master-key"
    apiGatewaySharedToken: "minikube-dev-shared-token"
    databasePassword: "minikube-dev-database-password"
    jwtSecret: "minikube-dev-jwt-secret"
    authBootstrapAdminPassword: "minikube-dev-admin-password"

mcpHub:
  auth:
    bearerToken: "minikube-dev-mcp-token"
  servers:
    github:
      image: docker.io/yakdhane/mcp-github-adapter:latest
      imagePullPolicy: Always

skillsCatalog:
  enabled: true

mcpToolSidecars:
  codeExec:
    image: docker.io/yakdhane/mcp-code-exec:latest
    port: 8090
  webSearch:
    image: docker.io/yakdhane/mcp-web-search:latest
    port: 8091
  documents:
    image: docker.io/yakdhane/mcp-documents:latest
    port: 8092
  browser:
    image: docker.io/yakdhane/mcp-browser:latest
    port: 8093
  database:
    image: docker.io/yakdhane/mcp-database:latest
    port: 8094
  git:
    image: docker.io/yakdhane/mcp-git:latest
    port: 8095
  githubAdapter:
    image: docker.io/yakdhane/mcp-github-adapter:latest
    port: 8096
  kubernetes:
    image: docker.io/yakdhane/mcp-kubernetes:latest
    port: 8097
  messaging:
    image: docker.io/yakdhane/mcp-messaging:latest
    port: 8098
  rag:
    image: docker.io/yakdhane/mcp-rag:latest
    port: 8099
