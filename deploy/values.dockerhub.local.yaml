global:
  imagePullSecrets:
    - dockerhub-regcred

networkPolicy:
  enabled: false

agentRuntime:
  image:
    repository: docker.io/yakdhane/ai-agent-sandbox-agent-runtime
    tag: mcpfix9
    pullPolicy: Never
  env:
    AGENT_USE_TOOL_CALLING: "false"

operator:
  replicaCount: 1
  image:
    repository: docker.io/yakdhane/ai-operator
    tag: wffix7
    pullPolicy: Never
  workerImage:
    repository: docker.io/yakdhane/ai-operator
    tag: wffix7
    pullPolicy: Never

gooseRuntime:
  image:
    repository: docker.io/yakdhane/ai-goose-runtime
    tag: openrouter-20260315-123415
    pullPolicy: IfNotPresent

codexRuntime:
  image:
    repository: docker.io/yakdhane/ai-codex-runtime
    tag: openrouter-20260315-123415
    pullPolicy: IfNotPresent

apiGateway:
  image:
    repository: docker.io/yakdhane/ai-api-gateway
    tag: dlfix4
    pullPolicy: IfNotPresent
  auth:
    mode: hybrid
    localAuthEnabled: true
    registrationEnabled: true

webUi:
  enabled: true
  image:
    repository: docker.io/yakdhane/ai-agent-sandbox-web-ui
    tag: dlfix
    pullPolicy: IfNotPresent

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: "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"
    anthropicApiKey: ""
    litellmMasterKey: "minikube-dev-master-key"
    apiGatewaySharedToken: "minikube-dev-shared-token"
    databasePassword: "minikube-dev-database-password"
    jwtSecret: "minikube-dev-jwt-secret"
    authBootstrapAdminPassword: "minikube-dev-admin-password"

mcpHub:
  auth:
    bearerToken: "minikube-dev-mcp-token"
  servers:
    github:
      image: docker.io/yakdhane/mcp-github-adapter:openrouter-20260315-123415
      imagePullPolicy: IfNotPresent

skillsCatalog:
  enabled: true

mcpToolSidecars:
  codeExec:
    image: docker.io/yakdhane/mcp-code-exec:openrouter-20260315-123415
    port: 8090
  webSearch:
    image: docker.io/yakdhane/mcp-web-search:openrouter-20260315-123415
    port: 8091
  documents:
    image: docker.io/yakdhane/mcp-documents:openrouter-20260315-123415
    port: 8092
  browser:
    image: docker.io/yakdhane/mcp-browser:openrouter-20260315-123415
    port: 8093
  database:
    image: docker.io/yakdhane/mcp-database:openrouter-20260315-123415
    port: 8094
  git:
    image: docker.io/yakdhane/mcp-git:openrouter-20260315-123415
    port: 8095
  kubernetes:
    image: docker.io/yakdhane/mcp-kubernetes:openrouter-20260315-123415
    port: 8096
  messaging:
    image: docker.io/yakdhane/mcp-messaging:openrouter-20260315-123415
    port: 8097
  rag:
    image: docker.io/yakdhane/mcp-rag:openrouter-20260315-123415
    port: 8098
