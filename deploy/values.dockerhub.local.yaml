global:
  imagePullSecrets:
    - dockerhub-regcred

trustBundle:
  enabled: false

operator:
  replicaCount: 1
  image:
    repository: docker.io/yakdhane/kubesynth-operator
    tag: deploy-20260401-225700-hotfix
    pullPolicy: Always
  workerImage:
    repository: docker.io/yakdhane/kubesynth-operator
    tag: deploy-20260401-225700-hotfix
    pullPolicy: Always

opencodeRuntime:
  image:
    repository: docker.io/yakdhane/ai-opencode-runtime
    tag: deploy-20260401-212102-opencode
    pullPolicy: Always
  limits:
    maxPromptChars: 256000
    maxSystemPromptChars: 64000
    maxTeamContextChars: 32000
    modelContextLimit: 256000
    modelOutputLimit: 16384
  autonomy:
    sessionInitOnCreate: false
    maxRetries: 3
    compactionTokenThreshold: 0.7
    planThresholdChars: 4096
    structuredOutputRetryCount: 3

apiGateway:
  image:
    repository: docker.io/yakdhane/kubesynth-api-gateway
    tag: deploy-20260401-212102
    pullPolicy: Always
  auth:
    mode: hybrid
    localAuthEnabled: true
    registrationEnabled: true

webUi:
  enabled: true
  image:
    repository: docker.io/yakdhane/kubesynth-web-ui
    tag: deploy-20260401-225700-hotfix
    pullPolicy: Always

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: "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"
    anthropicApiKey: ""
    litellmMasterKey: "minikube-dev-master-key"
    apiGatewaySharedToken: "minikube-dev-shared-token"
    databasePassword: "minikube-dev-database-password"
    jwtSecret: "minikube-dev-jwt-secret"
    authBootstrapAdminPassword: "minikube-dev-admin-password"

mcpHub:
  auth:
    bearerToken: "minikube-dev-mcp-token"
  servers:
    github:
      image: docker.io/yakdhane/mcp-github-adapter:deploy-20260401-212102
      imagePullPolicy: Always

skillsCatalog:
  enabled: true

mcpToolSidecars:
  codeExec:
    image: docker.io/yakdhane/mcp-code-exec:deploy-20260401-212102
    port: 8090
  webSearch:
    image: docker.io/yakdhane/mcp-web-search:deploy-20260401-212102
    port: 8091
  documents:
    image: docker.io/yakdhane/mcp-documents:deploy-20260401-212102
    port: 8092
  browser:
    image: docker.io/yakdhane/mcp-browser:deploy-20260401-212102
    port: 8093
  database:
    image: docker.io/yakdhane/mcp-database:deploy-20260401-212102
    port: 8094
  git:
    image: docker.io/yakdhane/mcp-git:deploy-20260401-212102
    port: 8095
  githubAdapter:
    image: docker.io/yakdhane/mcp-github-adapter:deploy-20260401-212102
    port: 8096
  kubernetes:
    image: docker.io/yakdhane/mcp-kubernetes:deploy-20260401-212102
    port: 8097
  messaging:
    image: docker.io/yakdhane/mcp-messaging:deploy-20260401-212102
    port: 8098
  rag:
    image: docker.io/yakdhane/mcp-rag:deploy-20260401-212102
    port: 8099
