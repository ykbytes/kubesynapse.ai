global:
  imagePullSecrets:
    - dockerhub-regcred

operator:
  replicaCount: 1
  image:
    repository: docker.io/kubesynapse/kubesynapse-operator
    tag: deploy-20260401-225700-hotfix
    pullPolicy: Always
  workerImage:
    repository: docker.io/kubesynapse/kubesynapse-operator
    tag: deploy-20260401-225700-hotfix
    pullPolicy: Always

opencodeRuntime:
  image:
    repository: docker.io/kubesynapse/kubesynapse-opencode-rt
    tag: deploy-20260401-212102-opencode
    pullPolicy: Always
  limits:
    maxPromptChars: 256000
    maxSystemPromptChars: 64000
    maxTeamContextChars: 32000
    modelContextLimit: 256000
    modelOutputLimit: 16384
  autonomy:
    sessionInitOnCreate: false
    maxRetries: 3
    compactionTokenThreshold: 0.7
    planThresholdChars: 4096
    structuredOutputRetryCount: 3

apiGateway:
  image:
    repository: docker.io/kubesynapse/kubesynapse-api-gateway
    tag: deploy-20260401-212102
    pullPolicy: Always
  auth:
    mode: hybrid
    localAuthEnabled: true
    registrationEnabled: true

webUi:
  enabled: true
  image:
    repository: docker.io/kubesynapse/kubesynapse-web-ui
    tag: deploy-20260401-225700-hotfix
    pullPolicy: Always

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: ""
    anthropicApiKey: ""
    litellmMasterKey: "replace-me-with-a-long-random-master-key"
    apiGatewaySharedToken: "replace-me-with-a-long-random-bearer-token"
    databasePassword: "replace-me-with-a-long-random-database-password"
    jwtSecret: "replace-me-with-a-long-random-jwt-secret"
    authBootstrapAdminPassword: "replace-me-with-a-long-random-admin-password"

mcpHub:
  auth:
    bearerToken: "replace-me-with-a-long-random-mcp-token"
  servers:
    github:
      image: docker.io/kubesynapse/mcp-github-adapter:deploy-20260401-212102
      imagePullPolicy: Always

skillsCatalog:
  enabled: true

mcpToolSidecars:
  codeExec:
    image: docker.io/kubesynapse/mcp-code-exec:deploy-20260401-212102
    port: 8090
  webSearch:
    image: docker.io/kubesynapse/mcp-web-search:deploy-20260401-212102
    port: 8091
  documents:
    image: docker.io/kubesynapse/mcp-documents:deploy-20260401-212102
    port: 8092
  browser:
    image: docker.io/kubesynapse/mcp-browser:deploy-20260401-212102
    port: 8093
  database:
    image: docker.io/kubesynapse/mcp-database:deploy-20260401-212102
    port: 8094
  git:
    image: docker.io/kubesynapse/mcp-git:deploy-20260401-212102
    port: 8095
  githubAdapter:
    image: docker.io/kubesynapse/mcp-github-adapter:deploy-20260401-212102
    port: 8096
  kubernetes:
    image: docker.io/kubesynapse/mcp-kubernetes:deploy-20260401-212102
    port: 8097
  messaging:
    image: docker.io/kubesynapse/mcp-messaging:deploy-20260401-212102
    port: 8098
  rag:
    image: docker.io/kubesynapse/mcp-rag:deploy-20260401-212102
    port: 8099
