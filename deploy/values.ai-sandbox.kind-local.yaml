# Narrow image overrides for the live local Kind release.
# Safe usage:
#   make deploy-ai-sandbox-kind
#
# This file is intentionally limited to image references so it can be applied
# on top of the existing ai-sandbox release with --reuse-values without replaying
# stale secrets or older platform settings.

global:
  imagePullSecrets: []

opencodeRuntime:
  image:
    repository: localhost/kubesynapse/kubesynapse-opencode-rt
    tag: mcp-structured-20260413-4
    pullPolicy: IfNotPresent

operator:
  image:
    repository: localhost/kubesynapse/kubesynapse-operator
    tag: mcp-structured-20260413-3
    pullPolicy: IfNotPresent
  workerImage:
    repository: localhost/kubesynapse/kubesynapse-operator
    tag: mcp-structured-20260413-3
    pullPolicy: IfNotPresent

apiGateway:
  image:
    repository: localhost/kubesynapse/kubesynapse-api-gateway
    tag: google-oidc-20260413-223019
    pullPolicy: IfNotPresent

webUi:
  image:
    repository: localhost/kubesynapse/kubesynapse-web-ui
    tag: google-oidc-20260413-223019
    pullPolicy: IfNotPresent

collector:
  image:
    repository: localhost/kubesynapse/kubesynapse-collector
    tag: dev
