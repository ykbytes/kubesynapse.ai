# Example cluster deployment override.
# Replace image repositories, ingress settings, and secrets before using this file.

global:
  imagePullSecrets: []

operator:
  image:
    repository: quay.io/yakdhane/kubesynapse
    tag: v2.1.0-run-intelligence
    pullPolicy: IfNotPresent
  workerImage:
    repository: quay.io/yakdhane/kubesynapse
    tag: v2.1.0-run-intelligence
    pullPolicy: IfNotPresent

opencodeRuntime:
  image:
    repository: quay.io/yakdhane/kubesynapse
    tag: v2.1.0-run-intelligence
    pullPolicy: IfNotPresent
  limits:
    maxPromptChars: 256000
    maxSystemPromptChars: 64000
    maxTeamContextChars: 32000
    modelContextLimit: 256000
    modelOutputLimit: 16384
  autonomy:
    sessionInitOnCreate: false
    maxRetries: 3
    compactionTokenThreshold: 0.7
    planThresholdChars: 4096
    structuredOutputRetryCount: 3

piRuntime:
  image:
    repository: quay.io/yakdhane/kubesynapse
    tag: v2.1.0-run-intelligence
    pullPolicy: IfNotPresent

mistralVibeRuntime:
  image:
    repository: quay.io/yakdhane/kubesynapse
    tag: v2.1.0-run-intelligence
    pullPolicy: IfNotPresent

apiGateway:
  image:
    repository: quay.io/yakdhane/kubesynapse
    tag: v2.1.0-run-intelligence
    pullPolicy: IfNotPresent
  ingressClassName: ""
  ingressHost: ""
  ingress:
    enabled: false
    annotations: {}
  tls:
    enabled: false
    secretName: ""
  auth:
    mode: shared_token

webUi:
  enabled: true
  image:
    repository: quay.io/yakdhane/kubesynapse
    tag: v2.1.0-run-intelligence
    pullPolicy: IfNotPresent

litellm:
  image:
    repository: docker.io/litellm/litellm
    tag: v1.82.3-stable
    pullPolicy: IfNotPresent
  config:
    model_list:
      - model_name: gpt-4
        litellm_params:
          model: openrouter/openai/gpt-4o
          api_key: "os.environ/OPENROUTER_API_KEY"
      - model_name: gpt-4o-mini
        litellm_params:
          model: openrouter/openai/gpt-4o-mini
          api_key: "os.environ/OPENROUTER_API_KEY"
    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: "changeme"
    anthropicApiKey: ""
    litellmMasterKey: "changeme"
    apiGatewaySharedToken: "your-bearer-token-here"

mcpHub:
  auth:
    bearerToken: "changeme"
    secretName: ""
  servers:
    github:
      enabled: true
      image: quay.io/yakdhane/kubesynapse:mcp-github-adapter

mcpToolSidecars:
  codeExec:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  webSearch:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  documents:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  browser:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  database:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  git:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  githubAdapter:
    image: quay.io/yakdhane/kubesynapsehub-adapter
    tag: deploy-20260401-212102
  kubernetes:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  messaging:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
  rag:
    image: quay.io/yakdhane/kubesynapse
    tag: deploy-20260401-212102
