# Example cluster deployment override.
# Replace image repositories, ingress settings, and secrets before using this file.

global:
  imagePullSecrets: []

operator:
  image:
    repository: docker.io/yakdhane/kubesynth-operator
    tag: latest
    pullPolicy: IfNotPresent
  workerImage:
    repository: docker.io/yakdhane/kubesynth-operator
    tag: latest
    pullPolicy: IfNotPresent

agentRuntime:
  image:
    repository: docker.io/yakdhane/kubesynth-agent-runtime
    tag: latest
    pullPolicy: IfNotPresent

gooseRuntime:
  image:
    repository: docker.io/yakdhane/kubesynth-goose-runtime
    tag: latest
    pullPolicy: IfNotPresent

codexRuntime:
  image:
    repository: docker.io/yakdhane/kubesynth-codex-runtime
    tag: latest
    pullPolicy: IfNotPresent

opencodeRuntime:
  image:
    repository: docker.io/yakdhane/kubesynth-opencode-runtime
    tag: latest
    pullPolicy: IfNotPresent

apiGateway:
  image:
    repository: docker.io/yakdhane/kubesynth-api-gateway
    tag: latest
    pullPolicy: IfNotPresent
  ingressClassName: ""
  ingressHost: ""
  ingress:
    enabled: false
    annotations: {}
  tls:
    enabled: false
    secretName: ""
  auth:
    mode: shared_token

webUi:
  enabled: true
  image:
    repository: docker.io/yakdhane/kubesynth-web-ui
    tag: latest
    pullPolicy: IfNotPresent

litellm:
  config:
    model_list:
      - model_name: gpt-4
        litellm_params:
          model: openrouter/openai/gpt-4o
          api_key: "os.environ/OPENROUTER_API_KEY"
      - model_name: gpt-4o-mini
        litellm_params:
          model: openrouter/openai/gpt-4o-mini
          api_key: "os.environ/OPENROUTER_API_KEY"
    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: "replace-me"
    anthropicApiKey: ""
    litellmMasterKey: "replace-me"
    apiGatewaySharedToken: "replace-me-with-a-long-random-bearer-token"

mcpHub:
  auth:
    bearerToken: "replace-me-if-you-enable-mcp"
    secretName: ""
  servers:
    github:
      enabled: true
      image: docker.io/yakdhane/mcp-github-adapter:latest

mcpToolSidecars:
  codeExec:
    image: docker.io/yakdhane/mcp-code-exec
    tag: latest
  webSearch:
    image: docker.io/yakdhane/mcp-web-search
    tag: latest
  documents:
    image: docker.io/yakdhane/mcp-documents
    tag: latest
  browser:
    image: docker.io/yakdhane/mcp-browser
    tag: latest
  database:
    image: docker.io/yakdhane/mcp-database
    tag: latest
  git:
    image: docker.io/yakdhane/mcp-git
    tag: latest
  githubAdapter:
    image: docker.io/yakdhane/mcp-github-adapter
    tag: latest
  kubernetes:
    image: docker.io/yakdhane/mcp-kubernetes
    tag: latest
  messaging:
    image: docker.io/yakdhane/mcp-messaging
    tag: latest
  rag:
    image: docker.io/yakdhane/mcp-rag
    tag: latest
