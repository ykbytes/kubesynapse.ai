operator:
  replicaCount: 1
  image:
    repository: localhost/kubesynapse/kubesynapse-operator
    tag: dev5
    pullPolicy: IfNotPresent
  workerImage:
    repository: localhost/kubesynapse/kubesynapse-operator
    tag: dev5
    pullPolicy: IfNotPresent

opencodeRuntime:
  image:
    repository: localhost/kubesynapse/kubesynapse-opencode-runtime
    tag: dev13
    pullPolicy: IfNotPresent
  limits:
    maxPromptChars: 256000
    maxSystemPromptChars: 64000
    maxTeamContextChars: 32000
    modelContextLimit: 256000
    modelOutputLimit: 16384
  autonomy:
    sessionInitOnCreate: false
    maxRetries: 3
    compactionTokenThreshold: 0.7
    planThresholdChars: 4096
    structuredOutputRetryCount: 3

apiGateway:
  image:
    repository: localhost/kubesynapse/kubesynapse-api-gateway
    tag: collector-1
    pullPolicy: IfNotPresent
  auth:
    mode: shared_token

webUi:
  enabled: true
  image:
    repository: localhost/kubesynapse/kubesynapse-web-ui
    tag: redeploy-20260409-ui-1
    pullPolicy: IfNotPresent

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: ""
    anthropicApiKey: ""
    litellmMasterKey: "replace-me-with-a-long-random-master-key"
    apiGatewaySharedToken: "replace-me-with-a-long-random-bearer-token"

mcpHub:
  auth:
    bearerToken: "replace-me-with-a-long-random-mcp-token"
  servers:
    github:
      image: localhost/kubesynapse/mcp-github-adapter
      imagePullPolicy: IfNotPresent

mcpToolSidecars:
  codeExec:
    image: localhost/kubesynapse/mcp-code-exec
    tag: dev
    port: 8090
  webSearch:
    image: localhost/kubesynapse/mcp-web-search
    tag: dev
    port: 8091
  documents:
    image: localhost/kubesynapse/mcp-documents
    tag: dev
    port: 8092
  browser:
    image: localhost/kubesynapse/mcp-browser
    tag: dev
    port: 8093
  database:
    image: localhost/kubesynapse/mcp-database
    tag: dev
    port: 8094
  git:
    image: localhost/kubesynapse/mcp-git
    tag: dev
    port: 8095
  githubAdapter:
    image: localhost/kubesynapse/mcp-github-adapter
    tag: dev
    port: 8096
  kubernetes:
    image: localhost/kubesynapse/mcp-kubernetes
    tag: dev
    port: 8097
  messaging:
    image: localhost/kubesynapse/mcp-messaging
    tag: dev
    port: 8098
  rag:
    image: localhost/kubesynapse/mcp-rag
    tag: dev
    port: 8099
