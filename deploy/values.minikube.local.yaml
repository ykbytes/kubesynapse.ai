agentRuntime:
  image:
    repository: localhost/kubesynthai/kubesynth-agent-runtime
    tag: dev
    pullPolicy: IfNotPresent

operator:
  replicaCount: 1
  image:
    repository: localhost/kubesynthai/kubesynth-operator
    tag: dev4
    pullPolicy: IfNotPresent
  workerImage:
    repository: localhost/kubesynthai/kubesynth-operator
    tag: dev4
    pullPolicy: IfNotPresent

gooseRuntime:
  image:
    repository: localhost/kubesynthai/kubesynth-goose-runtime
    tag: dev
    pullPolicy: IfNotPresent

codexRuntime:
  image:
    repository: localhost/kubesynthai/kubesynth-codex-runtime
    tag: dev
    pullPolicy: IfNotPresent

opencodeRuntime:
  image:
    repository: localhost/kubesynthai/kubesynth-opencode-runtime
    tag: dev10
    pullPolicy: IfNotPresent

apiGateway:
  image:
    repository: localhost/kubesynthai/kubesynth-api-gateway
    tag: dev8
    pullPolicy: IfNotPresent
  auth:
    mode: shared_token

webUi:
  enabled: true
  image:
    repository: localhost/kubesynthai/kubesynth-web-ui
    tag: dev10
    pullPolicy: IfNotPresent

platformSecrets:
  mode: native
  native:
    openaiApiKey: ""
    openrouterApiKey: ""
    anthropicApiKey: ""
    litellmMasterKey: "minikube-dev-master-key"
    apiGatewaySharedToken: "minikube-dev-shared-token"

mcpHub:
  auth:
    bearerToken: "minikube-dev-mcp-token"
  servers:
    github:
      image: localhost/kubesynthai/mcp-github-adapter
      imagePullPolicy: IfNotPresent

mcpToolSidecars:
  codeExec:
    image: localhost/kubesynthai/mcp-code-exec
    tag: dev
    port: 8090
  webSearch:
    image: localhost/kubesynthai/mcp-web-search
    tag: dev
    port: 8091
  documents:
    image: localhost/kubesynthai/mcp-documents
    tag: dev
    port: 8092
  browser:
    image: localhost/kubesynthai/mcp-browser
    tag: dev
    port: 8093
  database:
    image: localhost/kubesynthai/mcp-database
    tag: dev
    port: 8094
  git:
    image: localhost/kubesynthai/mcp-git
    tag: dev
    port: 8095
  githubAdapter:
    image: localhost/kubesynthai/mcp-github-adapter
    tag: dev
    port: 8096
  kubernetes:
    image: localhost/kubesynthai/mcp-kubernetes
    tag: dev
    port: 8097
  messaging:
    image: localhost/kubesynthai/mcp-messaging
    tag: dev
    port: 8098
  rag:
    image: localhost/kubesynthai/mcp-rag
    tag: dev
    port: 8099
