apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: default
  labels:
    app: checkout-api
    app.kubernetes.io/part-of: incident-auto-triage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
        app.kubernetes.io/part-of: incident-auto-triage
    spec:
      containers:
        - name: checkout-api
          image: localhost/kubesynapse/checkout-api:demo
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: default
  labels:
    app: checkout-api
    app.kubernetes.io/part-of: incident-auto-triage
spec:
  selector:
    app: checkout-api
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
