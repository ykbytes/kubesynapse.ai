apiVersion: v1
kind: ConfigMap
metadata:
  name: secure-incident-context
  namespace: default
  labels:
    app.kubernetes.io/part-of: secure-incident-mesh
data:
  incident-summary.md: |
    # Incident Summary

    - Service: checkout-api
    - Environment: prod-aks-eastus
    - Symptom: p95 latency increased from 280ms to 3.4s
    - Error rate: 18.7%
    - Cluster signal: two checkout-api pods restarted with OOMKilled
    - Operator goal: stabilize customer checkout without destructive changes

  environment-notes.md: |
    # Environment Notes

    - Agents run in the `default` namespace.
    - This example is designed for a fresh KubeSynapse install.
    - Do not claim a `kubectl` or `helm` command was executed unless the workflow explicitly says so.
    - Prefer one small reversible patch over broad rollout changes.
    - Never recommend deleting namespaces, PVCs, or data.

  acceptance.md: |
    # Acceptance Criteria

    1. The evidence summary names the symptom, blast radius, and strongest evidence.
    2. The remediation plan proposes no more than three concrete actions.
    3. The workflow pauses for a human approval before the final update proceeds.
    4. The final status update clearly says the workflow generated an approved operator command and did not auto-apply it.
