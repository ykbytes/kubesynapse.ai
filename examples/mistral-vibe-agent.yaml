apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: mistral-vibe-smoke
  namespace: default
spec:
  model: devstral-small
  runtime:
    kind: mistral-vibe
    mistralVibe:
      model: devstral-small
      noSession: true
  systemPrompt: >
    You are a concise assistant used for runtime smoke tests. Answer directly and
    briefly.
  storage:
    size: 2Gi
  resources:
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
