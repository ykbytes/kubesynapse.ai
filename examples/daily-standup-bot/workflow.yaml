apiVersion: kubesynapse.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: daily-standup
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
spec:
  description: "Generate daily standup report from git log + Jira sprint data"
  input: "Generate today's standup report"
  messageBus: in-memory
  contextRef: standup-project-context
  autoRetry:
    enabled: true
    maxAttempts: 1
  steps:
    # ── Step 1: Summarize git activity ──
    - name: summarize-git
      type: agent
      agentRef: standup-git
      prompt: |
        ## Task: Summarize Git Activity

        The git log data is provided below. Produce a structured summary
        grouped by author. Categorize each commit as: feat, fix, refactor,
        chore, test, docs, wip.

        Git log (one entry per line: HASH | AUTHOR | DATE | MESSAGE):
        abc1234 | alice | 2026-05-23 | feat: add rate-limiting middleware to API gateway
        def5678 | bob   | 2026-05-23 | fix: resolve Postgres connection pool exhaustion under load
        ghi9012 | alice | 2026-05-23 | refactor: extract auth logic into separate module
        jkl3456 | carol | 2026-05-23 | feat: add Prometheus metrics endpoint for agent invocations
        mno7890 | bob   | 2026-05-24 | fix: correct memory leak in SSE stream handler (issue #342)
        pqr1234 | alice | 2026-05-24 | chore: bump dependencies — FastAPI 0.115, SQLAlchemy 2.0.36
        stu5678 | carol | 2026-05-24 | docs: add architecture decision records for A2A protocol
        vwx9012 | bob   | 2026-05-24 | test: add integration tests for workflow retry logic
        yza3456 | alice | 2026-05-24 | feat: implement structured error responses with trace IDs
        bcd7890 | carol | 2026-05-25 | wip: initial work on WebSocket support for agent streaming

        Write the output to /workspace/commits-summary.md.
        Format: see [Project Context] ## rules.md.
        Group by author (NOT chronological order). Mark WIP items separately.

        IMPORTANT: After writing the file, you MUST append your complete
        output in this format at the end of your response:

        [FILE_CONTENT]
        (paste the COMPLETE /workspace/commits-summary.md content here)
        [/FILE_CONTENT]

        The next workflow step depends on receiving this embedded content.
      execution:
        timeoutSeconds: 180
        maxAttempts: 2
        backoffSeconds: 5
        maxTurns: 6
        sessionGroup: standup-session

    # ── Step 2: Track Jira sprint status ──
    - name: track-jira
      type: agent
      agentRef: standup-jira
      prompt: |
        ## Task: Analyze Sprint Progress

        The Jira sprint data is provided below. Produce a sprint status
        analysis. Calculate progress percentage, identify blockers and risks,
        and assess sprint health.

        Jira data:
        - Sprint: Sprint 24 — Platform Hardening (ends 2026-05-26)
        - Issues: KS-421 Done alice, KS-422 Done bob, KS-423 Done alice,
          KS-424 In Progress carol, KS-425 In Progress carol,
          KS-426 In Progress bob, KS-427 In Progress carol, KS-428 Blocked bob

        Write the output to /workspace/sprint-status.json as
        structured JSON. Schema: {sprintName, daysRemaining, totalIssues,
        byStatus: {Done, InProgress, Blocked}, progressPercent,
        health: "OnTrack/AtRisk/Blocked", risks, blockers, highlights}

        IMPORTANT: After writing the file, you MUST append your complete
        output in this format at the end of your response:

        [FILE_CONTENT]
        (paste the COMPLETE /workspace/sprint-status.json content here)
        [/FILE_CONTENT]

        The next workflow step depends on receiving this embedded content.
      dependsOn:
        - summarize-git
      execution:
        timeoutSeconds: 180
        maxAttempts: 2
        backoffSeconds: 5
        maxTurns: 6
        sessionGroup: standup-session

    # ── Step 3: Compose standup report ──
    - name: compose-standup
      type: agent
      agentRef: standup-scribe
      prompt: |
        ## Task: Write Daily Standup Report

        The git commits summary and Jira sprint status from earlier workflow
        steps are embedded below under [Previous Step Output]. Parse and
        merge both into a polished daily standup document using the format
        in [Project Context] ## rules.md.

        IMPORTANT: Do NOT try to read /workspace/ files — they may not exist
        in this pod's filesystem. Use ONLY the embedded content below.

        Include:
        - What shipped yesterday
        - What's in progress today
        - Blockers and risks
        - Sprint progress with health indicator
        - Action items

        Write the final report to /workspace/standup-$(date +%Y-%m-%d).md

        [Previous Step Output]
        {{previous_output}}
      dependsOn:
        - summarize-git
        - track-jira
      execution:
        timeoutSeconds: 300
        maxAttempts: 2
        backoffSeconds: 5
        maxTurns: 10
        sessionGroup: standup-session
