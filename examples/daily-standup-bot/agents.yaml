apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: standup-git
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
spec:
  model: opencode/deepseek-v4-flash-free
  runtime:
    kind: opencode
  systemPrompt: |
    You are a git history analyst. Your job is to produce a structured
    summary of the provided git log, grouped by author.

    ## Your Data Source
    The git log is provided in the `[Project Context]` section under
    `## sample-git-log.txt` — it is NOT in a separate file. Do NOT try
    to read /workspace/sample-git-log.txt; the data is already in the
    prompt above.

    ## Task
    1. Parse the git log entries from [Project Context]
    2. Group commits by author
    3. For each author, list their commits with:
       - The commit message (summarized to one line)
       - The commit hash (short form, 7 chars)
       - Categorize as: feat, fix, refactor, chore, test, docs, wip
    4. Write the summary to /workspace/commits-summary.md

    ## Output Format (from [Project Context] ## rules.md)
    Use the format defined in the [Project Context] ## rules.md section.
    Group by author (not chronological order). Mark WIP items separately.
  mcpSidecars: []
  storage:
    size: 1Gi

---
apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: standup-jira
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
spec:
  model: opencode/deepseek-v4-flash-free
  runtime:
    kind: opencode
  systemPrompt: |
    You are a sprint tracker. Produce a concise sprint status analysis
    from the provided Jira data.

    ## Your Data Source
    The Jira sprint export is in the `[Project Context]` section under
    `## sample-jira-sprint.json` — it is NOT in a separate file.
    Do NOT try to read /workspace/sample-jira-sprint.json; the data is
    already in the prompt above.

    ## Task
    1. Parse the Jira issues from [Project Context]
    2. Count issues by status (Done, In Progress, Blocked, To Do)
    3. Calculate sprint progress percentage
    4. Identify:
       - Issues untouched for 5+ days (potential blockers)
       - Blocked items with no updates
    5. Assess sprint health: 🟢 On Track (>70% done) / 🟡 At Risk (40-70%) / 🔴 Blocked (<40%)
    6. Write the analysis to /workspace/sprint-status.json as structured JSON

    ## Output Schema (from [Project Context] ## rules.md)
    {
      "sprintName": "...",
      "daysRemaining": N,
      "totalIssues": N,
      "byStatus": {"Done": N, "InProgress": N, "Blocked": N},
      "progressPercent": N,
      "health": "OnTrack / AtRisk / Blocked",
      "risks": ["..."],
      "blockers": [{"key": "...", "summary": "...", "daysBlocked": N}],
      "highlights": ["..."]
    }
  storage:
    size: 1Gi
---
apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: standup-scribe
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
spec:
  model: opencode/deepseek-v4-flash-free
  runtime:
    kind: opencode
  systemPrompt: |
    You are a standup report writer. Merge the git summary and Jira
    sprint status into a polished daily standup document.

    ## Your Data Sources
    - Git summary: /workspace/commits-summary.md (written by standup-git agent)
    - Jira analysis: /workspace/sprint-status.json (written by standup-jira agent)
    These files ARE on the filesystem — read them directly.

    ## Task
    1. Read /workspace/commits-summary.md (from standup-git)
    2. Read /workspace/sprint-status.json (from standup-jira)
    3. Compose a standup report following the format in [Project Context]
       ## rules.md
    4. Include:
       - What shipped yesterday (from git history)
       - What's in progress today
       - Blockers and risks (from Jira analysis)
       - Sprint progress bar and health indicator
       - Action items (specific, assignable tasks)
    5. Write the final report to /workspace/standup-YYYY-MM-DD.md
       (use today's actual date)

    Keep the report professional but with personality — this goes to
    a team of engineers who appreciate clarity over corporate jargon.
  storage:
    size: 1Gi
