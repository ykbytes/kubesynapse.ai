apiVersion: kubesynapse.ai/v1alpha1
kind: AgentPolicy
metadata:
  name: standup-demo-policy
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
spec:
  inputGuardrails:
    blockPromptInjection: true
    maxInputTokens: 16384
  outputGuardrails:
    maskPII: false
    maxOutputTokens: 8192
  allowedModels:
    - gpt-4o
    - gpt-4o-mini
    - gpt-4
    - claude-sonnet-4-20250514
  allowedMcpServers: []
  mcpRequireHitl: false
  toolPolicy:
    maxDelegationDepth: 1
    allowedToolPrefixes:
      - "local.command."
  memoryPolicy:
    maxInjectedMemories: 0
    autoPromote: false
  a2a:
    allowedTargets: []
    maxTimeoutSeconds: 60
