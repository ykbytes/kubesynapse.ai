##
## Smart Enterprise Bundle — Context7 Research + Analysis
##
## Apply this single file to set up both agents and the workflow:
##   kubectl apply -f smart-enterprise-bundle.yaml
##
## This deploys:
##   1. docs-researcher  — Context7 MCP + file I/O + A2A delegation
##   2. code-analyst     — A2A receiver + file I/O + structured analysis
##   3. default-memory-policy — auto-promote memory policy (if not present)
##
## Then invoke:
##   POST /api/v1/agents/docs-researcher/invoke?namespace=default
##   {"prompt": "Research the FastAPI dependency injection system"}
##
## The workflow will:
##   1. docs-researcher queries Context7, writes a brief, delegates via A2A
##   2. code-analyst reviews, reads files, writes an analysis report
##   3. All steps emit runtime events to the Execution Observatory
##
## Observatory verification:
##   GET /api/v1/traces/executions?namespace=default
##   GET /api/v1/traces/executions/{id}/timeline
##   GET /api/v1/traces/executions/{id}/runtime-summary
##
## ---------------------------------------------------------------------------
##
## Agent: docs-researcher
##
apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: docs-researcher
  namespace: default
spec:
  model: github-copilot/gpt-5-mini
  runtime:
    kind: opencode
  policyRef: default-memory-policy
  systemPrompt: |
    You are a documentation research specialist. Your job is to find accurate,
    up-to-date information about software libraries and frameworks.

    WORKFLOW:
    1. Use Context7 MCP to resolve library IDs and fetch documentation
    2. Read any relevant files in the workspace for context
    3. Synthesize findings into clear, structured notes
    4. Write your notes to files in the workspace so teammates can read them
    5. When deeper analysis is needed, delegate to code-analyst via A2A

    OUTPUT FORMAT:
    - Start with a brief summary (2-3 sentences)
    - Follow with key findings organized by topic
    - Include code examples where appropriate
    - End with actionable recommendations

    Always cite the library version and source. Never fabricate API details.
  mcpConnections:
    - connectionId: context7-demo-conn
      serverId: context7
      name: Context7
      slug: context7
      transport: remote
      source: saved
      runtime:
        kind: remote
        configKey: context7
        url: https://mcp.context7.com/mcp
  mcpServers:
    - context7
  a2a:
    # Workflow step execution identifies as the workflow resource itself.
    allowedCallers:
      - name: context7-research-analysis
        namespace: default
  skills:
    files:
      skills/research-brief/SKILL.md: |
        ---
        name: research-brief
        description: Research libraries and APIs using Context7, then brief teammates.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.filesystem.mkdir
        allowedMcpServers:
          - context7
        allowedA2ATargets:
          - name: code-analyst
            namespace: default
        allowSubagents: false
        ---
        # Research Brief Skill

        Use this skill when the request needs structured evidence gathering
        from library documentation.

        1. Call the **Resolve library IDs** MCP tool to find the target library
        2. Call the **Fetch library docs** MCP tool to pull relevant pages
        3. Write a structured brief to a file in the workspace
        4. If deeper analysis is needed, delegate to code-analyst via A2A

        Always cite library versions. Never fabricate APIs.
  storage:
    size: 1Gi
  enableGVisor: false
---
##
## Agent: code-analyst
##
apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: code-analyst
  namespace: default
spec:
  model: github-copilot/gpt-5-mini
  runtime:
    kind: opencode
  policyRef: default-memory-policy
  systemPrompt: |
    You are a code and architecture analyst. You receive research findings
    from docs-researcher and produce actionable analysis.

    WHEN CALLED VIA A2A:
    1. Read the provided context and any referenced files
    2. Analyze the findings for correctness, gaps, and risks
    3. Write a structured analysis file to the workspace
    4. Return a concise summary to the caller

    OUTPUT FORMAT:
    - **Summary**: 2-3 sentence executive summary
    - **Findings**: Key observations from the research
    - **Risks**: Identified gaps, deprecations, or breaking changes
    - **Recommendations**: Ordered action items with priority

    Be precise. Flag anything that seems inaccurate or outdated.
  a2a:
    allowedCallers:
      - name: docs-researcher
        namespace: default
      - name: context7-research-analysis
        namespace: default
  skills:
    files:
      skills/analysis/SKILL.md: |
        ---
        name: analysis
        description: Analyze research findings and produce structured recommendations.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
        ---
        # Analysis Skill

        Use this skill when you receive research context that needs analysis.

        1. Read the research files from the workspace
        2. Identify accuracy, completeness, and risk factors
        3. Write an analysis report to a file
        4. Return a summary to the caller
  storage:
    size: 1Gi
  enableGVisor: false
