    ### /workspace/src/logging/request_logger.py
    ```python
    # HTTP request/response logger
    # NOTE: Currently logs full IPs and user agents in plaintext

    import logging
    from datetime import datetime

    logger = logging.getLogger("request_logger")

    REQUEST_LOG_PATH = "/var/log/app/requests.log"

    def log_request(request):
        """Log incoming HTTP request details."""
        entry = (
            f"[{datetime.now().isoformat()}] "
            f"IP={request.client_ip} "
            f"User-Agent={request.headers.get('User-Agent')} "
            f"Email={getattr(request, 'user_email', 'anonymous')} "
            f"Path={request.path} "
            f"Method={request.method}"
        )
        with open(REQUEST_LOG_PATH, 'a') as f:
            f.write(entry + '\n')
        logger.info(f"Request logged for IP {request.client_ip}")

    def log_error(request, error):
        """Log errors with full request context including PII."""
        entry = (
            f"[ERROR] [{datetime.now().isoformat()}] "
            f"User: {getattr(request, 'user_email', 'unknown')} "
            f"IP: {request.client_ip} "
            f"Session: {getattr(request, 'session_token', 'none')} "
            f"Error: {str(error)}"
        )
        with open(REQUEST_LOG_PATH, 'a') as f:
            f.write(entry + '\n')
        # Also send to error tracking (SaaS, US-hosted)
        send_to_error_tracker(entry)
    ```

