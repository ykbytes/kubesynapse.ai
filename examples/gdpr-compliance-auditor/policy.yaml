apiVersion: kubesynapse.ai/v1alpha1
kind: AgentPolicy
metadata:
  name: gdpr-demo-policy
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
spec:
  inputGuardrails:
    blockPromptInjection: true
    maxInputTokens: 65536
  outputGuardrails:
    maskPII: true
    maxOutputTokens: 32768
  allowedModels:
    - github-copilot/gpt-5-mini
  allowedMcpServers: []
  mcpRequireHitl: false
  toolPolicy:
    maxDelegationDepth: 1
    allowedToolPrefixes:
      - "local.command."
  memoryPolicy:
    maxInjectedMemories: 0
    autoPromote: false
  a2a:
    allowedTargets: []
    maxTimeoutSeconds: 120
