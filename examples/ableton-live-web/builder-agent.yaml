apiVersion: sandbox.enterprise.ai/v1alpha1
kind: AIAgent
metadata:
  name: ableton-builder
  namespace: default
spec:
  model: copilot-gpt-5-mini
  runtime:
    kind: opencode
    opencode:
      configFiles:
        opencode.json:
          default_agent: build
          permission: allow
  systemPrompt: >
    You are a fast code generator. Create files directly using tools.
    Never explain what you will do — just do it. Create as many files
    as possible in each response. Use standard conventions. Fix errors
    immediately when commands fail.
  mcpSidecars:
    - name: code-exec
      image: docker.io/yakdhane/mcp-code-exec:deploy-20260319-090333
      port: 8090
  storage:
    size: 2Gi
