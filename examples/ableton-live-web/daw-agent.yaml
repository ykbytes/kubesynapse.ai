apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: ableton-daw-agent
  namespace: default
spec:
  model: copilot-gpt-5-mini
  runtime:
    kind: opencode
    opencode:
      configFiles:
        opencode.json:
          default_agent: build
          permission: allow
  systemPrompt: >
    You are a senior web audio engineer and React specialist building a
    professional browser-based DAW inspired by Ableton Live. You write
    production-quality TypeScript with strict mode enabled.

    Tech stack — memorise and follow exactly:
    - React 18 with functional components and hooks (NO class components)
    - Vite 5 for bundling
    - TypeScript strict mode — zero `any`, zero type assertions unless
      casting DOM elements
    - Tone.js for ALL audio scheduling, synthesis, and effects — never
      use raw setTimeout/setInterval for audio timing
    - Zustand 5 for state management (named import: `import { create } from 'zustand'`)
    - Tailwind CSS 3 for styling — dark theme only
    - pnpm as package manager

    Rules:
    1. CREATE FILES DIRECTLY — do not describe what you will do, just do it.
       Create multiple files per response when possible.
    2. NEVER use `any` type. Define proper interfaces in src/types/.
    3. Components NEVER touch AudioContext or Tone.js directly — always go
       through the engine API in src/engine/ via Zustand stores.
    4. All Tone.js scheduling MUST use Tone.Transport — never raw timers.
    5. AudioContext requires a user gesture to start — always call
       Tone.start() inside a click handler before any audio plays.
    6. Use CSS Grid for the main layout. Dark theme: bg-[#1e1e1e],
       accent text-[#ff764d], surface bg-[#2d2d2d], text text-[#a8a8a8].
    7. Every React list/map MUST have a stable `key` prop.
    8. Use requestAnimationFrame for meter/playhead animations — never
       setInterval.
    9. When a step prompt tells you to verify, run the commands and fix
       any errors before finishing.
    10. Read existing files before editing — understand context before
        making changes.
    11. Import Zustand with named import: `import { create } from 'zustand'`.
        Never `import create from 'zustand'`.
    12. For audio node cleanup, always call `.dispose()` on Tone.js nodes
        in useEffect cleanup or engine teardown methods.
  skills:
    files:
      .github/skills/known-pitfalls/SKILL.md: |
        ---
        name: known-pitfalls
        description: Critical failure patterns for web audio DAW development. Study these BEFORE writing any code.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.process.exec
        ---

        # Known Pitfalls — Web Audio DAW

        ## 1. AudioContext User Gesture Requirement
        **WRONG:**
        ```ts
        // Auto-starting audio on mount
        useEffect(() => { Tone.start(); engine.play(); }, []);
        ```
        **RIGHT:**
        ```ts
        // Audio MUST be started from a user gesture (click/tap)
        const handlePlay = async () => {
          await Tone.start(); // Resume AudioContext
          engine.play();
        };
        return <button onClick={handlePlay}>Play</button>;
        ```

        ## 2. Tone.js Transport vs Raw Timers
        **WRONG:**
        ```ts
        setInterval(() => { playNextStep(); }, 60000 / bpm / 4);
        ```
        **RIGHT:**
        ```ts
        Tone.Transport.scheduleRepeat((time) => {
          // 'time' is sample-accurate AudioContext time
          sampler.triggerAttackRelease("C4", "16n", time);
        }, "16n");
        Tone.Transport.bpm.value = bpm;
        Tone.Transport.start();
        ```

        ## 3. Zustand v5 Named Import
        **WRONG:**
        ```ts
        import create from 'zustand'; // default import — BROKEN in v5
        ```
        **RIGHT:**
        ```ts
        import { create } from 'zustand'; // named import — required in v5
        ```

        ## 4. React Keys in Mapped Lists
        **WRONG:**
        ```tsx
        {tracks.map((t, i) => <Track track={t} />)}
        ```
        **RIGHT:**
        ```tsx
        {tracks.map((t) => <Track key={t.id} track={t} />)}
        ```

        ## 5. CSS Grid Overflow in DAW Layouts
        **WRONG:**
        ```css
        .timeline { display: grid; grid-template-columns: 200px 1fr; }
        /* 1fr can overflow when content is wider than viewport */
        ```
        **RIGHT:**
        ```css
        .timeline { display: grid; grid-template-columns: 200px minmax(0, 1fr); }
        /* minmax(0, 1fr) prevents content overflow */
        ```

        ## 6. requestAnimationFrame for Visual Updates
        **WRONG:**
        ```ts
        setInterval(() => { setPlayheadPosition(getPosition()); }, 16);
        ```
        **RIGHT:**
        ```ts
        useEffect(() => {
          let rafId: number;
          const update = () => {
            setPlayheadPosition(Tone.Transport.seconds);
            rafId = requestAnimationFrame(update);
          };
          rafId = requestAnimationFrame(update);
          return () => cancelAnimationFrame(rafId);
        }, []);
        ```

        ## 7. Tone.js Node Disposal
        **WRONG:**
        ```ts
        // Creating nodes without cleanup — memory leak
        const synth = new Tone.PolySynth();
        ```
        **RIGHT:**
        ```ts
        // Always dispose nodes when done
        useEffect(() => {
          const synth = new Tone.PolySynth();
          return () => { synth.dispose(); };
        }, []);
        // In engine classes: implement a dispose() method
        ```

        ## 8. Circular Module Dependencies
        **WRONG:**
        ```
        AudioEngine imports from TransportStore
        TransportStore imports from AudioEngine  // circular!
        ```
        **RIGHT:**
        ```
        // Engine exposes pure API, stores call engine methods
        // Engine NEVER imports from stores
        // Stores import from engine (one-way dependency)
        AudioEngine ← TransportStore (store calls engine)
        AudioEngine ← MixerStore (store calls engine)
        ```

      .github/skills/audio-engine/SKILL.md: |
        ---
        name: audio-engine
        description: Tone.js audio engine architecture patterns for the DAW.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.process.exec
        ---

        # Audio Engine Patterns

        ## AudioEngine Singleton
        ```ts
        // src/engine/AudioEngine.ts
        import * as Tone from 'tone';

        class AudioEngine {
          private channels: Map<string, ChannelStrip> = new Map();
          private master: Tone.Channel;
          private initialized = false;

          constructor() {
            this.master = new Tone.Channel().toDestination();
          }

          async init(): Promise<void> {
            if (this.initialized) return;
            await Tone.start();
            this.initialized = true;
          }

          play(): void { Tone.Transport.start(); }
          stop(): void { Tone.Transport.stop(); }
          pause(): void { Tone.Transport.pause(); }

          setBpm(bpm: number): void { Tone.Transport.bpm.value = bpm; }

          addChannel(id: string): ChannelStrip {
            const strip = new ChannelStrip(this.master);
            this.channels.set(id, strip);
            return strip;
          }

          getChannel(id: string): ChannelStrip | undefined {
            return this.channels.get(id);
          }

          dispose(): void {
            this.channels.forEach(ch => ch.dispose());
            this.channels.clear();
            this.master.dispose();
          }
        }

        export const audioEngine = new AudioEngine();
        ```

        ## ChannelStrip Pattern
        ```ts
        // src/engine/ChannelStrip.ts
        import * as Tone from 'tone';

        export class ChannelStrip {
          readonly channel: Tone.Channel;
          readonly meter: Tone.Meter;
          private effects: Tone.ToneAudioNode[] = [];

          constructor(destination: Tone.ToneAudioNode) {
            this.channel = new Tone.Channel();
            this.meter = new Tone.Meter({ smoothing: 0.8 });
            this.channel.connect(this.meter);
            this.channel.connect(destination);
          }

          setVolume(db: number): void { this.channel.volume.value = db; }
          setPan(pan: number): void { this.channel.pan.value = pan; }
          setSolo(solo: boolean): void { this.channel.solo = solo; }
          setMute(mute: boolean): void { this.channel.mute = mute; }

          addEffect(effect: Tone.ToneAudioNode): void {
            this.effects.push(effect);
            this.rebuildChain();
          }

          private rebuildChain(): void {
            // Disconnect all, reconnect: channel → effects → meter → destination
          }

          getLevel(): number { return this.meter.getValue() as number; }

          dispose(): void {
            this.effects.forEach(e => e.dispose());
            this.meter.dispose();
            this.channel.dispose();
          }
        }
        ```

        ## Effect Presets
        Always create effects as Tone.js built-in nodes:
        - Reverb: `new Tone.Reverb({ decay: 2.5, wet: 0.3 })`
        - Delay: `new Tone.FeedbackDelay({ delayTime: '8n', feedback: 0.3, wet: 0.25 })`
        - EQ3: `new Tone.EQ3({ low: 0, mid: 0, high: 0 })`
        - Compressor: `new Tone.Compressor({ threshold: -24, ratio: 4, attack: 0.003, release: 0.25 })`
        - Filter: `new Tone.Filter({ frequency: 1000, type: 'lowpass', rolloff: -24 })`
        - Distortion: `new Tone.Distortion({ distortion: 0.4, wet: 0.5 })`

      .github/skills/ui-layout/SKILL.md: |
        ---
        name: ui-layout
        description: CSS Grid layout specification for the Ableton-inspired DAW UI.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.process.exec
        ---

        # UI Layout — Ableton Live Inspired

        ## Main App Grid
        ```
        ┌─────────────────────────────────────────────┐
        │              TransportBar (56px)             │
        ├──────┬──────────────────────────┬────────────┤
        │      │                          │   Detail   │
        │ Side │    Main Content Area     │   Panel    │
        │ Bar  │   (Arrangement View      │ (Piano     │
        │ 240px│    OR Session View)      │  Roll /    │
        │      │                          │  Effects)  │
        │      │                          │   320px    │
        ├──────┴──────────────────────────┴────────────┤
        │            Mixer Strip (200px)               │
        └─────────────────────────────────────────────┘
        ```

        ## CSS Grid Implementation
        ```css
        .app-layout {
          display: grid;
          grid-template-rows: 56px minmax(0, 1fr) 200px;
          grid-template-columns: 240px minmax(0, 1fr) 320px;
          grid-template-areas:
            "transport transport transport"
            "sidebar   main     detail"
            "mixer     mixer    mixer";
          height: 100vh;
          overflow: hidden;
          background: #1e1e1e;
          color: #a8a8a8;
        }
        ```

        ## Color Tokens
        | Token         | Value     | Usage                 |
        |---------------|-----------|-----------------------|
        | bg-primary    | #1e1e1e   | App and panel bg      |
        | bg-surface    | #2d2d2d   | Cards, inputs, tracks |
        | bg-surface-2  | #383838   | Hover states          |
        | bg-clip       | #3b5998   | Audio clip regions    |
        | bg-midi-clip  | #5b8c5a   | MIDI clip regions     |
        | accent        | #ff764d   | Active, selected, CTA |
        | accent-hover  | #ff8f6d   | Accent hover state    |
        | text-primary  | #d4d4d4   | Primary text          |
        | text-secondary| #a8a8a8   | Secondary text        |
        | text-muted    | #6b6b6b   | Disabled, labels      |
        | border        | #3a3a3a   | Dividers, borders     |
        | meter-green   | #5cb85c   | VU meter safe zone    |
        | meter-yellow  | #f0ad4e   | VU meter caution      |
        | meter-red     | #d9534f   | VU meter clip/peak    |
        | solo-yellow   | #e8c040   | Solo button active    |
        | mute-red      | #d9534f   | Mute button active    |
        | record-red    | #e74c3c   | Record arm active     |

        ## Component Hierarchy
        ```
        App
        ├── TransportBar (play, stop, record, loop, BPM, time display)
        ├── Sidebar (track browser, file browser — can be collapsed)
        ├── MainView (switchable)
        │   ├── ArrangementView
        │   │   ├── TimeRuler
        │   │   ├── TrackLane[] (each has TrackHeader + ClipRegions)
        │   │   └── Playhead (animated vertical line)
        │   └── SessionView
        │       ├── SceneColumn (scene launch buttons)
        │       └── TrackColumn[] (each has ClipSlot[])
        ├── DetailPanel (contextual, shows piano roll or effects)
        │   ├── PianoRoll (MIDI note editor)
        │   ├── EffectsRack (per-track effect chain)
        │   └── SynthPanel (synth parameter controls)
        └── MixerStrip
            ├── MixerChannel[] (fader, pan, solo, mute, meter)
            └── MasterChannel (fader, meter, output)
        ```

      .github/skills/integration-wiring/SKILL.md: |
        ---
        name: integration-wiring
        description: Mandatory data-flow paths connecting stores to the audio engine.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.process.exec
        ---

        # Integration Wiring Contract

        ## Critical Path 1: Transport → AudioEngine
        ```
        User clicks Play → transportStore.play()
          → await audioEngine.init()   // ensures AudioContext resumed
          → audioEngine.play()         // Tone.Transport.start()
          → transportStore.setState({ isPlaying: true })

        User clicks Stop → transportStore.stop()
          → audioEngine.stop()         // Tone.Transport.stop()
          → transportStore.setState({ isPlaying: false, position: 0 })

        User changes BPM → transportStore.setBpm(120)
          → audioEngine.setBpm(120)    // Tone.Transport.bpm.value
          → transportStore.setState({ bpm: 120 })
        ```

        ## Critical Path 2: Mixer → ChannelStrip
        ```
        User moves fader → mixerStore.setVolume(trackId, -6)
          → audioEngine.getChannel(trackId).setVolume(-6)
          → mixerStore.setState({ channels: updated })

        User toggles solo → mixerStore.setSolo(trackId, true)
          → audioEngine.getChannel(trackId).setSolo(true)
          → mixerStore.setState({ channels: updated })
        ```

        ## Critical Path 3: ClipLauncher → Scheduling
        ```
        User triggers clip → projectStore.triggerClip(trackId, clipId)
          → audioEngine.scheduleClip(trackId, clip)
          → projectStore.setState({ activeClips: updated })
        ```

        ## Critical Path 4: Effects → Audio Graph
        ```
        User adds reverb → mixerStore.addEffect(trackId, 'reverb')
          → const reverb = new Tone.Reverb(...)
          → audioEngine.getChannel(trackId).addEffect(reverb)
          → mixerStore.setState({ channels: updated })
        ```

        ## Dependency Direction (STRICT)
        ```
        Engine layer:  AudioEngine, ChannelStrip, Effects  (NO store imports)
            ↑
        Store layer:   transportStore, mixerStore, projectStore  (imports engine)
            ↑
        UI layer:      Components  (imports stores only, NEVER engine)
        ```

        ## Verification Commands
        ```bash
        # Check no circular imports (engine must not import stores)
        grep -r "from.*stores" src/engine/ && echo "FAIL: engine imports stores" || echo "PASS"

        # Check components don't import engine directly
        grep -r "from.*engine" src/components/ | grep -v "// engine-type-only" && echo "FAIL" || echo "PASS"

        # Verify all stores call engine methods
        grep -l "audioEngine" src/stores/*.ts | wc -l
        # Should be >= 2 (transportStore, mixerStore at minimum)
        ```

      .github/skills/strict-types/SKILL.md: |
        ---
        name: strict-types
        description: TypeScript type patterns and Zustand store conventions.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.process.exec
        ---

        # Strict TypeScript Patterns

        ## Core Interfaces
        ```ts
        // src/types/index.ts

        export interface Track {
          id: string;
          name: string;
          type: 'audio' | 'midi' | 'return' | 'master';
          color: string;
          clips: Clip[];
          armed: boolean;
          solo: boolean;
          mute: boolean;
        }

        export interface Clip {
          id: string;
          name: string;
          trackId: string;
          type: 'audio' | 'midi';
          startTime: number;   // in beats
          duration: number;    // in beats
          color: string;
          notes?: MidiNote[];  // for MIDI clips
          audioUrl?: string;   // for audio clips
        }

        export interface MidiNote {
          pitch: number;      // MIDI note number 0-127
          velocity: number;   // 0-127
          start: number;      // offset in beats from clip start
          duration: number;   // in beats
        }

        export interface MixerChannel {
          trackId: string;
          volume: number;     // in dB (-Infinity to +6)
          pan: number;        // -1 (left) to 1 (right)
          solo: boolean;
          mute: boolean;
          effects: EffectInstance[];
          sends: SendLevel[];
        }

        export interface EffectInstance {
          id: string;
          type: EffectType;
          params: Record<string, number>;
          wet: number;
          bypassed: boolean;
        }

        export type EffectType = 'reverb' | 'delay' | 'eq3' | 'compressor' | 'filter' | 'distortion';

        export interface SendLevel {
          returnTrackId: string;
          level: number; // in dB
        }

        export interface TransportState {
          isPlaying: boolean;
          isRecording: boolean;
          isLooping: boolean;
          bpm: number;
          position: number;       // current position in beats
          loopStart: number;      // loop region start in beats
          loopEnd: number;        // loop region end in beats
          timeSignature: [number, number]; // e.g. [4, 4]
        }

        export interface Project {
          id: string;
          name: string;
          tracks: Track[];
          bpm: number;
          timeSignature: [number, number];
        }

        export type ViewMode = 'arrangement' | 'session';
        ```

        ## Zustand Store Pattern
        ```ts
        import { create } from 'zustand';
        import { audioEngine } from '../engine/AudioEngine';

        interface TransportStore extends TransportState {
          play: () => Promise<void>;
          stop: () => void;
          pause: () => void;
          setBpm: (bpm: number) => void;
          toggleLoop: () => void;
          setPosition: (beats: number) => void;
        }

        export const useTransportStore = create<TransportStore>((set, get) => ({
          isPlaying: false,
          isRecording: false,
          isLooping: false,
          bpm: 120,
          position: 0,
          loopStart: 0,
          loopEnd: 16,
          timeSignature: [4, 4] as [number, number],

          play: async () => {
            await audioEngine.init();
            audioEngine.play();
            set({ isPlaying: true });
          },
          stop: () => {
            audioEngine.stop();
            set({ isPlaying: false, position: 0 });
          },
          pause: () => {
            audioEngine.pause();
            set({ isPlaying: false });
          },
          setBpm: (bpm: number) => {
            audioEngine.setBpm(bpm);
            set({ bpm });
          },
          toggleLoop: () => {
            const looping = !get().isLooping;
            Tone.Transport.loop = looping;
            set({ isLooping: looping });
          },
          setPosition: (beats: number) => {
            Tone.Transport.position = Tone.Time(beats, 'i').toBarsBeatsSixteenths();
            set({ position: beats });
          },
        }));
        ```

        ## Rules
        - NEVER use `any` — use `unknown` + type guard if type is truly unknown
        - NEVER use `as` type assertions except for DOM element casting: `e.target as HTMLInputElement`
        - All function parameters must be typed — never rely on inference for public APIs
        - Store actions that affect audio MUST call the corresponding engine method
        - Export interfaces from `src/types/index.ts` — import everywhere else

      .github/skills/verification-gates/SKILL.md: |
        ---
        name: verification-gates
        description: Automated quality checks to run at the end of each step.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.process.exec
        ---

        # Verification Gates

        Run these checks to verify code quality. Fix any failures before
        marking a step as complete.

        ## Gate 1: TypeScript Compiles Clean
        ```bash
        cd /workspace && npx tsc --noEmit 2>&1
        # Must exit 0 with no errors
        ```

        ## Gate 2: Vite Build Succeeds
        ```bash
        cd /workspace && npx vite build 2>&1
        # Must exit 0 and produce dist/ folder
        ```

        ## Gate 3: No `any` Types
        ```bash
        grep -rn ': any' src/ --include='*.ts' --include='*.tsx' | grep -v node_modules | grep -v '// eslint-disable'
        # Must return empty (no matches)
        ```

        ## Gate 4: No Placeholder Code
        ```bash
        grep -rn 'TODO\|FIXME\|HACK\|XXX\|placeholder\|not implemented' src/ --include='*.ts' --include='*.tsx' | grep -v node_modules
        # Should return empty — all code must be complete
        ```

        ## Gate 5: No Default Zustand Imports
        ```bash
        grep -rn "import create from 'zustand'" src/ --include='*.ts' | grep -v node_modules
        # Must return empty — use named import { create }
        ```

        ## Gate 6: Engine Does Not Import Stores
        ```bash
        grep -rn "from.*stores" src/engine/ --include='*.ts'
        # Must return empty — one-way dependency: stores → engine
        ```

        ## Gate 7: Components Don't Import Engine Directly
        ```bash
        grep -rn "from.*engine" src/components/ --include='*.ts' --include='*.tsx' | grep -v 'types'
        # Must return empty — components use stores only
        ```

        ## Gate 8: Correct File Counts
        ```bash
        echo "Types:      $(find src/types -name '*.ts' | wc -l) files (need >= 1)"
        echo "Stores:     $(find src/stores -name '*.ts' | wc -l) files (need >= 4)"
        echo "Engine:     $(find src/engine -name '*.ts' | wc -l) files (need >= 4)"
        echo "Components: $(find src/components -name '*.tsx' | wc -l) files (need >= 10)"
        ```

        ## Gate 9: React Keys Present
        ```bash
        grep -rn '\.map(' src/components/ --include='*.tsx' -A2 | grep -v 'key=' | grep '<' | head -5
        # Check that all .map() calls have key props on returned elements
        ```

        ## Gate 10: No Raw setTimeout/setInterval for Audio
        ```bash
        grep -rn 'setInterval\|setTimeout' src/engine/ --include='*.ts'
        # Must return empty — use Tone.Transport.schedule* instead
        ```

        ## Gate 11: Tone.start() in User Gesture
        ```bash
        grep -rn 'Tone.start()' src/ --include='*.ts' --include='*.tsx'
        # Must appear in a click handler or async function called from one
        ```

        ## Gate 12: Package.json Has All Dependencies
        ```bash
        cd /workspace && node -e "
          const pkg = require('./package.json');
          const deps = {...pkg.dependencies, ...pkg.devDependencies};
          const required = ['react','react-dom','tone','zustand','tailwindcss','vite','typescript'];
          const missing = required.filter(d => !deps[d]);
          if (missing.length) { console.error('Missing:', missing); process.exit(1); }
          console.log('All required deps present');
        "
        ```
  mcpSidecars:
    - name: code-exec
      image: docker.io/kubesynapse/mcp-code-exec:deploy-20260319-090333
      port: 8090
  storage:
    size: 2Gi
  enableGVisor: false
