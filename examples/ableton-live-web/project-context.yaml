apiVersion: v1
kind: ConfigMap
metadata:
  name: ableton-live-web-context
  namespace: default
data:
  context: |
    # Ableton Live Web — Project Context

    ## Product Description
    Build a professional browser-based Digital Audio Workstation (DAW) inspired
    by Ableton Live 11. The application lets users create, arrange, and mix
    music entirely in the browser using the Web Audio API. It features a
    dual-view interface (Arrangement + Session/Clip Launcher), a full channel
    mixer with effects, built-in synthesizer and drum machine, a MIDI piano
    roll editor, and real-time transport controls — all running client-side
    with sample-accurate audio scheduling.

    ## Tech Stack
    - Language: TypeScript 5.5+ (strict mode — zero `any`, zero type assertions)
    - Framework: React 18 with functional components and hooks only
    - Audio Engine: Web Audio API + Tone.js 15 for scheduling, synthesis, and effects
    - Build Tool: Vite 5
    - Styling: Tailwind CSS 3 with a dark theme (Ableton-inspired palette)
    - State Management: Zustand 5 (named import: `import { create } from 'zustand'`)
    - Package Manager: pnpm

    ## Architecture Conventions
    - Project root at `/workspace/`:
      - `src/engine/` — Tone.js audio graph, scheduling, transport, effects, instruments
      - `src/components/` — React UI components organized by feature:
        - `src/components/arrangement/` — Timeline, track lanes, playhead
        - `src/components/session/` — Clip launcher, scene triggers
        - `src/components/mixer/` — Channel strips, faders, meters
        - `src/components/instruments/` — Piano roll, synth panel, drum pads
        - `src/components/effects/` — Effects rack
      - `src/stores/` — Zustand stores (transport, tracks, mixer, project, ui)
      - `src/types/` — Shared TypeScript interfaces
      - `src/hooks/` — Custom React hooks (playhead, meters, keyboard shortcuts)

    ## Dependency Direction (STRICT — one-way only)
    ```
    Engine layer:  src/engine/    → imports from src/types/ ONLY
    Store layer:   src/stores/    → imports from src/engine/ and src/types/
    Hook layer:    src/hooks/     → imports from src/stores/ and src/types/
    UI layer:      src/components/ → imports from src/stores/, src/hooks/, src/types/ ONLY
    ```
    Components NEVER import from src/engine/ directly.
    Engine NEVER imports from src/stores/ (no circular dependencies).

    ## Data Models
    All defined in `src/types/index.ts`:

    ```typescript
    interface Track {
      id: string;
      name: string;
      type: 'audio' | 'midi' | 'return' | 'master';
      color: string;        // hex color
      clips: Clip[];
      armed: boolean;
      solo: boolean;
      mute: boolean;
    }

    interface Clip {
      id: string;
      name: string;
      trackId: string;
      type: 'audio' | 'midi';
      startTime: number;    // in beats
      duration: number;     // in beats
      color: string;
      notes?: MidiNote[];   // for MIDI clips
      audioUrl?: string;    // for audio clips
    }

    interface MidiNote {
      pitch: number;        // MIDI note number 0-127
      velocity: number;     // 0-127
      start: number;        // offset in beats from clip start
      duration: number;     // in beats
    }

    interface MixerChannel {
      trackId: string;
      volume: number;       // in dB (-Infinity to +6)
      pan: number;          // -1 (left) to 1 (right)
      solo: boolean;
      mute: boolean;
      effects: EffectInstance[];
      sends: SendLevel[];
    }

    interface EffectInstance {
      id: string;
      type: EffectType;      // 'reverb' | 'delay' | 'eq3' | 'compressor' | 'filter' | 'distortion'
      params: Record<string, number>;
      wet: number;           // 0-1
      bypassed: boolean;
    }

    interface TransportState {
      isPlaying: boolean;
      isRecording: boolean;
      isLooping: boolean;
      bpm: number;           // 20-300
      position: number;      // current position in beats
      loopStart: number;
      loopEnd: number;
      timeSignature: [number, number];
    }

    type ViewMode = 'arrangement' | 'session';
    ```

    ## Color Palette (Ableton Live 11 Inspired)
    | Token         | Hex       | Usage                     |
    |---------------|-----------|---------------------------|
    | bg-primary    | #1e1e1e   | App background, panels    |
    | bg-surface    | #2d2d2d   | Cards, inputs, tracks     |
    | bg-surface-2  | #383838   | Hover states              |
    | bg-clip       | #3b5998   | Audio clip regions        |
    | bg-midi-clip  | #5b8c5a   | MIDI clip regions         |
    | accent        | #ff764d   | Active, selected, CTA     |
    | accent-hover  | #ff8f6d   | Accent hover state        |
    | text-primary  | #d4d4d4   | Primary text              |
    | text-secondary| #a8a8a8   | Secondary text            |
    | text-muted    | #6b6b6b   | Disabled, labels          |
    | border        | #3a3a3a   | Dividers, borders         |
    | meter-green   | #5cb85c   | VU meter safe             |
    | meter-yellow  | #f0ad4e   | VU meter caution          |
    | meter-red     | #d9534f   | VU meter clip/peak        |
    | solo-yellow   | #e8c040   | Solo button active        |
    | record-red    | #e74c3c   | Record arm active         |

    ## Known Failure Modes (MUST AVOID)
    1. **AudioContext user gesture**: Tone.start() MUST be called inside a
       click handler — never on mount or in useEffect.
    2. **Tone.Transport vs raw timers**: NEVER use setTimeout/setInterval
       for audio timing. Always use Tone.Transport.schedule* methods.
    3. **Zustand v5 import**: MUST use `import { create } from 'zustand'`
       (named import). Default import is BROKEN in v5.
    4. **CSS Grid overflow**: Use `minmax(0, 1fr)` instead of bare `1fr`
       to prevent content overflow in grid cells.
    5. **Meter animation**: Use requestAnimationFrame for VU meters and
       playhead — never setInterval.
    6. **Tone.js node disposal**: Always call `.dispose()` on Tone nodes
       in cleanup functions. Memory leaks crash tabs.
    7. **Circular imports**: Engine NEVER imports from stores. Components
       NEVER import from engine. One-way dependency chain only.

    ## Wiring Contract (Critical Paths)
    1. Play button → Tone.start() → audioEngine.init() → audioEngine.play()
    2. Stop button → audioEngine.stop() → transport position = 0
    3. BPM change → audioEngine.setBpm() → Tone.Transport.bpm.value
    4. Fader drag → mixerStore.setVolume() → channelStrip.setVolume()
    5. Solo/Mute → mixerStore toggle → channelStrip.setSolo/setMute()
    6. Add effect → mixerStore.addEffect() → channelStrip.addEffect()
    7. Trigger clip → projectStore.triggerClip() → clipScheduler.scheduleClip()
    8. Piano roll edit → projectStore.updateClip() → update clip.notes[]

    ## Constraints
    - No server-side audio — everything runs in the browser
    - Chrome 120+ and Firefox 120+ (WebAudio baseline)
    - Maximum initial bundle: 500 KB gzipped (excluding samples)
    - Dark theme only — desktop layout 1280px minimum
    - All audio operations sample-accurate via Tone.Transport scheduling
    - TypeScript strict mode — zero `any`, zero `@ts-ignore`

    ## Key Features (Priority Order)
    1. Transport bar: play, pause, stop, BPM control, loop toggle, time display
    2. Multi-track arrangement view with horizontal timeline and playhead
    3. Session view: clip launcher grid with scene triggers
    4. Channel mixer: volume faders, pan knobs, solo/mute, VU meters
    5. Audio effects rack: reverb, delay, EQ3, compressor, filter, distortion
    6. Piano roll MIDI note editor
    7. Built-in polyphonic synthesizer with ADSR + filter controls
    8. Drum machine with 8 trigger pads
    9. Master channel with stereo metering
    10. Keyboard shortcuts (Space=play, Enter=stop, Tab=view switch)
