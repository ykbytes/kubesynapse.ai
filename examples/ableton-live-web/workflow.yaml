apiVersion: kubesynth.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: ableton-live-web
  namespace: default
spec:
  description: >
    Build a professional browser-based DAW inspired by Ableton Live.
    10 sequential steps, single agent (copilot-gpt-5.4), shared session.
    React 18 + Vite + TypeScript + Tone.js + Zustand + Tailwind CSS.
  input: >
    Build "Ableton Live Web" — a professional browser-based Digital Audio
    Workstation inspired by Ableton Live 11. Use TypeScript strict mode,
    React 18, Vite 5, Tailwind CSS dark theme, Tone.js for all audio, and
    Zustand 5 for state management. All audio runs client-side via Web Audio
    API. The app must have: transport controls, multi-track arrangement view,
    session/clip launcher view, channel mixer with effects, piano roll MIDI
    editor, synth and drum instruments, and master metering.
  contextRef: ableton-live-web-context
  messageBus: in-memory
  steps:
    # ── Step 0: Project Scaffold ──────────────────────────────────────
    - name: scaffold
      type: agent
      agentRef: ableton-daw-agent
      prompt: >
        Create the project scaffold for "Ableton Live Web" in /workspace/.
        Create ALL files directly — do not describe, just create them.

        ## Create package.json
        Include these exact dependencies:
        - react ^18.3.0, react-dom ^18.3.0
        - tone ^15.0.4
        - zustand ^5.0.0
        - Dependencies as devDependencies:
          typescript ^5.5.0, @types/react ^18.3.0, @types/react-dom ^18.3.0,
          vite ^5.4.0, @vitejs/plugin-react ^4.3.0,
          tailwindcss ^3.4.0, postcss ^8.4.0, autoprefixer ^10.4.0
        - scripts: "dev": "vite", "build": "vite build", "preview": "vite preview"

        ## Create tsconfig.json
        TypeScript strict mode, jsx: react-jsx, target: ES2022,
        moduleResolution: bundler, paths: { "@/*": ["./src/*"] }.

        ## Create vite.config.ts
        React plugin, resolve alias @ → src/, server port 5173.

        ## Create tailwind.config.ts
        content: ['./index.html', './src/**/*.{ts,tsx}'],
        theme.extend.colors for the Ableton palette:
        primary: '#1e1e1e', surface: '#2d2d2d', 'surface-2': '#383838',
        accent: '#ff764d', 'accent-hover': '#ff8f6d',
        border: '#3a3a3a'.

        ## Create postcss.config.js
        tailwindcss + autoprefixer plugins.

        ## Create index.html
        Minimal HTML5 shell with <div id="root"></div>, dark background,
        link to /src/main.tsx as module script.

        ## Create src/main.tsx
        Render <App /> into #root with StrictMode.
        Import './index.css'.

        ## Create src/index.css
        Tailwind directives (@tailwind base/components/utilities),
        global body styles: bg-[#1e1e1e], text-[#d4d4d4], font-family sans-serif,
        margin 0, overflow hidden, height 100vh.

        ## Create src/App.tsx
        Placeholder component returning a div with text "Ableton Live Web — Loading..."
        with Tailwind classes for full-screen dark bg and centered text.

        ## Install and verify
        Run: cd /workspace && pnpm install
        Run: cd /workspace && npx tsc --noEmit
        Run: cd /workspace && npx vite build
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 300
        maxAttempts: 2
        maxTurns: 5
        sessionGroup: dev-session

    # ── Step 1: Types & Zustand Stores ────────────────────────────────
    - name: types-and-stores
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [scaffold]
      prompt: >
        Read the existing scaffold in /workspace/ first.
        Create the type system and all Zustand stores.

        ## Create src/types/index.ts — All TypeScript interfaces
        Define ALL interfaces. Export them as named exports:
        - Track: { id, name, type ('audio'|'midi'|'return'|'master'), color, clips, armed, solo, mute }
        - Clip: { id, name, trackId, type ('audio'|'midi'), startTime (beats), duration (beats), color, notes? (MidiNote[]), audioUrl? }
        - MidiNote: { pitch (0-127), velocity (0-127), start (beats offset), duration (beats) }
        - MixerChannel: { trackId, volume (dB), pan (-1 to 1), solo, mute, effects (EffectInstance[]), sends (SendLevel[]) }
        - EffectInstance: { id, type (EffectType), params (Record<string,number>), wet (0-1), bypassed }
        - EffectType: 'reverb' | 'delay' | 'eq3' | 'compressor' | 'filter' | 'distortion'
        - SendLevel: { returnTrackId, level (dB) }
        - TransportState: { isPlaying, isRecording, isLooping, bpm, position (beats), loopStart, loopEnd, timeSignature }
        - Project: { id, name, tracks, bpm, timeSignature }
        - ViewMode: 'arrangement' | 'session'
        - UIState: { viewMode, selectedTrackId, selectedClipId, detailPanel ('pianoRoll'|'effects'|'synth'|null), sidebarOpen }
        - Scene: { id, name, clipIds (string[]) }

        ## Create src/stores/transportStore.ts
        Zustand store with state: isPlaying, isRecording, isLooping, bpm (default 120),
        position (0), loopStart (0), loopEnd (16), timeSignature [4,4].
        Actions: play, stop, pause, setBpm, toggleLoop, toggleRecord, setPosition.
        Engine calls are placeholder stubs for now — add comments like:
        // TODO: wire to audioEngine.play() in integration step

        ## Create src/stores/trackStore.ts
        State: tracks (Track[]), with default 4 tracks (2 MIDI, 1 audio, 1 master).
        Actions: addTrack, removeTrack, updateTrack, setTrackArmed, setTrackSolo, setTrackMute.

        ## Create src/stores/mixerStore.ts
        State: channels (MixerChannel[]), masterVolume, masterPan.
        Actions: setVolume, setPan, setSolo, setMute, addEffect, removeEffect, setEffectParam, setEffectWet.

        ## Create src/stores/projectStore.ts
        State: project (Project), clips (Clip[]).
        Actions: addClip, removeClip, updateClip, triggerClip, stopClip, setProjectName.

        ## Create src/stores/uiStore.ts
        State: viewMode ('arrangement'), selectedTrackId, selectedClipId,
        detailPanel (null), sidebarOpen (true).
        Actions: setViewMode, selectTrack, selectClip, setDetailPanel, toggleSidebar.

        ## Verify
        Run: cd /workspace && npx tsc --noEmit
        Fix any type errors before finishing.
      execution:
        timeoutSeconds: 500
        maxAttempts: 2
        maxTurns: 10
        sessionGroup: dev-session

    # ── Step 2: Audio Engine ──────────────────────────────────────────
    - name: audio-engine
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [types-and-stores]
      prompt: >
        Read the existing code in /workspace/src/ first.
        Import types from src/types/index.ts.
        Build the complete Tone.js audio engine in src/engine/.

        ## Create src/engine/AudioEngine.ts
        Singleton class with:
        - private channels: Map<string, ChannelStrip>
        - private master: Tone.Channel → toDestination()
        - init(): await Tone.start(), set initialized flag
        - play(): Tone.Transport.start()
        - stop(): Tone.Transport.stop(), Tone.Transport.position = 0
        - pause(): Tone.Transport.pause()
        - setBpm(bpm): Tone.Transport.bpm.value = bpm
        - setLoop(enabled, start, end): configure Tone.Transport.loop
        - addChannel(id): create ChannelStrip, store in map, return it
        - removeChannel(id): dispose and delete from map
        - getChannel(id): return from map
        - getMasterLevel(): return master meter value
        - dispose(): cleanup all channels and master
        Export singleton: export const audioEngine = new AudioEngine()

        ## Create src/engine/ChannelStrip.ts
        Class with:
        - channel: Tone.Channel
        - meter: Tone.Meter (smoothing 0.8)
        - private effects chain: Tone.ToneAudioNode[]
        - constructor(destination): create channel, meter, connect to destination
        - setVolume(db), setPan(pan), setSolo(solo), setMute(mute)
        - addEffect(effect: Tone.ToneAudioNode): push and rebuild chain
        - removeEffect(index): dispose, splice, rebuild chain
        - getLevel(): return meter.getValue() as number
        - dispose(): cleanup all effects, meter, channel

        ## Create src/engine/Effects.ts
        Factory function createEffect(type: EffectType, params?): Tone.ToneAudioNode
        Map each type to Tone.js class:
        - 'reverb' → new Tone.Reverb({ decay: 2.5, wet: 0.3 })
        - 'delay' → new Tone.FeedbackDelay({ delayTime: '8n', feedback: 0.3, wet: 0.25 })
        - 'eq3' → new Tone.EQ3({ low: 0, mid: 0, high: 0 })
        - 'compressor' → new Tone.Compressor({ threshold: -24, ratio: 4 })
        - 'filter' → new Tone.Filter({ frequency: 1000, type: 'lowpass' })
        - 'distortion' → new Tone.Distortion({ distortion: 0.4, wet: 0.5 })

        ## Create src/engine/SynthEngine.ts
        Class wrapping Tone.PolySynth with:
        - synth: Tone.PolySynth (default Tone.Synth, 8 voices)
        - connect(destination: Tone.ToneAudioNode)
        - triggerAttack(note, velocity, time?)
        - triggerRelease(note, time?)
        - triggerAttackRelease(note, duration, time?, velocity?)
        - setEnvelope(attack, decay, sustain, release)
        - setOscillator(type: 'sine'|'square'|'sawtooth'|'triangle')
        - dispose()

        ## Create src/engine/DrumSampler.ts
        Class wrapping Tone.Players with:
        - players: Tone.Players loaded with built-in URLs or oscillator-generated sounds
        - For initial version, use Tone.MembraneSynth (kick), Tone.MetalSynth (hihat),
          Tone.NoiseSynth (snare) since we have no sample files
        - connect(destination)
        - trigger(padName: string, time?, velocity?)
        - Available pads: kick, snare, hihat, clap, tom1, tom2, rim, cowbell
        - dispose()

        ## Create src/engine/ClipScheduler.ts
        Class for scheduling clips on the timeline:
        - scheduleClip(clip: Clip, channel: ChannelStrip, synth?: SynthEngine)
        - cancelClip(clipId: string)
        - cancelAll()
        - For MIDI clips: schedule each note via Tone.Transport.schedule
        - For audio clips: schedule via Tone.Player
        - Store scheduled event IDs for cancellation
        - dispose()

        ## Create src/engine/index.ts
        Re-export audioEngine, ChannelStrip, createEffect, SynthEngine,
        DrumSampler, ClipScheduler.

        ## Verify
        Run: cd /workspace && npx tsc --noEmit
        Ensure NO engine file imports from src/stores/ (one-way dependency).
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 600
        maxAttempts: 2
        maxTurns: 12
        sessionGroup: dev-session

    # ── Step 3: Layout & Transport Bar ────────────────────────────────
    - name: layout-and-transport
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [audio-engine]
      prompt: >
        Read the existing code in /workspace/src/ first (types, stores, engine).
        Build the main app layout and transport bar.

        ## Rewrite src/App.tsx — Main Layout
        Use CSS Grid to create the Ableton-inspired layout:
        - grid-template-rows: 56px minmax(0, 1fr) 200px
        - grid-template-columns: 240px minmax(0, 1fr) 320px
        - grid-template-areas: "transport transport transport" / "sidebar main detail" / "mixer mixer mixer"
        - Full viewport height, overflow hidden
        - Dark background #1e1e1e
        - Import and place: TransportBar, Sidebar, MainView, DetailPanel, MixerStrip
        - For components not yet built (Sidebar, MainView, DetailPanel, MixerStrip),
          create them as simple placeholder divs with their names and correct grid-area.

        ## Create src/components/TransportBar.tsx
        Professional transport bar with:
        - Play/Pause toggle button (▶/⏸) with accent color when playing
        - Stop button (⏹) — resets position to 0
        - Record button (⏺) — red when armed
        - Loop toggle button — accent when active
        - BPM control: clickable number display, editable input on click,
          range 20-300, +/- buttons for fine adjustment
        - Time display: current position as bars.beats.sixteenths
          (format from transport position in beats)
        - Metronome toggle
        - View switcher: Arrangement / Session toggle buttons
        - Layout: flex row, items center, justify between, h-14, bg-[#2d2d2d],
          border-b border-[#3a3a3a]
        - All buttons use stores: useTransportStore and useUIStore
        - Play button must call: await Tone.start() then store.play()

        ## Create src/components/Sidebar.tsx
        Collapsible left sidebar with:
        - Header with "Browser" label and collapse toggle button
        - Track list section: show all tracks from trackStore with name and type icon
        - Click a track to select it (uiStore.selectTrack)
        - "Add Track" button at bottom (dropdown: MIDI, Audio)
        - Styling: bg-[#2d2d2d], border-r border-[#3a3a3a], overflow-y auto
        - When collapsed (uiStore.sidebarOpen = false), hide content and shrink to 0 width

        ## Create src/components/MainView.tsx
        Switchable view container:
        - Read viewMode from uiStore
        - If 'arrangement': render <ArrangementView /> placeholder div
        - If 'session': render <SessionView /> placeholder div
        - Fill available space with minmax(0, 1fr)

        ## Create src/components/DetailPanel.tsx
        Right-side contextual panel:
        - Read detailPanel from uiStore
        - Show header with panel name and close (×) button
        - If null: show "Select a clip or track" placeholder
        - If 'pianoRoll': placeholder for PianoRoll
        - If 'effects': placeholder for EffectsRack
        - If 'synth': placeholder for SynthPanel
        - Styling: bg-[#2d2d2d], border-l border-[#3a3a3a]

        ## Create src/components/MixerStrip.tsx
        Bottom mixer strip container:
        - Horizontal scrollable flex row of MixerChannel placeholders
        - One placeholder per track from trackStore
        - And one for master channel
        - Styling: bg-[#2d2d2d], border-t border-[#3a3a3a], h-[200px], overflow-x auto

        ## Update src/index.css
        Add utility classes if needed. Ensure scrollbar styling is dark.
        Add custom scrollbar styles: thin, dark thumb (#555), dark track (#2d2d2d).

        ## Verify
        Run: cd /workspace && npx tsc --noEmit
        Run: cd /workspace && npx vite build
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 500
        maxAttempts: 2
        maxTurns: 10
        sessionGroup: dev-session

    # ── Step 4: Arrangement View ──────────────────────────────────────
    - name: arrangement-view
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [layout-and-transport]
      prompt: >
        Read existing code in /workspace/src/ first (especially App.tsx,
        types, stores, and any existing components).
        Build the multi-track arrangement view (horizontal timeline).

        ## Create src/components/arrangement/TimeRuler.tsx
        Horizontal ruler at the top of the arrangement:
        - Shows bar numbers (1, 2, 3, ...) and beat subdivisions
        - Uses project BPM and time signature from stores
        - Adapts to zoom level (props: pixelsPerBeat, scrollLeft)
        - Render bar numbers as absolutely positioned spans
        - Click on ruler to set transport position
        - Styling: h-6, bg-[#2d2d2d], border-b border-[#3a3a3a], font-mono text-xs

        ## Create src/components/arrangement/TrackHeader.tsx
        Left-side header for each track lane:
        - Track name (editable on double-click)
        - Track color indicator (left border)
        - Solo (S), Mute (M), Record Arm (●) buttons
        - Solo button: yellow (#e8c040) when active
        - Mute button: red (#d9534f) when active
        - Record arm: red (#e74c3c) when armed
        - Click to select track
        - Width: 200px, height matches track lane

        ## Create src/components/arrangement/ClipRegion.tsx
        Colored block representing a clip on the timeline:
        - Props: clip, pixelsPerBeat, selected
        - Positioned absolutely: left = clip.startTime * pixelsPerBeat, width = clip.duration * pixelsPerBeat
        - Background: clip.color with opacity
        - If MIDI clip: show mini note visualization (small rectangles for notes)
        - If audio clip: show simplified waveform placeholder
        - Click to select clip
        - Clip name in top-left corner, truncated with ellipsis
        - Selected state: accent border (#ff764d)
        - Rounded corners, slight shadow

        ## Create src/components/arrangement/TrackLane.tsx
        One horizontal lane per track:
        - Contains ClipRegion components for each clip in the track
        - Background alternates between #1e1e1e and #222222 for adjacent tracks
        - Minimum height 60px
        - Relative positioned to allow absolute clip positioning
        - Horizontal scroll controlled by parent

        ## Create src/components/arrangement/Playhead.tsx
        Animated vertical line showing current playback position:
        - Use requestAnimationFrame to update position from Tone.Transport.seconds
        - Convert seconds to pixels: position * (bpm/60) * pixelsPerBeat
        - Styling: absolute, width 1px, bg-[#ff764d], full height, z-10
        - Only animate when transport is playing

        ## Create src/components/ArrangementView.tsx
        Compose the whole arrangement view:
        - Top: TimeRuler (sticky)
        - Left column: TrackHeader[] (fixed 200px width)
        - Right area: TrackLane[] with horizontal and vertical scrolling
        - Playhead overlaid on the lane area
        - State: pixelsPerBeat (default 20), scrollLeft, scrollTop
        - Zoom: Ctrl+wheel changes pixelsPerBeat (range 5-100)
        - Scroll: wheel scrolls vertically, shift+wheel scrolls horizontally
        - Sync scrollLeft between TimeRuler and lanes
        - CSS Grid: grid-template-columns 200px minmax(0, 1fr)

        ## Update MainView.tsx
        Replace arrangement placeholder with the real <ArrangementView />.

        ## Add sample data
        In trackStore, ensure the default tracks have some sample clips
        (2-3 clips per track) so the view is not empty. Give clips different
        colors (#3b5998 for audio, #5b8c5a for MIDI).

        ## Verify
        Run: cd /workspace && npx tsc --noEmit
        Run: cd /workspace && npx vite build
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 600
        maxAttempts: 2
        maxTurns: 12
        sessionGroup: dev-session

    # ── Step 5: Session View (Clip Launcher) ──────────────────────────
    - name: session-view
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [arrangement-view]
      prompt: >
        Read existing code in /workspace/src/ first.
        Build the Session View — Ableton's clip launcher grid.

        ## Create src/components/session/ClipSlot.tsx
        Individual slot in the clip launcher grid:
        - Props: trackId, sceneIndex, clip (Clip | null)
        - Empty slot: dark surface (#2d2d2d) with subtle border, shows ▶ on hover
        - Filled slot: clip color background with clip name
        - Click filled slot to trigger clip play
        - Click empty slot to create new clip (opens detail panel)
        - Playing indicator: pulsing accent border animation
        - Stopped: static display
        - Size: min-width 120px, height 40px

        ## Create src/components/session/SceneColumn.tsx
        Right-most column with scene launch buttons:
        - One button per scene/row
        - Click launches all clips in that scene row simultaneously
        - Triangle play icon (▶) in each button
        - Numbered: Scene 1, Scene 2, etc.
        - Styling: w-12, centered, bg-surface, hover:bg-surface-2

        ## Create src/components/session/TrackColumn.tsx
        One vertical column per track:
        - Header at top: track name, color indicator
        - Below: stack of ClipSlot components (one per scene)
        - Solo/Mute/Arm buttons at the bottom of the column
        - Fixed width 120px minimum

        ## Create src/components/SessionView.tsx
        Compose the session view:
        - Horizontal layout: TrackColumn[] + SceneColumn
        - Track columns from trackStore (skip master track)
        - Default 8 scene rows
        - Horizontal scroll if many tracks
        - Vertical scroll if many scenes
        - Header row with track names stays sticky at top

        ## Update MainView.tsx
        Replace session placeholder with real <SessionView />.
        Now both Arrangement and Session views work and can be toggled
        via TransportBar view-mode buttons.

        ## Add scene data
        Add a scenes array to projectStore (or uiStore) with
        4 default scenes. Some scene rows should have clips
        in a few track slots to demonstrate the grid visually.

        ## Verify
        Run: cd /workspace && npx tsc --noEmit
        Run: cd /workspace && npx vite build
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 500
        maxAttempts: 2
        maxTurns: 10
        sessionGroup: dev-session

    # ── Step 6: Mixer & Effects ───────────────────────────────────────
    - name: mixer-and-effects
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [session-view]
      prompt: >
        Read existing code in /workspace/src/ first.
        Build the channel mixer and effects rack.

        ## Create src/components/mixer/VUMeter.tsx
        Vertical LED-style volume meter:
        - Props: level (dB number), peakLevel
        - Render as a stack of colored segments:
          bottom = green (#5cb85c), middle = yellow (#f0ad4e), top = red (#d9534f)
        - Fill segments based on level (map dB to percentage)
        - Peak hold: thin line at peak level that slowly falls
        - Use requestAnimationFrame for smooth animation
        - Width: 8px, height matches parent (flex-grow)
        - Stereo variant (left + right) for master channel

        ## Create src/components/mixer/Fader.tsx
        Vertical fader control:
        - Props: value (dB), onChange, min (-60), max (+6)
        - Vertical slider input styled as a professional fader
        - Track: thin line with graduated marks at 0dB, -6, -12, -24, -48
        - Thumb: horizontal bar styled like a physical fader knob
        - dB value label below the fader
        - Height: fills available space (min 100px)
        - Drag to change value, mouse wheel for fine adjustment

        ## Create src/components/mixer/PanKnob.tsx
        Circular pan control:
        - Props: value (-1 to 1), onChange
        - SVG circle with a rotatable indicator line
        - Rotation range: -135° (full left) to +135° (full right)
        - Center (0) at top (0°)
        - Label: "L", "C", or "R" + numeric value
        - Drag vertically to change value
        - Double-click to reset to center (0)

        ## Create src/components/mixer/MixerChannel.tsx
        Single channel strip in the mixer:
        - Props: channel (MixerChannel), track (Track)
        - From top to bottom:
          1. Track name label (colored bar at top using track.color)
          2. Send knobs row (small knobs for each send)
          3. Effect slots (list of effect names, click opens EffectsRack)
          4. PanKnob
          5. Fader + VUMeter side by side
          6. Solo (S) and Mute (M) buttons at bottom
          7. dB readout
        - Width: 80px per channel
        - Background: #2d2d2d, border-right: 1px solid #3a3a3a

        ## Create src/components/mixer/MasterChannel.tsx
        Same as MixerChannel but for master:
        - Wider (100px), labeled "Master"
        - Stereo VU meter (left + right)
        - No solo/mute buttons
        - No sends
        - Distinct background: slightly brighter (#333333)

        ## Rewrite src/components/MixerStrip.tsx
        Replace placeholder with real mixer:
        - Horizontal scroll container
        - One MixerChannel per track from trackStore + mixerStore
        - MasterChannel at the far right, separated by a 2px divider
        - Scrollbar at bottom, styled dark

        ## Create src/components/effects/EffectsRack.tsx
        Per-channel effects chain editor (shown in DetailPanel):
        - Read selected track from uiStore, effects from mixerStore
        - List of active effects as draggable cards
        - Each card shows: effect type name, bypass toggle, wet/dry knob, remove button
        - Click card to expand: shows effect-specific parameter knobs
        - "Add Effect" button at bottom with dropdown: reverb, delay, eq3, compressor, filter, distortion
        - Parameters per effect:
          - Reverb: decay, wet
          - Delay: time, feedback, wet
          - EQ3: low, mid, high
          - Compressor: threshold, ratio, attack, release
          - Filter: frequency, resonance, type (select)
          - Distortion: amount, wet
        - Effects are stored in mixerStore and will wire to engine in integration step

        ## Update DetailPanel.tsx
        Replace effects placeholder with real <EffectsRack />.

        ## Verify
        Run: cd /workspace && npx tsc --noEmit
        Run: cd /workspace && npx vite build
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 600
        maxAttempts: 2
        maxTurns: 12
        sessionGroup: dev-session

    # ── Step 7: Instruments (Piano Roll, Synth, Drums) ────────────────
    - name: instruments
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [mixer-and-effects]
      prompt: >
        Read existing code in /workspace/src/ first.
        Build the musical instruments: piano roll, synth controls, and drum pads.

        ## Create src/components/instruments/PianoRoll.tsx
        MIDI note editor (shown in DetailPanel):
        - Left: piano keyboard column (vertical, C1-C7, white/black keys styled)
        - Right: note grid (time = horizontal, pitch = vertical)
        - Grid cells: each cell represents 1/16th note at a pitch
        - Click cell to toggle note on/off
        - Existing notes shown as colored rectangles (match clip color)
        - Note velocity shown by opacity (louder = more opaque)
        - Time ruler at top matching arrangement TimeRuler style
        - Zoom: pixelsPerBeat (horizontal), noteHeight (vertical)
        - Scroll: both horizontal and vertical
        - Props: clip (Clip with type='midi'), onNotesChange
        - Selected clip comes from uiStore.selectedClipId → projectStore

        ## Create src/components/instruments/PianoKey.tsx
        Single key in the piano keyboard:
        - Props: note (number 0-127), isBlack, isActive
        - White keys: w-full h-5, bg-white hover:bg-gray-200
        - Black keys: w-2/3 h-3, bg-[#333] hover:bg-[#555], overlaid
        - Active (playing) state: accent color
        - Click to preview note sound
        - Label: note name (C4, D#5, etc.) on white keys only

        ## Create src/components/instruments/SynthPanel.tsx
        Synthesizer control panel (shown in DetailPanel):
        - Oscillator section:
          - Waveform selector: sine, square, sawtooth, triangle (4 toggle buttons with waveform icons)
        - Envelope section (ADSR):
          - 4 vertical sliders: Attack (0-2s), Decay (0-2s), Sustain (0-1), Release (0-5s)
          - Visual ADSR curve display (SVG line showing the envelope shape)
        - Filter section:
          - Filter type: lowpass, highpass, bandpass (radio buttons)
          - Frequency knob (20-20000 Hz, logarithmic)
          - Resonance knob (0-20)
        - Output:
          - Volume knob
          - Preview keyboard (one octave of clickable keys at bottom)
        - Store synth params in a synthStore or extend projectStore

        ## Create src/components/instruments/DrumPads.tsx
        Drum machine pad grid:
        - 4×2 grid of 8 pads: kick, snare, hihat, clap, tom1, tom2, rim, cowbell
        - Each pad: large square button (~80px), colored by drum type
        - Click/tap to trigger drum hit
        - Visual feedback on hit: brief accent-color flash
        - Pad colors: kick=#e74c3c, snare=#3498db, hihat=#f1c40f,
          clap=#9b59b6, tom=#e67e22, rim=#1abc9c, cowbell=#95a5a6
        - Volume control per pad (small knob under each)
        - Label on each pad

        ## Create src/components/instruments/WaveformDisplay.tsx
        Audio waveform visualization:
        - Props: audioUrl (optional), width, height
        - Uses canvas element to draw waveform shape
        - If no audio: show flat line with "No audio" text
        - For now: generate a visual sine-wave-like display as placeholder
          (real audio decoding will come in integration step)
        - Colors: waveform in clip color or #5cb85c on transparent bg

        ## Update DetailPanel.tsx
        - Replace pianoRoll placeholder with <PianoRoll /> when a MIDI clip is selected
        - Replace synth placeholder with <SynthPanel />
        - Add tab buttons in detail header to switch between Piano Roll / Synth / Effects
        - When an audio clip is selected, show WaveformDisplay

        ## Verify
        Run: cd /workspace && npx tsc --noEmit
        Run: cd /workspace && npx vite build
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 600
        maxAttempts: 2
        maxTurns: 12
        sessionGroup: dev-session

    # ── Step 8: Integration & Wiring ──────────────────────────────────
    - name: integration
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [instruments]
      prompt: >
        Read ALL existing code in /workspace/src/ first.
        This is the critical integration step — wire everything together
        so the app actually works end-to-end with real audio.

        ## Wire transportStore → AudioEngine
        Update src/stores/transportStore.ts:
        - play(): await audioEngine.init(), audioEngine.play(), set isPlaying
        - stop(): audioEngine.stop(), set isPlaying false, position 0
        - pause(): audioEngine.pause(), set isPlaying false
        - setBpm(): audioEngine.setBpm(bpm), set bpm
        - toggleLoop(): audioEngine.setLoop(...), toggle isLooping
        - Import audioEngine from src/engine/AudioEngine

        ## Wire mixerStore → ChannelStrips
        Update src/stores/mixerStore.ts:
        - setVolume(): audioEngine.getChannel(trackId)?.setVolume(db)
        - setPan(): audioEngine.getChannel(trackId)?.setPan(pan)
        - setSolo(): audioEngine.getChannel(trackId)?.setSolo(solo)
        - setMute(): audioEngine.getChannel(trackId)?.setMute(mute)
        - addEffect(): create effect via createEffect(), add to channel strip
        - removeEffect(): remove from channel strip, dispose

        ## Wire trackStore → AudioEngine Channels
        Update src/stores/trackStore.ts:
        - On addTrack: audioEngine.addChannel(track.id)
        - On removeTrack: audioEngine.removeChannel(track.id)
        - On init: create channels for all default tracks

        ## Wire projectStore → ClipScheduler
        Update src/stores/projectStore.ts:
        - triggerClip(): schedule clip in ClipScheduler
        - stopClip(): cancel clip in ClipScheduler

        ## Create src/hooks/usePlayhead.ts
        Custom hook that uses requestAnimationFrame to read
        Tone.Transport.seconds and update transport position in store.
        Only runs when isPlaying is true. Returns current beat position.
        Use this hook in Playhead component and TransportBar time display.

        ## Create src/hooks/useMeterLevels.ts
        Custom hook that reads VU meter levels from engine channels
        via requestAnimationFrame. Returns Map<trackId, level>.
        Used by VUMeter components in the mixer.

        ## Initialize audio channels on app mount
        Create src/hooks/useAudioInit.ts:
        - On first render, create audio channels for all tracks in trackStore
        - Set up default mixer channel config
        - Load default synth and drum instruments
        - Call this hook once in App.tsx

        ## Wire TransportBar play button
        Ensure the Play button in TransportBar calls Tone.start() first
        (user gesture requirement), then transportStore.play().

        ## Wire DrumPads to DrumSampler
        When a drum pad is clicked, call drumSampler.trigger(padName).
        Ensure DrumSampler is connected to a channel strip.

        ## Wire SynthPanel to SynthEngine
        When synth controls change, update synthEngine parameters.
        When preview keys are clicked, trigger synth notes.

        ## Wire PianoRoll edits to projectStore
        When notes are added/removed in PianoRoll, update the clip's
        notes array in projectStore.

        ## Add keyboard shortcuts
        Create src/hooks/useKeyboardShortcuts.ts:
        - Space: toggle play/pause
        - Enter: stop (return to start)
        - L: toggle loop
        - Tab: toggle arrangement/session view
        - Escape: deselect clip/track
        - 1-9: select track by index
        - Register via useEffect with window.addEventListener('keydown')
        - Use in App.tsx

        ## Verify integration
        Run: cd /workspace && npx tsc --noEmit
        Run: cd /workspace && npx vite build
        Run: grep -r "from.*stores" src/engine/ (must be empty — no circular deps)
        Fix any errors before finishing.
      execution:
        timeoutSeconds: 720
        maxAttempts: 2
        maxTurns: 14
        sessionGroup: dev-session

    # ── Step 9: Verify & Polish ───────────────────────────────────────
    - name: verify-and-polish
      type: agent
      agentRef: ableton-daw-agent
      dependsOn: [integration]
      prompt: >
        Read ALL existing code in /workspace/src/ first.
        This is the final polish step. Run verification, fix all errors,
        and add polish.

        ## Run full verification suite
        Execute every verification gate. For each failure, fix it immediately
        before moving to the next gate:

        1. cd /workspace && npx tsc --noEmit
        2. cd /workspace && npx vite build
        3. grep -rn ': any' src/ --include='*.ts' --include='*.tsx' (must be empty)
        4. grep -rn 'TODO\|FIXME\|HACK\|placeholder' src/ --include='*.ts' --include='*.tsx' (must be empty)
        5. grep -rn "import create from 'zustand'" src/ (must be empty)
        6. grep -rn "from.*stores" src/engine/ --include='*.ts' (must be empty)
        7. grep -rn "from.*engine" src/components/ --include='*.tsx' | grep -v types (must be empty)
        8. find src/types -name '*.ts' | wc -l (>= 1)
        9. find src/stores -name '*.ts' | wc -l (>= 4)
        10. find src/engine -name '*.ts' | wc -l (>= 4)
        11. find src/components -name '*.tsx' | wc -l (>= 10)
        12. grep -rn 'setInterval\|setTimeout' src/engine/ --include='*.ts' (must be empty)

        ## Fix all TypeScript errors
        If tsc --noEmit shows errors, read each error, understand the root
        cause, and fix properly — do NOT use `any` or `@ts-ignore`.

        ## Fix all build errors
        If vite build fails, read the error and fix. Common issues:
        - Missing imports, circular dependencies, missing modules.
        - Ensure all Tone.js imports use: import * as Tone from 'tone'

        ## UI Polish
        Review each component and add:
        - Hover states on all interactive elements (opacity or bg change)
        - Smooth transitions: transition-all duration-150
        - Cursor: pointer on buttons, ew-resize on faders, grab on draggable items
        - Focus ring on keyboard-focusable elements (ring-1 ring-[#ff764d])
        - Active state feedback: scale-95 on button press
        - Tooltips on icon-only buttons (title attribute)

        ## Ensure pnpm dev works
        Run: cd /workspace && timeout 10 npx vite --host 0.0.0.0 2>&1 || true
        Check that the dev server starts without errors.
        The output should show "Local: http://localhost:5173/" or similar.

        ## Create README.md
        Create /workspace/README.md with:
        - Project name and description
        - Tech stack list
        - Getting started: pnpm install, pnpm dev
        - Features list
        - Keyboard shortcuts
        - Architecture overview

        ## Final summary
        List all files created with line counts.
        Run: find src -name '*.ts' -o -name '*.tsx' | wc -l
        Run: wc -l src/**/*.{ts,tsx} 2>/dev/null | tail -1
        Report: total files, total lines, any remaining issues.
      execution:
        timeoutSeconds: 720
        maxAttempts: 2
        maxTurns: 14
        sessionGroup: dev-session
