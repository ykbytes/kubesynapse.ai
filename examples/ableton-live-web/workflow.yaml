apiVersion: sandbox.enterprise.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: ableton-live-web
  namespace: default
spec:
  description: >
    Build a browser-based DAW inspired by Ableton Live using a single
    OpenCode agent. One step, no loops — generate the full app directly.
  input: >
    Build "Ableton Live Web" — a browser-based Digital Audio Workstation.
    Use TypeScript, React 18, Vite, Tailwind CSS dark theme, Tone.js,
    and Zustand for state. All audio runs client-side.
  contextRef: ableton-live-web-context
  messageBus: in-memory
  steps:
    - name: build-app
      type: agent
      agentRef: ableton-builder
      prompt: >
        Build "Ableton Live Web" in /workspace/. Create ALL files directly.

        Files to create:
        1. package.json (react, react-dom, tone, zustand, tailwindcss, vite, @vitejs/plugin-react, typescript, @types/react, @types/react-dom)
        2. tsconfig.json, vite.config.ts, tailwind.config.ts, postcss.config.js, index.html
        3. src/main.tsx, src/App.tsx
        4. src/types/index.ts (Track, Clip, MixerChannel, Effect, TransportState)
        5. src/stores/transportStore.ts, mixerStore.ts, projectStore.ts (Zustand)
        6. src/engine/AudioEngine.ts, ChannelStrip.ts, Effects.ts, ClipScheduler.ts (Tone.js)
        7. src/components/TransportBar.tsx, ArrangementView.tsx, Mixer.tsx, ClipLauncher.tsx, EffectsRack.tsx, PianoRoll.tsx
        8. App.tsx wires all components with CSS Grid, dark theme (#1e1e1e bg, #ff764d accent)

        After creating all files: pnpm install && pnpm tsc --noEmit && pnpm build.
        Fix any errors. Do NOT explain — just create files and run commands.
      execution:
        timeoutSeconds: 600
        maxAttempts: 1
        backoffSeconds: 5
        retryable: false
        continueOnError: false
        maxTurns: 5
