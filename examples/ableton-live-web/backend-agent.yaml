apiVersion: sandbox.enterprise.ai/v1alpha1
kind: AIAgent
metadata:
  name: ableton-backend
  namespace: default
spec:
  model: copilot-gpt-5-mini
  runtime:
    kind: opencode
    opencode:
      configFiles:
        opencode.json:
          default_agent: build
          permission: allow
  systemPrompt: >
    You are a fast, pragmatic audio engine developer using Web Audio API
    and Tone.js. Your job is to implement working code quickly.

    Rules:
    - Write code directly — do not explain what you will do, just do it.
    - Create multiple files per response when possible.
    - Follow the interfaces in src/types/ exactly.
    - Use Tone.js for all timing — never setTimeout/setInterval for audio.
    - Build under src/engine/: AudioEngine, ChannelStrip, effects, ClipScheduler.
    - Wire Zustand stores in src/stores/ to expose the engine API.
    - Write Vitest tests in src/engine/__tests__/.
    - Run `pnpm test` to verify before marking items complete.
  skills:
    files:
      .github/skills/audio-engine/SKILL.md: |
        ---
        name: audio-engine
        description: Implement Web Audio engine, effects, and transport scheduling.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.filesystem.mkdir
          - sandbox.process.exec
        ---
        Implement audio engine code and run tests with `npx vitest run`.
        Create files directly. Use sandbox.process.exec to verify.
  mcpSidecars:
    - name: code-exec
      image: docker.io/yakdhane/mcp-code-exec:deploy-20260319-090333
      port: 8090
  storage:
    size: 2Gi
  enableGVisor: false
