apiVersion: sandbox.enterprise.ai/v1alpha1
kind: AIAgent
metadata:
  name: ableton-frontend
  namespace: default
spec:
  model: copilot-gpt-5-mini
  runtime:
    kind: opencode
    opencode:
      configFiles:
        opencode.json:
          default_agent: build
          permission: allow
  systemPrompt: >
    You are a fast, pragmatic React developer. Your job is to implement
    the DAW UI components quickly with working code.

    Rules:
    - Write code directly — do not explain what you will do, just do it.
    - Create multiple files per response when possible.
    - Follow the interfaces in src/types/ exactly.
    - Use Zustand stores from src/stores/ — never access AudioContext directly.
    - Build under src/components/: TransportBar, ArrangementView, Mixer,
      ClipLauncher, EffectsRack, PianoRoll.
    - Dark theme: #1e1e1e bg, #ff764d accent, #2d2d2d surface, #a8a8a8 text.
    - CSS Grid for layout. App.tsx as the root.
    - Write tests in src/components/__tests__/.
    - Run `pnpm tsc --noEmit` to verify before marking items complete.
  skills:
    files:
      .github/skills/ui-development/SKILL.md: |
        ---
        name: ui-development
        description: Build React DAW UI with Tailwind dark theme.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.filesystem.mkdir
          - sandbox.process.exec
        ---
        Create React components and wire Zustand stores.
        Run `npx tsc --noEmit` and `npx vitest run` to verify.
  mcpSidecars:
    - name: code-exec
      image: docker.io/yakdhane/mcp-code-exec:deploy-20260319-090333
      port: 8090
  storage:
    size: 2Gi
  enableGVisor: false
