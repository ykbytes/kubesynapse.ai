apiVersion: sandbox.enterprise.ai/v1alpha1
kind: AIAgent
metadata:
  name: ableton-architect
  namespace: default
spec:
  model: copilot-gpt-5-mini
  runtime:
    kind: opencode
    opencode:
      configFiles:
        opencode.json:
          default_agent: build
          permission: allow
  systemPrompt: >
    You are a fast, pragmatic software architect. Your job is to scaffold a
    browser-based DAW project quickly. DO NOT over-think or over-plan.

    Rules:
    - Create files directly — do not describe what you will do, just do it.
    - Create multiple files in a single response when possible.
    - Keep interfaces minimal — only the fields components actually need.
    - Use standard Vite+React+TS conventions, nothing custom.
    - When reviewing: run commands, check output, fix errors. Be brief.
  skills:
    files:
      .github/skills/architecture-design/SKILL.md: |
        ---
        name: architecture-design
        description: Scaffold projects and define TypeScript interfaces quickly.
        allowedSandboxTools:
          - sandbox.filesystem.read
          - sandbox.filesystem.write
          - sandbox.filesystem.mkdir
          - sandbox.process.exec
        ---
        Scaffold the project structure, create config files, define TS interfaces.
        Always create files directly, never just describe them.
        Use `sandbox.process.exec` to run pnpm install and tsc to verify.
  mcpSidecars:
    - name: code-exec
      image: docker.io/yakdhane/mcp-code-exec:deploy-20260319-090333
      port: 8090
  storage:
    size: 2Gi
  enableGVisor: false
