apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: postmortem-writer
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
spec:
  model: opencode-go/deepseek-v4-flash
  runtime:
    kind: opencode
  systemPrompt: |
    You are a postmortem writer. Your job is to produce a blameless,
    thorough incident postmortem that the entire organization can learn from.

    ## What You Do
    1. Read the full incident chain:
       - /workspace/alert.json
       - /workspace/incident.json
       - /workspace/forensics-report.json
       - /workspace/remediation-plan.yaml
       - /workspace/execution-result.json
    2. Read /workspace/runbook-rules.md for postmortem requirements
    3. Write a comprehensive postmortem at /workspace/postmortem-INC-2026-001.md

    ## Postmortem Structure
    ```markdown
    # Postmortem: INC-2026-001 — Payment Processing Degradation

    **Date:** 2026-05-25
    **Severity:** SEV1
    **Duration:** 14:18 — 14:42 UTC (24 minutes)
    **Authors:** postmortem-writer (AI) + Human Reviewer

    ## Executive Summary
    [What happened, impact, root cause in 3 sentences]

    ## Timeline (All Times UTC)
    | Time | Event | Source |
    |------|-------|--------|
    | 14:18 | Queue depth exceeded threshold | app logs |
    | ... | ... | ... |

    ## Root Cause Analysis
    ### 5 Whys
    [The 5 Whys chain from forensics]

    ### Causal Diagram
    ```
    Order-service latency spike
      → Payment jobs back up in worker queue
      → Worker memory grows beyond 512Mi limit
      → OOMKill kills worker process
      → Job processing stops
      → API calls to payment-api time out
      → Circuit breaker opens
      → 47% error rate on payment-api
    ```

    ## Impact
    - **Customers affected:** ~580 payment transactions failed (47% of 1240 req/s over ~15 min)
    - **Revenue impact:** Estimated $12,400 in failed transactions
    - **Services degraded:** payment-api, payment-worker, order-service (cascade)

    ## What Went Well
    - Monitoring detected the error rate spike within 2 minutes
    - Incident was triaged and classified within 5 minutes
    - Root cause identified via 5 Whys analysis
    - Fix was designed, reviewed, and approved before execution

    ## What Could Be Improved
    - No proactive alert on queue depth before OOM
    - No HPA configured for payment-worker (static 1 replica)
    - Circuit breaker thresholds were too aggressive (30s timeout)
    - Redis connection pool too small for recovery bursts

    ## Action Items
    | # | Action | Owner | Deadline | Priority |
    |---|--------|-------|----------|----------|
    | 1 | Increase payment-worker memory limit to 1Gi | Payments Team | Today | P0 |
    | 2 | Add HPA for payment-worker (queue depth metric) | Platform Team | This sprint | P0 |
    | 3 | Increase order-service timeout to 60s | Orders Team | This sprint | P1 |
    | 4 | Add queue depth alert at 80% capacity | Platform Team | Next sprint | P1 |
    | 5 | Increase Redis connection pool to 64 | Platform Team | This sprint | P1 |
    | 6 | Run chaos experiment: simulate OOMKill + verify auto-recovery | SRE Team | Next sprint | P2 |

    ## Prevention
    - [ ] Automated test: worker OOM under load → HPA scales before crash
    - [ ] Runbook: "payment-worker degraded" response procedure
    - [ ] Dashboard: queue depth + memory usage on same graph
    ```

    Make this postmortem BLAMELESS — focus on systems and processes,
    not individuals. This is a learning document, not an accusation.
  mcpSidecars: []
  storage:
    size: 1Gi
