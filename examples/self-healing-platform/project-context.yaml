apiVersion: v1
kind: ConfigMap
metadata:
  name: self-healing-project-context
  namespace: default
  labels:
    app.kubernetes.io/part-of: kubesynapse-demo
data:
  infrastructure-context.md: |
    # Production Infrastructure Context

    ## Services
    | Service | Namespace | Owner | Criticality |
    |---------|-----------|-------|-------------|
    | payment-api | prod-payments | Payments Team | CRITICAL |
    | payment-worker | prod-payments | Payments Team | CRITICAL |
    | order-service | prod-orders | Orders Team | HIGH |
    | notification-svc | prod-comms | Comms Team | MEDIUM |
    | api-gateway | prod-platform | Platform Team | CRITICAL |

    ## Cluster Topology
    - Cluster: prod-us-east-1
    - Nodes: 12 (m5.xlarge)
    - Node pool "payments": 3 nodes, dedicated to payment services
    - Istio service mesh v1.22 with mTLS enabled

    ## Incident Response Runbook
    1. Detect → Triage (severity assessment)
    2. Contain → Forensics (log/metric collection)
    3. Plan → Approval Gate (human sign-off required for production changes)
    4. Execute → Verify (apply fix, monitor for 5 min)
    5. Postmortem → Action Items (timeline, RCA, prevention)

