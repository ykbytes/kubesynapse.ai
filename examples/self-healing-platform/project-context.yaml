  runbook-rules.md: |
    # Self-Healing Platform — Operational Rules

    ## Incident Severity Classification
    - **SEV1 (Critical)**: Customer-facing outage, revenue impact, data loss risk
    - **SEV2 (High)**: Degraded service, >10% error rate, cascading failures
    - **SEV3 (Medium)**: Non-critical feature broken, <10% error rate
    - **SEV4 (Low)**: Cosmetic issue, no customer impact

    ## Remediation Constraints
    - Production changes REQUIRE human approval (AgentApproval CR)
    - Memory limit increases must be accompanied by HPA configuration
    - Circuit breaker thresholds must be tuned based on p99 latency
    - All changes must be reversible (document rollback steps)

    ## Postmortem Requirements
    - Timeline with exact timestamps from detection to resolution
    - Root cause analysis (5 Whys or similar)
    - Impact assessment (customers affected, revenue lost, data at risk)
    - Action items with owners and deadlines
    - Prevention measures (automated tests, alerts, runbooks)
