apiVersion: kubesynapse.ai/v1alpha1
kind: AgentPolicy
metadata:
  name: kubesynapse-factory-policy
  namespace: default
spec:
  inputGuardrails:
    blockPromptInjection: true
    blockedPatterns:
      - "ignore previous instructions"
      - "disregard the system prompt"
      - "password|secret|credential"
      - "DROP TABLE|DELETE FROM|TRUNCATE"
    maxInputTokens: 6000
  outputGuardrails:
    maskPII: true
    blockedOutputPatterns:
      - "BEGIN PRIVATE KEY"
      - "internal-api-key-[a-zA-Z0-9]+"
    maxOutputTokens: 8000
  allowedModels:
    - copilot-gpt-5-mini
  allowedMcpServers: []
  # NOTE: allowedMcpServers applies to factory agents (analyst, factory,
  # reviewers, deployer) — not to the agents GENERATED by the factory.
  # Factory agents currently use no MCP sidecars; the deployer accesses the
  # Kubernetes API via its built-in Python client, not an MCP sidecar.
  # Generated agents may declare their own MCP sidecars in their manifests;
  # those are governed by the generated agents' own policies, not this one.
  # The factory uses a read-oriented Kubernetes sidecar for evidence gathering.
  # Deploy/edit/run actions are gated at the workflow level instead of forcing
  # per-tool approval prompts for every inspection call.
  mcpRequireHitl: false