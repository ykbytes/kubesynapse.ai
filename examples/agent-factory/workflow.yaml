apiVersion: kubesynth.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: kubesynth-factory-pipeline
  namespace: default
spec:
  description: >
    Lean four-agent factory pipeline: analyst expands the request, factory drafts
    the bundle, reviewer checks it, factory finalizes it, and the deployer only
    acts behind explicit approval gates.
  input: ""
  contextRef: kubesynth-factory-context
  messageBus: in-memory

  steps:
    - name: analyze-request
      agentRef: kubesynth-factory-analyst
      prompt: |
        Expand the following request into the structured specification JSON
        contract and return JSON only.

        Raw request payload:
        {{input}}
      execution:
        timeoutSeconds: 300
        maxAttempts: 2
        backoffSeconds: 5
        maxTurns: 8
        requiredJsonPaths:
          - objective.goal
          - requirements.0.id
          - architecture_recommendation.shape
          - task_decomposition.phases.0.name
          - quality_and_verification.acceptance_criteria.0

    - name: generate-blueprint
      agentRef: kubesynth-factory
      dependsOn:
        - analyze-request
      prompt: |
        Build the initial KubeSynth factory blueprint and return machine JSON only.

        Raw request payload:
        {{input}}

        Expanded specification:
        {{analyze-request.output.json}}

        Rules for this stage:
        - Infer factory_mode from the request payload. If it is absent, default
          to governed-bundle.
        - This is not the final materialization stage. Do not write files.
        - Set review_status.final_verdict to pending-review.
        - Set review_status.rework_rounds_attempted to 0.
        - Set review_status.deploy_permitted and review_status.run_permitted
          based on actual readiness, but keep approval boundaries explicit.
        - Keep approval_required.reason specific to the current bundle.
      execution:
        timeoutSeconds: 600
        maxAttempts: 2
        backoffSeconds: 5
        maxTurns: 12
        sessionGroup: factory-design
        requiredJsonPaths:
          - factory_mode
          - intent_summary.goal
          - architecture_decision.selected_shape
          - manifests.combined_yaml
          - supporting_deliverables.operator_readme_markdown
          - execution_plan.execution_mode
          - review_status.final_verdict
          - approval_required.deploy
          - resource_names.0

    - name: review-blueprint
      agentRef: kubesynth-factory-reviewer
      dependsOn:
        - generate-blueprint
      prompt: |
        Review this blueprint and return the reviewer verdict JSON only.

        Raw request payload:
        {{input}}

        Blueprint JSON:
        {{generate-blueprint.output.json}}
      execution:
        timeoutSeconds: 420
        maxAttempts: 1
        maxTurns: 8
        requiredJsonPaths:
          - approved
          - score
          - issues
          - revised_guidance_markdown

    - name: finalize-bundle
      agentRef: kubesynth-factory
      dependsOn:
        - generate-blueprint
        - review-blueprint
      prompt: |
        Finalize the bundle and return the full machine JSON blueprint contract.

        Raw request payload:
        {{input}}

        Initial blueprint:
        {{generate-blueprint.output.json}}

        Reviewer verdict:
        {{review-blueprint.output.json}}

        Finalization rules:
        - Return JSON only.
        - If the reviewer approved the bundle, preserve the design and make only
          targeted corrections required for a clean final output.
        - If the reviewer did not approve the bundle, incorporate every required
          change once, set review_status.final_verdict to needs-work, set
          review_status.rework_rounds_attempted to 1, copy remaining blockers
          into review_status.blocking_issues, and force deploy_permitted=false,
          run_permitted=false, approval_required.deploy=false, and
          approval_required.run_generated_workflow=false.
        - If factory_mode is lightweight-draft, do not write files and keep the
          bundle design-only or handoff-only.
        - If factory_mode is governed-bundle or fully-autonomous, this is the
          final materialization stage. Write exactly one canonical output tree
          under workspace/bundles/<bundle-slug>/ and keep manifests.combined_yaml
          aligned with what was written.
        - Keep approval boundaries explicit even for approved bundles.
      execution:
        timeoutSeconds: 720
        maxAttempts: 2
        backoffSeconds: 5
        maxTurns: 14
        sessionGroup: factory-design
        requiredJsonPaths:
          - factory_mode
          - intent_summary.goal
          - manifests.combined_yaml
          - supporting_deliverables.operator_readme_markdown
          - deploy_and_verify.apply_order.0
          - review_status.final_verdict
          - review_status.deploy_permitted
          - approval_required.deploy
          - resource_names.0

    - name: deploy-approved-bundle
      type: conditional
      agentRef: kubesynth-factory
      dependsOn:
        - finalize-bundle
        - review-blueprint
      conditionExpr: >
        matches("\"approved\"\\s*:\\s*true") and
        matches("\"factory_mode\"\\s*:\\s*\"fully-autonomous\"") and
        matches("\"deploy_permitted\"\\s*:\\s*true")
      thenSteps:
        - deploy-bundle

    - name: deploy-bundle
      agentRef: kubesynth-factory-deployer
      dependsOn:
        - deploy-approved-bundle
        - finalize-bundle
      requireApproval: true
      prompt: |
        Deploy the approved bundle described below.

        Finalized blueprint JSON:
        {{finalize-bundle.output.json}}

        Manifest YAML to apply:
        {{finalize-bundle.output.json.manifests.combined_yaml}}

        Apply order:
        {{finalize-bundle.output.json.deploy_and_verify.apply_order}}

        Verification checks:
        {{finalize-bundle.output.json.deploy_and_verify.verification_checks}}

        Requirements:
        - This step is approval-gated. If approval has not been granted yet,
          stop and wait.
        - Apply only the approved manifest YAML.
        - Validate, apply or patch, and verify with evidence.
        - End the Result section with exactly one line:
          DEPLOY_RESULT: PASS
          or
          DEPLOY_RESULT: FAIL
      verify: |
        Confirm the deployment result is evidence-backed.
        Return PASS only if the response shows the approved manifests were
        validated, applied or patched successfully, and verified.
      execution:
        timeoutSeconds: 900
        maxAttempts: 1
        maxTurns: 12
        sessionGroup: factory-deploy

    - name: run-approved-workflow
      type: conditional
      agentRef: kubesynth-factory-deployer
      dependsOn:
        - deploy-bundle
        - finalize-bundle
      conditionExpr: >
        matches("DEPLOY_RESULT:\\s*PASS") and
        matches("\"factory_mode\"\\s*:\\s*\"fully-autonomous\"") and
        matches("\"run_permitted\"\\s*:\\s*true") and
        matches("\"generated_workflow_name\"\\s*:\\s*\"[^\"]+\"")
      thenSteps:
        - run-generated-workflow

    - name: run-generated-workflow
      agentRef: kubesynth-factory-deployer
      dependsOn:
        - run-approved-workflow
        - deploy-bundle
        - finalize-bundle
      requireApproval: true
      prompt: |
        Trigger the generated workflow defined in the finalized blueprint below.

        Finalized blueprint JSON:
        {{finalize-bundle.output.json}}

        Generated workflow name:
        {{finalize-bundle.output.json.execution_plan.generated_workflow_name}}

        Generated workflow input:
        {{finalize-bundle.output.json.execution_plan.generated_workflow_input}}

        Requirements:
        - This step is approval-gated. If approval has not been granted yet,
          stop and wait.
        - Update only spec.input on the generated AgentWorkflow.
        - Reset status to pending, observedGeneration=null, pendingApproval=null.
        - Poll until the workflow reaches a terminal or waiting-approval state.
        - End the Result section with exactly one line:
          RUN_RESULT: PASS
          or
          RUN_RESULT: FAIL
      verify: |
        Confirm the generated workflow trigger result is evidence-backed.
        Return PASS only if the response shows the target workflow name,
        approved input payload, and resulting workflow state.
      execution:
        timeoutSeconds: 900
        maxAttempts: 1
        maxTurns: 10
        sessionGroup: factory-deploy
