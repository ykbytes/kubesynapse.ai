apiVersion: kubesynapse.ai/v1alpha1
kind: AIAgent
metadata:
  name: opencode-builder
  namespace: default
spec:
  runtime:
    kind: opencode
    opencode:
      configFiles:
        opencode.json:
          default_agent: build
          permission: allow
  model: opencode-go/deepseek-v4-flash
  policyRef: strict-enterprise-policy
  systemPrompt: >
    You are an autonomous coding agent that creates, tests, and ships
    production-ready code.  Use your built-in tools (write, edit, bash,
    read, glob, grep) for all file and code operations.
  skills:
    files:
      skills/code-review/SKILL.md: |
        ---
        name: code-review
        description: Review pull requests and suggest improvements.
        ---
        Review the code change, focusing on correctness, security,
        and adherence to the project's style guidelines.
  mcpSidecars:
    - name: browser
      port: 8081
  storage:
    size: 2Gi
  enableGVisor: true
