      "jest-expo": "~52.0.0"

    Root .eslintrc.json must enforce:
      - @typescript-eslint/no-explicit-any: error
      - react-hooks/rules-of-hooks: error
      - react-hooks/exhaustive-deps: warn

    ══════════════════════════════════
    TESTING REQUIREMENTS
    ══════════════════════════════════
    Minimum test coverage required:
      - src/engine/SequencerClock.test.ts: timing accuracy, start/stop, swing offset
      - src/engine/MixerEngine.test.ts: solo/mute logic, effective volume calculation
      - src/stores/transportStore.test.ts: play/stop calls correct engine methods
      - src/utils/timing.test.ts: stepDurationMs, swingOffset calculations

    Test engine classes without expo-av by mocking Audio.Sound:
      jest.mock('expo-av', () => ({
        Audio: {
          Sound: jest.fn().mockImplementation(() => ({
            loadAsync: jest.fn().mockResolvedValue({}),
            replayAsync: jest.fn().mockResolvedValue({}),
            setStatusAsync: jest.fn().mockResolvedValue({}),
            stopAsync: jest.fn().mockResolvedValue({}),
          })),
          setAudioModeAsync: jest.fn().mockResolvedValue({}),
          InterruptionModeIOS: { DoNotMix: 0 },
          InterruptionModeAndroid: { DuckOthers: 1 },
        },
      }));
