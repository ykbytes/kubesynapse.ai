apiVersion: v1
kind: ConfigMap
metadata:
  name: mobile-daw-context
  namespace: default
data:
  context: |
    # BeatForge — Mobile DAW Project Context

    ## Product Description
    Build "BeatForge" — a mobile step sequencer, drum machine, and synthesizer
    app for iOS and Android. 16-step sequencer, velocity-sensitive drum pads,
    built-in synthesizer, per-track mixer. Dark theme optimized for stage/studio.
    Target: musicians and producers who want to make beats on the go.

    ## Tech Stack (ONLY use packages that exist on npm — verify before adding)
    - Language: TypeScript strict mode — no `any`, no `.d.ts` shims
    - Framework: React Native 0.76+ functional components + hooks
    - Platform: Expo SDK 52 with expo-router file-based navigation
    - Audio: expo-av (Audio.Sound for sample playback) + JS scheduling
    - Animations: react-native-reanimated 3 (60fps shared values)
    - Gestures: react-native-gesture-handler
    - State: Zustand 5 — import { create } from 'zustand' (NAMED export, not default)
    - Build: Expo EAS Build
    - Package Manager: npm
    - DO NOT use: react-native-audio-api (does not exist on npm),
      expo-audio-stream, or any unverified package

    ## Directory Layout
    - src/app/           — Expo Router screens and layouts
    - src/components/    — Reusable React Native UI components
    - src/engine/        — Audio engine singletons
    - src/stores/        — Zustand stores
    - src/hooks/         — Custom hooks
    - src/types/         — Shared TypeScript interfaces (NO shims)
    - src/utils/         — Helpers (timing, colors)
    - src/constants/     — Theme, defaults
    - assets/samples/    — Bundled WAV files (must be real audio, not empty)

    ═══════════════════════════════════════════════════════════════
    CRITICAL: KNOWN FAILURE MODES — READ BEFORE WRITING ANY CODE
    ═══════════════════════════════════════════════════════════════
    These are bugs that WILL appear if you don't follow these patterns.
    Each one has caused production failures. Follow the RIGHT pattern exactly.

    ## FAILURE MODE 1 — Metro Bundler: Dynamic require() Breaks Production
    Metro cannot bundle dynamic require() expressions. This silently fails
    in production builds — audio never loads, no error thrown.

    WRONG (NEVER do this):
      const path = 'assets/samples/kick.wav';
      await sound.loadAsync(require('../../' + path));
      await sound.loadAsync({ uri: path });

    RIGHT — define a static require map at module top level:
      // Must be a literal static object, no variables in the keys or values
      export const SAMPLE_REQUIRES: Record<string, ReturnType<typeof require>> = {
        kick:       require('../../assets/samples/kick.wav'),
        snare:      require('../../assets/samples/snare.wav'),
        hihat:      require('../../assets/samples/hihat.wav'),
        clap:       require('../../assets/samples/clap.wav'),
        tom:        require('../../assets/samples/tom.wav'),
        perc:       require('../../assets/samples/perc.wav'),
        bass_synth: require('../../assets/samples/bass_synth_C3.wav'),
        lead_synth: require('../../assets/samples/lead_synth_C4.wav'),
      };
      // Then load:
      await sound.loadAsync(SAMPLE_REQUIRES[sampleKey]);

    ## FAILURE MODE 2 — Zustand v5: Named Export, Not Default
    Zustand 5 changed from a default export to a named export.
    Using the wrong import causes ALL stores to fail to initialize.

    WRONG:
      import create from 'zustand';               // v4 API — breaks in v5
      import createStore from 'zustand/vanilla';  // also wrong

    RIGHT:
      import { create } from 'zustand';           // v5 named export
      import { createStore } from 'zustand/vanilla'; // vanilla if needed

    Full store pattern for v5:
      import { create } from 'zustand';
      interface TransportState {
        isPlaying: boolean;
        bpm: number;
        play: () => Promise<void>;
        stop: () => void;
        setBpm: (bpm: number) => void;
      }
      const useTransportStore = create<TransportState>()((set, get) => ({
        isPlaying: false,
        bpm: 120,
        play: async () => {
          AudioEngine.getInstance().resume();
          SequencerClock.getInstance().start(get().bpm, get().swing);
          set({ isPlaying: true });
        },
        stop: () => {
          SequencerClock.getInstance().stop();
          set({ isPlaying: false, currentStep: 0 });
        },
        setBpm: (bpm) => {
          set({ bpm });
          if (get().isPlaying) SequencerClock.getInstance().start(bpm, get().swing);
        },
      }));

    ## FAILURE MODE 3 — Zustand: Never Mutate State Directly
    Zustand state is immutable. Assigning to properties directly bypasses
    React's reactivity — UI never updates, no re-renders triggered.

    WRONG:
      const setCurrent = useSequencerStore(s => (id: string) => {
        s.currentPatternId = id;  // direct mutation — silently broken
      });

    RIGHT:
      // In the store definition:
      setCurrentPatternId: (id: string) => set({ currentPatternId: id }),
      // In the component:
      const setCurrentPatternId = useSequencerStore(s => s.setCurrentPatternId);

    ## FAILURE MODE 4 — Reanimated: No Hooks Inside .map() or Loops
    useSharedValue and other Reanimated hooks MUST be called at the top level
    of a component, never inside .map(), forEach, or any loop/conditional.
    Violating this causes a crash: "Hooks can only be called inside a component".

    WRONG:
      const StepGrid = () => {
        const tracks = useSequencerStore(s => s.tracks);
        // CRASH — hooks in map()
        const highlights = tracks.map(t => useSharedValue(false));
      };

    RIGHT:
      const StepGrid = () => {
        // Fixed-size array declared at top level, before any conditionals
        const stepHighlight = useSharedValue(0); // single value: current step index
        // Then in the animated style for cell at (row, col):
        const animStyle = useAnimatedStyle(() => ({
          borderColor: stepHighlight.value === col ? '#ff6b35' : 'transparent',
        }));
      };

    ## FAILURE MODE 5 — Dual State: Engine vs Store Divergence
    MixerEngine and mixerStore must not maintain independent copies of the
    same data. After loadProject() the store is updated but the engine is not,
    causing audio to ignore the loaded mixer state.

    STATE OWNERSHIP CONTRACT:
      - Engine is the AUDIO source of truth (controls what actually plays)
      - Store is the UI source of truth (controls what renders)
      - Every store action MUST call the corresponding engine method
      - loadProject() MUST sync BOTH store AND engine from persisted data

    RIGHT pattern for loadProject():
      loadProject: async () => {
        const raw = await AsyncStorage.getItem(PROJECT_KEY);
        if (!raw) return;
        const project: Project = JSON.parse(raw);
        // 1. Hydrate stores (for UI)
        useTransportStore.setState({ bpm: project.bpm, swing: project.swing });
        useSequencerStore.setState({ patterns: project.patterns, tracks: project.tracks });
        useMixerStore.setState({ channels: project.mixer });
        // 2. Sync engine to match loaded state (CRITICAL — must not skip)
        const me = MixerEngine.getInstance();
        for (const ch of project.mixer) {
          me.setVolume(ch.trackId, ch.volume);
          me.setPan(ch.trackId, ch.pan);
          me.setMute(ch.trackId, ch.mute);
          me.setSolo(ch.trackId, ch.solo);
        }
        AudioEngine.getInstance().setMasterVolume(1);
      },

    ## FAILURE MODE 6 — expo-av Deprecated Constants
    Audio.INTERRUPTION_MODE_IOS_DO_NOT_MIX and
    Audio.INTERRUPTION_MODE_ANDROID_DUCK_OTHERS are deprecated since
    expo-av v13. Use the enum from the InterruptionModeIOS import.

    WRONG:
      interruptionModeIOS: Audio.INTERRUPTION_MODE_IOS_DO_NOT_MIX,
      interruptionModeAndroid: Audio.INTERRUPTION_MODE_ANDROID_DUCK_OTHERS,

    RIGHT:
      import { Audio, InterruptionModeIOS, InterruptionModeAndroid } from 'expo-av';
      await Audio.setAudioModeAsync({
        allowsRecordingIOS: false,
        interruptionModeIOS: InterruptionModeIOS.DoNotMix,
        playsInSilentModeIOS: true,
        staysActiveInBackground: true,
        shouldDuckAndroid: true,
        interruptionModeAndroid: InterruptionModeAndroid.DuckOthers,
        playThroughEarpieceAndroid: false,
      });

    ## FAILURE MODE 7 — SequencerClock: setInterval Drift
    Using setInterval alone for musical timing causes audible drift. The
    clock must use a drift-correcting approach: track expected vs actual time
    and compensate on each tick.

    WRONG (naive approach that drifts):
      this.intervalId = setInterval(() => {
        this.stepIndex = (this.stepIndex + 1) % 16;
        this.onStepCb?.(this.stepIndex);
      }, stepDurationMs);

    RIGHT (drift-correcting scheduler):
      start(bpm: number, swing: number): void {
        this.stop();
        this.bpm = bpm;
        this.swing = swing;
        this.running = true;
        this.stepIndex = 0;
        this.startTime = performance.now();
        this.nextStepTime = this.startTime;
        // Poll at 10ms; actual step fires based on performance.now() comparison
        this.intervalId = setInterval(() => this.tick(), 10) as unknown as number;
      }

      private tick(): void {
        if (!this.running) return;
        const now = performance.now();
        const stepMs = 60000 / this.bpm / 4;
        while (this.nextStepTime <= now + 5) { // lookahead 5ms
          this.fireStep(this.stepIndex);
          this.stepIndex = (this.stepIndex + 1) % 16;
          // Schedule swing: delay odd-indexed steps
          const isSwingStep = (this.stepIndex % 2) === 1;
          const swingDelay = isSwingStep ? (this.swing / 100) * stepMs * 0.33 : 0;
          this.nextStepTime += stepMs + swingDelay;
        }
      }

    ## FAILURE MODE 8 — Knob/Fader: Stale Prop Reference in Gesture
    When a Gesture.Pan handler captures `value` from props, it captures
    the value at mount time. Subsequent prop changes are not seen by the
    gesture handler, so dragging uses the wrong starting point.

    WRONG:
      const Knob = ({ value, onChange }) => {
        const pan = Gesture.Pan().onUpdate((e) => {
          // `value` is stale after parent re-renders
          const next = Math.max(min, Math.min(max, value + e.translationY / -200));
          onChange(next);
        });
      };

    RIGHT — use a shared value to track the base value:
      const Knob = ({ value, onChange }) => {
        const baseValue = useSharedValue(value);
        // Sync shared value when prop changes
        useEffect(() => { baseValue.value = value; }, [value]);
        const startValue = useSharedValue(0);
        const pan = Gesture.Pan()
          .onStart(() => { startValue.value = baseValue.value; })
          .onUpdate((e) => {
            const next = Math.max(min, Math.min(max,
              startValue.value + e.translationY / -200));
            runOnJS(onChange)(next);
          });
      };

    ## FAILURE MODE 9 — Audio Assets: Empty or Missing WAV Files
    Placeholder WAV files that are 0-bytes or contain only a header (< 100 bytes)
    will cause expo-av to throw or silently play nothing. Every sample file
    MUST be a valid, audible WAV.

    REQUIREMENT: All files in assets/samples/ must be real, playable audio.
    Use one of these strategies:
      A. Generate minimal valid WAVs using a Node script that writes proper
         PCM audio data (a short sine wave or noise burst at 44100Hz/16-bit):
         scripts/generate-samples.js — run once during project setup.
      B. Use the Tone.js offline renderer to generate and write WAV files.
      C. Download real open-source drum samples (e.g. from freesound.org
         under CC0 license) and commit them to assets/samples/.
    NEVER commit an empty file or a file with only a WAV header.

    ## FAILURE MODE 10 — ErrorBoundary: componentDidCatch Must Log
    Silently swallowing errors makes debugging impossible. componentDidCatch
    must always log the error. In development use console.error; in production
    integrate with a crash reporter.

    WRONG:
      componentDidCatch(error: Error) {
        // log  ← comment with no code — error is silently dropped
      }

    RIGHT:
      componentDidCatch(error: Error, info: React.ErrorInfo) {
        console.error('[ErrorBoundary] Caught:', error, info.componentStack);
        // In production: Sentry.captureException(error, { extra: info });
      }

    ═══════════════════════════════════════════════
    DATA MODELS (src/types/index.ts — complete spec)
    ═══════════════════════════════════════════════
    export type Waveform = 'sine' | 'square' | 'saw' | 'triangle';
    export type TrackType = 'drum' | 'synth' | 'sampler';

    export interface Step {
      index: number;       // 0-15
      active: boolean;
      velocity: number;    // 0-127
      note?: string;       // e.g. 'C4' — only for synth tracks
      probability?: number; // 0-100, default 100
    }

    export interface Pattern {
      id: string;
      name: string;
      steps: Record<string, Step[]>; // trackId → Step[16]
    }

    export interface Track {
      id: string;
      name: string;
      type: TrackType;
      sampleKey?: string;
      color?: string;
    }

    export interface SynthParams {
      waveform: Waveform;
      attack: number;     // 0-2 seconds
      decay: number;      // 0-2 seconds
      sustain: number;    // 0-1 amplitude
      release: number;    // 0-4 seconds
      cutoff?: number;    // Hz, 20-20000
      resonance?: number; // 0-1
    }

    export interface MixerChannel {
      trackId: string;
      volume: number;    // 0-1
      pan: number;       // -1 to 1
      mute: boolean;
      solo: boolean;
    }

    export interface TransportState {
      isPlaying: boolean;
      bpm: number;        // 60-240
      swing: number;      // 0-100
      currentStep: number; // 0-15
      currentPatternId: string | null;
      lastTaps: number[];  // timestamps for tap tempo
    }

    export interface Project {
      id: string;
      name: string;
      bpm: number;
      swing: number;
      tracks: Track[];
      patterns: Pattern[];
      mixer: MixerChannel[];
      synthParams: Record<string, SynthParams>;
    }

    ═════════════════════════════════════════
    WIRING CONTRACT (must be satisfied 100%)
    ═════════════════════════════════════════
    1. transportStore.play() → AudioEngine.resume() + SequencerClock.start()
    2. transportStore.stop() → SequencerClock.stop()
    3. transportStore.setBpm() → SequencerClock.start() if playing
    4. SequencerClock.onStep() → reads pattern → SamplerEngine.play() or SynthEngine.play()
    5. SequencerClock.onStep() → transportStore.setState({ currentStep })
    6. mixerStore.setVolume() → MixerEngine.setVolume()
    7. mixerStore.setPan() → MixerEngine.setPan()
    8. mixerStore.setMute() → MixerEngine.setMute()
    9. mixerStore.setSolo() → MixerEngine.setSolo()
    10. mixerStore.setMasterVolume() → AudioEngine.setMasterVolume()
    11. projectStore.loadProject() → hydrates ALL stores AND syncs ALL engines
    12. useAudioSetup() called in root _layout.tsx, returns { isReady, error }

