        # Verification Gates — Run After Every Step

        ## Gate 1: TypeScript (catches type errors)
        ```bash
        cd /workspace && npx tsc --noEmit 2>&1
        # Required: zero errors. Fix ALL before proceeding.
        ```

        ## Gate 2: ESLint (catches hooks violations and any usage)
        ```bash
        cd /workspace && npx eslint --ext .ts,.tsx src/ 2>&1
        # Required: zero errors. Warnings are acceptable but should be fixed.
        ```

        ## Gate 3: File existence
        ```bash
        find /workspace/src -name "*.ts" -o -name "*.tsx" | sort
        # After foundation step: minimum 20 files
        # After implement step: minimum 32 files
        # After polish step: minimum 35 files
        ```

        ## Gate 4: No placeholder text (catches stub screens)
        ```bash
        grep -rn "will go here\|TODO\|FIXME\|placeholder\|stub\|coming soon" /workspace/src/
        # Required: zero matches
        ```

        ## Gate 5: No type escapes (catches any usage)
        ```bash
        grep -rn "as any\|: any\b\|<any>" /workspace/src/
        # Required: zero matches (excluding comments explaining why a cast is unavoidable)
        ```

        ## Gate 6: No shim files
        ```bash
        find /workspace/src -name "shims*" -o -name "*.d.ts" | grep -v node_modules
        # Required: zero matches
        ```

        ## Gate 7: Correct Zustand import (catches v4 syntax)
        ```bash
        grep -rn "^import create from 'zustand'" /workspace/src/
        # Required: zero matches (must use named import { create })
        grep -rn "from 'zustand'" /workspace/src/
        # All lines must show: import { create } from 'zustand'
        ```

        ## Gate 8: No dynamic require (catches Metro bundler bug)
        ```bash
        grep -rn "require('.*' +" /workspace/src/
        grep -rn 'require(".*" +' /workspace/src/
        grep -rn "require(\`" /workspace/src/
        # Required: zero matches
        ```

        ## Gate 9: Engine wiring (catches disconnected stores)
        ```bash
        grep -c "AudioEngine\|SequencerClock" /workspace/src/stores/transportStore.ts
        # Required: >= 4 (both engines called in play, stop, setBpm, setSwing)
        grep -c "MixerEngine" /workspace/src/stores/mixerStore.ts
        # Required: >= 4 (called in setVolume, setPan, setMute, setSolo)
        grep -c "onStep\|SamplerEngine\|setCurrentStep" /workspace/src/hooks/useAudioSetup.ts
        # Required: >= 3
        ```

        ## Gate 10: Real WAV files (catches empty placeholder audio)
        ```bash
        ls -la /workspace/assets/samples/*.wav | awk '{print $5, $9}'
        # Required: every file > 1000 bytes. If any file < 1000 bytes,
        # run: node scripts/generate-samples.js
        ```

        ## Gate 11: Unit tests exist and pass
        ```bash
        cd /workspace && npx jest --passWithNoTests 2>&1 | tail -20
        # Required: all test files pass (or no test files yet — acceptable in foundation step only)
        # After polish step: tests/engine/ must exist and pass
        ```

