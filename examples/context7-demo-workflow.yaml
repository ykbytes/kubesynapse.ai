##
## Context7 Research → Analysis Workflow — AgentWorkflow
##
## Chains docs-researcher and code-analyst into a two-step DAG:
##
##   research ──► analyze
##
## Step 1 (research): docs-researcher uses Context7 MCP to fetch
##   up-to-date library docs, then writes findings to the workspace.
##
## Step 2 (analyze): code-analyst reads the research output,
##   identifies risks and gaps, and produces a structured analysis.
##
## This workflow demonstrates:
##   - Context7 remote MCP integration for live docs
##   - File I/O (write in step 1, read in step 2)
##   - A2A delegation between agents
##   - Full observability via the Execution Observatory
##
## Prerequisites:
##   kubectl apply -f context7-demo-agents.yaml
##
## Trigger:
##   POST /api/v1/agents/docs-researcher/invoke?namespace=default
##   {"prompt": "Research the FastAPI dependency injection system and its middleware patterns"}
##
## Or use the workflow engine (once implemented):
##   kubectl apply -f context7-demo-workflow.yaml
##
apiVersion: kubesynapse.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: context7-research-analysis
  namespace: default
spec:
  description: >
    Research-to-analysis pipeline: Context7 MCP retrieves live documentation,
    then an analyst reviews findings for risks, gaps, and recommendations.
  input: "Research the FastAPI dependency injection system and its middleware patterns"
  messageBus: in-memory

  steps:
    # ── Step 1: Research ──────────────────────────────────────────────────
    - name: research
      agentRef: docs-researcher
      prompt: |
        Research task: {{input}}

        1. Use Context7 MCP to resolve the relevant library IDs
        2. Fetch the latest documentation pages
        3. Write a structured research brief to /workspace/research-brief.md
        4. Summarize key findings, API signatures, and version notes

        The brief should include:
        - Library name and version
        - Key concepts and patterns
        - Code examples for the most important APIs
        - Any deprecations or breaking changes
      execution:
        timeoutSeconds: 180
        maxAttempts: 2
        backoffSeconds: 5
        sessionGroup: context7-demo

    # ── Step 2: Analyze ──────────────────────────────────────────────────
    - name: analyze
      agentRef: code-analyst
      prompt: |
        Analyze the following research findings for accuracy, completeness,
        risks, and actionable recommendations.

        Research brief:
        {{previous_output}}

        Additionally, read /workspace/research-brief.md for the full details.

        Produce an analysis that:
        1. Summarizes the key findings in 2-3 sentences
        2. Flags any accuracy risks or outdated information
        3. Identifies gaps in coverage
        4. Provides ordered recommendations with priority
        5. Writes the final analysis to /workspace/analysis-report.md
      dependsOn:
        - research
      execution:
        timeoutSeconds: 120
        maxAttempts: 1
        sessionGroup: context7-demo
