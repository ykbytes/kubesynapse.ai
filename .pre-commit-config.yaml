# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^charts/
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml

  # Python lint & format (aligned with CI)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(operator|api-gateway|opencode-runtime|collector-agent|cli)/.*\.py$
      - id: ruff-format
        files: ^(operator|api-gateway|opencode-runtime|collector-agent|cli)/.*\.py$

  # Python type checking (aligned with CI)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - sqlalchemy
          - types-PyYAML
          - types-croniter
        args: [--config-file, pyproject.toml, --ignore-missing-imports]
        files: ^(operator|api-gateway|opencode-runtime)/.*\.py$
        pass_filenames: false
        entry: mypy
        # Run mypy per-module because the configs live at repo root
        language: system
        types: [python]

  # Helm chart validation
  - repo: local
    hooks:
      - id: helm-lint
        name: Helm lint
        entry: helm lint ./charts/kubesynth
        language: system
        pass_filenames: false
        files: ^charts/.*
        types: [yaml]

  # Security: ban SHA-1 in Python (matches CI check)
  - repo: local
    hooks:
      - id: ban-sha1
        name: Ban hashlib.sha1
        entry: bash -c 'if grep -rn "hashlib\.sha1" operator/ api-gateway/ opencode-runtime/ --include="*.py"; then echo "ERROR: hashlib.sha1 usage found. Use sha256 instead."; exit 1; fi'
        language: system
        pass_filenames: false
        types: [python]

  # Commit message format (optional but recommended)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, --force-scope, feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]
