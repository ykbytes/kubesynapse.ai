apiVersion: v1
kind: Namespace
metadata:
  name: kubesynapse-dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-nginx-config
  namespace: kubesynapse-dev
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      client_max_body_size 20M;

      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 6;
      gzip_types text/plain text/css text/xml text/javascript 
                 application/json application/javascript application/xml+rss 
                 application/rss+xml font/truetype font/opentype 
                 application/vnd.ms-fontobject image/svg+xml;

      server {
        listen 80;
        server_name _;
        
        root /app;
        index index.html;

        # SPA routing - serve index.html for all non-file requests
        location / {
          try_files $uri $uri/ /index.html;
        }

        # Cache busting for assets
        location ~* \.(js|css|woff|woff2|ttf|svg|png|jpg|jpeg|gif|ico)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }

        # Health check
        location /health {
          access_log off;
          return 200 "ok";
          add_header Content-Type text/plain;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesynapse-web-ui
  namespace: kubesynapse-dev
  labels:
    app: web-ui
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
        version: v1
    spec:
      containers:
      - name: web-ui
        image: nginx:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx
          readOnly: true
        - name: web-ui-dist
          mountPath: /app
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: web-ui-nginx-config
      - name: web-ui-dist
        hostPath:
          path: /app/web-ui-dist
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: kubesynapse-dev
  labels:
    app: web-ui
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: http
    nodePort: 30080
  selector:
    app: web-ui
---
apiVersion: v1
kind: Pod
metadata:
  name: web-ui-dev-volume-setter
  namespace: kubesynapse-dev
spec:
  serviceAccountName: default
  containers:
  - name: volume-copier
    image: busybox:latest
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Web-UI development deployment created"
      echo "To mount the dist folder:"
      echo "1. Copy dist to container:"
      echo "   kubectl cp web-ui/dist kubesynapse-dev/kubesynapse-web-ui-<pod>:/app --container=web-ui"
      echo "2. Or use a PVC for persistent storage"
      sleep 3600
  restartPolicy: Never
